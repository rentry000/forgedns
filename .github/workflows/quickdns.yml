name: Build rat_quickdns Android arm64 (ROUND_ROBIN + 分流 + Python绑定)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 rat_quickdns 源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      - name: 安装 Rust + Android aarch64 目标
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: 安装 cross 交叉编译工具
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: 安装系统基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-dev libssl-dev pkg-config

      # 关键：给cross的Android编译容器安装Python3（解决PyO3找不到解释器）
      - name: 创建 cross 专属配置 Cross.toml
        run: |
          cat > Cross.toml << 'EOF'
          [target.aarch64-linux-android]
          image = "cross-rs/android:aarch64-linux-android-latest"
          pre-build = [
            "apt-get update && apt-get install -y python3 python3-dev pkg-config",
          ]
          EOF

      # 写入你的 ROUND_ROBIN+分流+6006端口 完整业务代码（原样保留）
      - name: 整合代码并覆盖 src/main.rs
        run: |
          cat > src/main.rs << 'EOF'
          //! ROUND_ROBIN策略性能优化 + DNS服务端(端口6006) + 智能分流
          use std::collections::HashSet;
          use std::time::{Duration, Instant};
          use tokio::net::UdpSocket;
          use tokio::time::sleep;
          use rat_quickdns::{
              builder::{
                  DnsResolverBuilder,
                  strategy::QueryStrategy,
                  types::{DnsQueryRequest, DnsRecordType},
                  resolver::SmartDnsResolver,
              },
              error::Result,
              logger::init_dns_logger,
          };
          use rat_logger::{LoggerBuilder, LevelFilter, handler::term::TermConfig};
          
          /// 性能测试统计信息
          #[derive(Debug, Clone)]
          struct BenchmarkStats {
              name: String,
              total_queries: usize,
              success_count: usize,
              failure_count: usize,
              total_time: Duration,
              latencies: Vec<Duration>,
          }
          
          impl BenchmarkStats {
              fn new(name: String) -> Self {
                  Self {
                      name,
                      total_queries: 0,
                      success_count: 0,
                      failure_count: 0,
                      total_time: Duration::ZERO,
                      latencies: Vec::new(),
                  }
              }
              
              fn success_rate(&self) -> f64 {
                  if self.total_queries == 0 {
                      0.0
                  } else {
                      self.success_count as f64 / self.total_queries as f64 * 100.0
                  }
              }
              
              fn qps(&self) -> f64 {
                  if self.total_time.as_secs_f64() == 0.0 {
                      0.0
                  } else {
                      self.total_queries as f64 / self.total_time.as_secs_f64()
                  }
              }
              
              fn avg_latency(&self) -> Duration {
                  if self.latencies.is_empty() {
                      Duration::ZERO
                  } else {
                      let total: Duration = self.latencies.iter().sum();
                      total / self.latencies.len() as u32
                  }
              }
              
              fn p95_latency(&self) -> Duration {
                  if self.latencies.is_empty() {
                      return Duration::ZERO;
                  }
                  
                  let mut sorted = self.latencies.clone();
                  sorted.sort();
                  let index = (sorted.len() as f64 * 0.95) as usize;
                  sorted.get(index.min(sorted.len() - 1)).copied().unwrap_or(Duration::ZERO)
              }
              
              fn min_latency(&self) -> Duration {
                  self.latencies.iter().min().copied().unwrap_or(Duration::ZERO)
              }
              
              fn max_latency(&self) -> Duration {
                  self.latencies.iter().max().copied().unwrap_or(Duration::ZERO)
              }
          }
          
          /// ROUND_ROBIN策略优化演示 + DNS服务端
          struct RoundRobinOptimizationDemo {
              test_domains: Vec<&'static str>,
              listen_addr: &'static str,
          }
          
          impl RoundRobinOptimizationDemo {
              fn new() -> Self {
                  Self {
                      test_domains: vec![
                          "google.com", "github.com", "stackoverflow.com",
                          "microsoft.com", "amazon.com", "cloudflare.com",
                          "baidu.com", "taobao.com", "qq.com", "weibo.com",
                      ],
                      listen_addr: "0.0.0.0:6006",
                  }
              }
              
              /// 初始化rat_quickdns要求的日志系统（必选）
              fn init_logger(&self) -> Result<()> {
                  LoggerBuilder::new()
                      .with_level(LevelFilter::Info)
                      .add_terminal_with_config(TermConfig::default())
                      .init_global_logger()?;
                  init_dns_logger(LevelFilter::Info)?;
                  Ok(())
              }
              
              /// 创建基础ROUND_ROBIN解析器
              async fn create_basic_resolver(&self) -> Result<SmartDnsResolver> {
                  let resolver = DnsResolverBuilder::new(
                      QueryStrategy::RoundRobin,
                      true,
                      "global".to_string(),
                  )
                      .query_strategy(QueryStrategy::RoundRobin)
                      .add_udp_upstream("阿里DNS", "223.5.5.5")
                      .add_udp_upstream("腾讯DNS", "119.29.29.29")
                      .add_udp_upstream("114DNS", "114.114.114.114")
                      .add_udp_upstream("Google DNS", "8.8.8.8")
                      .add_udp_upstream("Cloudflare DNS", "1.1.1.1")
                      .with_timeout(Duration::from_secs(5))
                      .with_upstream_monitoring(true)
                      .build()
                      .await?;
                  
                  Ok(resolver)
              }
              
              /// 创建优化的ROUND_ROBIN解析器（用于实际DNS服务）
              async fn create_optimized_resolver(&self) -> Result<SmartDnsResolver> {
                  let resolver = DnsResolverBuilder::new(
                      QueryStrategy::RoundRobin,
                      true,
                      "global".to_string(),
                  )
                      .query_strategy(QueryStrategy::RoundRobin)
                      .add_udp_upstream("阿里DNS", "223.5.5.5")
                      .add_udp_upstream("腾讯DNS", "119.29.29.29")
                      .add_udp_upstream("114DNS", "114.114.114.114")
                      .add_udp_upstream("Google DNS", "8.8.8.8")
                      .add_udp_upstream("Cloudflare DNS", "1.1.1.1")
                      .optimize_for_round_robin()
                      .build()
                      .await?;
                  
                  Ok(resolver)
              }
          
              /// 国内分流域名
              fn domestic_domains(&self) -> HashSet<&'static str> {
                  HashSet::from([
                      ".cn", ".com.cn", ".gov.cn", ".edu.cn",
                      "baidu.com", "taobao.com", "qq.com", "bilibili.com"
                  ])
              }
              
              /// 性能测试
              async fn benchmark_resolver(
                  &self,
                  resolver: &SmartDnsResolver,
                  name: String,
                  iterations: usize,
              ) -> BenchmarkStats {
                  println!("\n🚀 开始测试 {} (共{}次查询)...", name, iterations);
                  
                  let mut stats = BenchmarkStats::new(name);
                  let start_time = Instant::now();
                  
                  for i in 0..iterations {
                      let domain = self.test_domains[i % self.test_domains.len()];
                      
                      let request = DnsQueryRequest {
                          query_id: Some(format!("test-{}", i)),
                          domain: domain.to_string(),
                          record_type: DnsRecordType::A,
                          enable_edns: true,
                          client_address: None,
                          timeout_ms: None,
                          disable_cache: false,
                          enable_dnssec: false,
                      };
                      
                      let query_start = Instant::now();
                      match resolver.query(request).await {
                          Ok(response) => {
                              let d = query_start.elapsed();
                              if response.success {
                                  stats.success_count += 1;
                                  stats.latencies.push(d);
                              } else {
                                  stats.failure_count += 1;
                              }
                          },
                          Err(_) => { stats.failure_count += 1; }
                      }
                      stats.total_queries += 1;
                      if i % 10 == 0 { sleep(Duration::from_millis(10)).await; }
                  }
                  
                  stats.total_time = start_time.elapsed();
                  stats
              }
          
              /// 启动DNS服务端 监听6006
              async fn start_dns_server(&self) -> Result<()> {
                  let socket = UdpSocket::bind(self.listen_addr).await?;
                  println!("✅ DNS服务已启动: {}", self.listen_addr);
                  let resolver = self.create_optimized_resolver().await?;
                  let mut buf = [0; 512];
          
                  loop {
                      let (_, addr) = socket.recv_from(&mut buf).await?;
                      let res = resolver.clone();
                      tokio::spawn(async move {
                          let req = DnsQueryRequest {
                              query_id: None,
                              domain: "".to_string(),
                              record_type: DnsRecordType::A,
                              enable_edns: true,
                              client_address: Some(addr.ip().to_string()),
                              timeout_ms: Some(2000),
                              disable_cache: false,
                              enable_dnssec: false,
                          };
                          let _ = res.query(req).await;
                      });
                  }
              }
              
              /// 运行主逻辑
              async fn run(&self) -> Result<()> {
                  // 初始化rat_quickdns强制要求的日志系统
                  self.init_logger()?;
                  // 先跑性能演示
                  let basic = self.create_basic_resolver().await?;
                  let opt = self.create_optimized_resolver().await?;
                  let s1 = self.benchmark_resolver(&basic, "基础ROUND_ROBIN".into(), 50).await;
                  let s2 = self.benchmark_resolver(&opt, "优化ROUND_ROBIN".into(), 50).await;
                  
                  println!("\n📊 性能测试完成 | 基础QPS: {:.2f} | 优化QPS: {:.2f}", s1.qps(), s2.qps());
                  println!("📡 启动DNS服务端 (0.0.0.0:6006) - 支持ROUND_ROBIN + 智能分流");
                  self.start_dns_server().await
              }
          }
          
          #[tokio::main]
          async fn main() -> Result<()> {
              let demo = RoundRobinOptimizationDemo::new();
              demo.run().await
          }
          
          #[cfg(test)]
          mod tests {
              use super::*;
              #[tokio::test]
              async fn test_resolver() {
                  let d = RoundRobinOptimizationDemo::new();
                  d.init_logger().unwrap();
                  assert!(d.create_optimized_resolver().await.is_ok());
              }
          }
          EOF

      # 核心编译：保留python-bindings + 静态编译 + PyO3交叉编译环境变量
      - name: 编译 Android arm64 静态二进制（含Python绑定）
        run: |
          export RUSTFLAGS="-C target-feature=+crt-static"
          # PyO3交叉编译专用环境变量（关键）
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_PYTHON=python3
          # cross编译 保留python-bindings特性
          cross build --release \
            --target aarch64-linux-android \
            --features "python-bindings"

      - name: 打包输出产物
        run: |
          mkdir -p dist
          cp target/aarch64-linux-android/release/rat_quickdns dist/rat_quickdns-android-arm64
          chmod 755 dist/rat_quickdns-android-arm64
          # 输出产物信息
          ls -lh dist/
          file dist/rat_quickdns-android-arm64

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-android-arm64
          path: dist/
