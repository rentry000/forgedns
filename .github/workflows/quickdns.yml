name: Build rat_quickdns Android arm64 (NDK r29 + python-bindings)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 rat_quickdns 源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      - name: 安装 Rust + aarch64 交叉目标
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: 安装 Android NDK r29
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip
          rm -rf $HOME/ndk
          mv android-ndk-r29 $HOME/ndk
          # 把NDK工具链加入系统PATH，确保编译openssl能找到
          echo "PATH=$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/ndk" >> $GITHUB_ENV

      - name: 安装系统全量依赖（编译openssl必须）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            python3-dev \
            perl \
            make \
            m4 \
            git

      # 🔥 核心：安全修复Cargo.toml，强制开启openssl-sys vendored，无无效feature
      - name: 修复 Cargo.toml 配置
        run: |
          # 1. 安全给pyo3添加交叉编译必须的abi3-py311 + extension-module特征
          sed -i.bak '/pyo3 =/ {
            s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", \1]/
            /"abi3-py311"/! s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", \1]/
          }' Cargo.toml

          # 2. 强制给openssl-sys开启vendored feature，从源码编译，不找系统库
          echo "" >> Cargo.toml
          echo "# 强制交叉编译用内置OpenSSL，解决Android编译报错" >> Cargo.toml
          echo "[dependencies.openssl-sys]" >> Cargo.toml
          echo "version = \"^0.9.112\"" >> Cargo.toml
          echo "features = [\"vendored\"]" >> Cargo.toml
          echo "default-features = false" >> Cargo.toml

          # 3. 补充空feature定义，解决unexpected_cfgs lint警告
          if ! grep -q '^\[features\]' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "[features]" >> Cargo.toml
          fi
          grep -q '^tokio-rustls =' Cargo.toml || echo "tokio-rustls = []" >> Cargo.toml
          grep -q '^reqwest =' Cargo.toml || echo "reqwest = []" >> Cargo.toml

          # 输出配置确认，无语法错误
          echo "=== 修复后的openssl-sys配置 ==="
          cat Cargo.toml | grep -A 5 -B 1 "openssl-sys"
          echo "=== 修复后的pyo3配置 ==="
          cat Cargo.toml | grep -B 2 -A 2 "pyo3 ="
          echo "=== 修复后的features ==="
          cat Cargo.toml | grep -A 10 "\[features\]"

      # 正确无语法错误的main.rs
      - name: 写入主程序代码
        run: |
          cat > src/main.rs << 'EOF'
          use tokio::net::UdpSocket;
          use rat_quickdns::{
              builder::{DnsResolverBuilder, strategy::QueryStrategy, types::{DnsQueryRequest, DnsRecordType}, resolver::SmartDnsResolver},
              error::Result,
          };
          
          struct DnsServer { listen_addr: &'static str }
          impl DnsServer {
              fn new() -> Self { Self { listen_addr: "0.0.0.0:6006" } }
              async fn create_resolver(&self) -> Result<SmartDnsResolver> {
                  DnsResolverBuilder::new(QueryStrategy::RoundRobin, true, "global".into())
                      .query_strategy(QueryStrategy::RoundRobin)
                      .add_udp_upstream("阿里DNS","223.5.5.5")
                      .add_udp_upstream("腾讯DNS","119.29.29.29")
                      .add_udp_upstream("114DNS","114.114.114.114")
                      .add_udp_upstream("Google DNS","8.8.8.8")
                      .add_udp_upstream("Cloudflare DNS","1.1.1.1")
                      .optimize_for_round_robin()
                      .build().await
              }
              async fn start(&self) -> Result<()> {
                  let sock = UdpSocket::bind(self.listen_addr).await?;
                  println!("✅ DNS服务启动: 0.0.0.0:6006");
                  let res = self.create_resolver().await?;
                  let mut buf = [0;512];
                  loop {
                      let (_, addr) = sock.recv_from(&mut buf).await?;
                      let r = res.clone();
                      tokio::spawn(async move {
                          let req = DnsQueryRequest {
                              query_id: None,
                              domain: "".into(),
                              record_type: DnsRecordType::A,
                              enable_edns: true,
                              client_address: Some(addr.ip().to_string()),
                              timeout_ms: Some(2000),
                              disable_cache: false,
                              enable_dnssec: false
                          };
                          let _ = r.query(req).await;
                      });
                  }
              }
          }
          
          #[tokio::main]
          async fn main() -> Result<()> {
              // 兼容日志初始化，无弃用警告
              let _ = rat_logger::LoggerBuilder::new()
                  .add_terminal_with_config(rat_logger::TermConfig::default())
                  .try_init();
              DnsServer::new().start().await
          }
          EOF

      # 🔥 核心编译：强制openssl静态编译，只开启真实存在的python-bindings feature
      - name: 编译 Android arm64 二进制
        run: |
          # 清空系统NDK/SDK，避免环境冲突
          unset ANDROID_NDK_ROOT ANDROID_SDK_ROOT ANDROID_HOME

          # pyo3交叉编译配置（适配Android无Python解释器场景）
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_CROSS_PYTHON_VERSION=3.11

          # 🔥 强制openssl从源码编译，彻底禁用系统库
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export OPENSSL_NO_VENDOR=0
          # 禁用系统pkg-config，避免找x86系统库
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_LIBDIR=""
          export PKG_CONFIG_SYSROOT_DIR=""

          # 关闭所有非致命lint，避免警告转为编译错误
          export RUSTFLAGS="-A unused -A unexpected_cfgs -A deprecated -A non_camel_case_types -A nonstandard_style"

          # 只开启项目真实存在的python-bindings feature，无任何无效feature
          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release \
            --features "python-bindings"

      - name: 打包并上传产物
        run: |
          mkdir -p dist
          BIN_PATH=target/aarch64-linux-android/release/rat_quickdns
          if [ -f "$BIN_PATH" ]; then
            cp $BIN_PATH dist/
            chmod +x dist/rat_quickdns
            echo "=== 编译成功！产物信息 ==="
            ls -lh dist/
            file dist/rat_quickdns
          else
            echo "❌ 编译失败，未找到产物"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-arm64-final
          path: dist/
