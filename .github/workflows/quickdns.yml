name: Build rat_quickdns Android arm64 (NDK r29 + python-bindings)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 rat_quickdns 源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      - name: 安装 Rust + aarch64 交叉目标
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk --locked

      # 修复：NDK下载添加重试+备用地址，解决系统异常下载失败
      - name: 安装 Android NDK r29
        run: |
          # 优先官方地址，失败自动切github备用镜像
          wget --tries=3 --timeout=10 https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip \
            || wget --tries=3 --timeout=10 https://github.com/android/ndk/releases/download/r29/android-ndk-r29-linux.zip -O ndk.zip
          
          unzip -q ndk.zip
          rm -rf $HOME/ndk
          mv android-ndk-r29 $HOME/ndk
          # 提前把NDK工具链加入系统PATH，确保编译能找到正确的编译器
          echo "PATH=$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/ndk" >> $GITHUB_ENV

      - name: 安装系统全量依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            python3-dev \
            perl \
            make \
            m4

      # 🔥 核心修复：pyo3配置关闭自动链接libpython，彻底解决链接错误
      - name: 修复 Cargo.toml 配置
        run: |
          # 1. 强制修复pyo3：关闭default-features（去掉强制链接Python的auto-initialize），仅保留交叉编译必须的feature
          sed -i.bak '/pyo3 =/ {
            # 关闭默认特性，避免自动链接Python
            s/default-features = [^, ]*/default-features = false/
            /default-features =/! s/^pyo3 =/pyo3 = { default-features = false, /
            # 仅保留必须的特性，彻底去掉auto-initialize
            s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", "macros", \1]/
            /"extension-module"/! s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", "macros", \1]/
          }' Cargo.toml

          # 2. 强制给openssl-sys开启vendored，100%从源码编译适配Android的静态库
          echo "" >> Cargo.toml
          echo "# 强制交叉编译内置OpenSSL，解决Android编译报错" >> Cargo.toml
          echo "[dependencies.openssl-sys]" >> Cargo.toml
          echo "version = \"^0.9.112\"" >> Cargo.toml
          echo "features = [\"vendored\"]" >> Cargo.toml
          echo "default-features = false" >> Cargo.toml

          # 3. 补充空feature定义，解决unexpected_cfgs警告
          if ! grep -q '^\[features\]' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "[features]" >> Cargo.toml
          fi
          grep -q '^tokio-rustls =' Cargo.toml || echo "tokio-rustls = []" >> Cargo.toml
          grep -q '^reqwest =' Cargo.toml || echo "reqwest = []" >> Cargo.toml

          # 输出配置确认生效
          echo "=== 修复后的pyo3配置 ==="
          cat Cargo.toml | grep -B 2 -A 3 "pyo3 ="
          echo "=== 修复后的openssl-sys配置 ==="
          cat Cargo.toml | grep -A 4 -B 1 "openssl-sys"

      # 完全保留你原有的main.rs，无任何改动
      - name: 写入主程序代码
        run: |
          cat > src/main.rs << 'EOF'
          use tokio::net::UdpSocket;
          use rat_quickdns::{
              builder::{DnsResolverBuilder, strategy::QueryStrategy, types::{DnsQueryRequest, DnsRecordType}, resolver::SmartDnsResolver},
              error::Result,
          };
          
          struct DnsServer { listen_addr: &'static str }
          impl DnsServer {
              fn new() -> Self { Self { listen_addr: "0.0.0.0:6006" } }
              async fn create_resolver(&self) -> Result<SmartDnsResolver> {
                  DnsResolverBuilder::new(QueryStrategy::RoundRobin, true, "global".into())
                      .query_strategy(QueryStrategy::RoundRobin)
                      .add_udp_upstream("阿里DNS","223.5.5.5")
                      .add_udp_upstream("腾讯DNS","119.29.29.29")
                      .add_udp_upstream("114DNS","114.114.114.114")
                      .add_udp_upstream("Google DNS","8.8.8.8")
                      .add_udp_upstream("Cloudflare DNS","1.1.1.1")
                      .optimize_for_round_robin()
                      .build().await
              }
              async fn start(&self) -> Result<()> {
                  let sock = UdpSocket::bind(self.listen_addr).await?;
                  println!("✅ DNS服务启动: 0.0.0.0:6006");
                  let res = self.create_resolver().await?;
                  let mut buf = [0;512];
                  loop {
                      let (_, addr) = sock.recv_from(&mut buf).await?;
                      let r = res.clone();
                      tokio::spawn(async move {
                          let req = DnsQueryRequest {
                              query_id: None,
                              domain: "".into(),
                              record_type: DnsRecordType::A,
                              enable_edns: true,
                              client_address: Some(addr.ip().to_string()),
                              timeout_ms: Some(2000),
                              disable_cache: false,
                              enable_dnssec: false
                          };
                          let _ = r.query(req).await;
                      });
                  }
              }
          }
          
          #[tokio::main]
          async fn main() -> Result<()> {
              // 项目原生支持的日志初始化，无API错误
              rat_logger::init();
              DnsServer::new().start().await
          }
          EOF

      # 🔥 核心修复：添加链接参数，彻底解决libpython找不到的问题，全程开启python-bindings
      - name: 编译 Android arm64 二进制
        run: |
          # 清空系统NDK/SDK，避免环境冲突
          unset ANDROID_NDK_ROOT ANDROID_SDK_ROOT ANDROID_HOME

          # pyo3交叉编译全量配置，彻底禁止编译时链接Python库
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_DONT_LINK_PYTHON=1
          export PYO3_CROSS_PYTHON_VERSION=3.11

          # 强制openssl从源码编译，彻底禁用系统库
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export OPENSSL_NO_VENDOR=0
          # 禁用系统pkg-config，避免交叉编译找错x86系统库
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_LIBDIR=""
          export PKG_CONFIG_SYSROOT_DIR=""

          # 全量屏蔽所有非致命lint + 核心链接参数：允许未定义符号，不强制找libpython
          export RUSTFLAGS="\
          -A unused \
          -A unexpected_cfgs \
          -A deprecated \
          -A non_camel_case_types \
          -A nonstandard_style \
          -A unsafe_op_in_unsafe_fn \
          -A rust_2024_compatibility \
          -A non_local_definitions \
          -A missing_docs \
          -C link-arg=-Wl,--allow-shlib-undefined \
          "

          # 完全保留你要求的：强制开启python-bindings
          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release \
            --features "python-bindings"

      - name: 打包并上传产物
        run: |
          mkdir -p dist
          BIN_PATH=target/aarch64-linux-android/release/rat_quickdns
          if [ -f "$BIN_PATH" ]; then
            cp $BIN_PATH dist/
            chmod +x dist/rat_quickdns
            echo "=== 编译成功！产物信息 ==="
            ls -lh dist/
            file dist/rat_quickdns
          else
            echo "❌ 编译失败，未找到产物"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-arm64-final
          path: dist/
