name: Build rat_quickdns Android arm64 (NDK r29 + python-bindings)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      - name: 安装 Rust + 交叉目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: 安装 Android NDK r29（这次绝对稳）
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip
          
          echo "=== 解压结果 ==="
          ls -la | grep -E 'android-ndk|ndk'
          echo "当前 HOME: $HOME"
          
          # 最简单最可靠写法
          rm -rf $HOME/ndk 2>/dev/null || true
          mkdir -p $HOME
          mv android-ndk-r29 $HOME/ndk
          
          echo "✅ NDK 已成功移动到 $HOME/ndk"
          ls -l $HOME/ndk/ | head -3
          
          echo "ANDROID_NDK_HOME=$HOME/ndk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/ndk" >> $GITHUB_ENV
          echo "CARGO_NDK_PLATFORM=29" >> $GITHUB_ENV

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config python3-dev build-essential clang libclang-dev

      - name: 写入主程序代码
        run: |
          cat > src/main.rs << 'EOF'
          use std::collections::HashSet;
          use std::time::{Duration, Instant};
          use tokio::net::UdpSocket;
          use tokio::time::sleep;
          use rat_quickdns::{
              builder::{DnsResolverBuilder, strategy::QueryStrategy, types::{DnsQueryRequest, DnsRecordType}, resolver::SmartDnsResolver},
              error::Result,
          };
          
          struct DnsServer { listen_addr: &'static str }
          impl DnsServer {
              fn new() -> Self { Self { listen_addr: "0.0.0.0:6006" } }
              async fn create_resolver(&self) -> Result<SmartDnsResolver> {
                  DnsResolverBuilder::new(QueryStrategy::RoundRobin, true, "global".into())
                      .query_strategy(QueryStrategy::RoundRobin)
                      .add_udp_upstream("阿里DNS","223.5.5.5")
                      .add_udp_upstream("腾讯DNS","119.29.29.29")
                      .add_udp_upstream("114DNS","114.114.114.114")
                      .add_udp_upstream("Google","8.8.8.8")
                      .add_udp_upstream("Cloudflare","1.1.1.1")
                      .optimize_for_round_robin()
                      .build().await
              }
              async fn start(&self) -> Result<()> {
                  let sock = UdpSocket::bind(self.listen_addr).await?;
                  println!("✅ DNS服务启动: 0.0.0.0:6006");
                  let res = self.create_resolver().await?;
                  let mut buf = [0;512];
                  loop {
                      let (_, addr) = sock.recv_from(&mut buf).await?;
                      let r = res.clone();
                      tokio::spawn(async move {
                          let req = DnsQueryRequest {
                              query_id: None, domain: "".into(), record_type: DnsRecordType::A,
                              enable_edns: true, client_address: Some(addr.ip().to_string()),
                              timeout_ms: Some(2000), disable_cache: false, enable_dnssec: false
                          };
                          let _ = r.query(req).await;
                      });
                  }
              }
          }
          
          #[tokio::main]
          async fn main() -> Result<()> {
              env_logger::init();
              DnsServer::new().start().await
          }
          EOF

      - name: 编译 Android arm64
        run: |
          unset ANDROID_SDK_ROOT ANDROID_NDK ANDROID_HOME
          
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_CROSS_PYTHON_VERSION=3.12
          
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export PKG_CONFIG_ALLOW_CROSS=1
          
          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release --features python-bindings
          
          echo "=== 编译完成，产物列表 ==="
          ls -lh target/aarch64-linux-android/release/ || echo "没找到target目录"

      - name: 打包并上传产物
        run: |
          mkdir -p dist
          cp target/aarch64-linux-android/release/rat_quickdns dist/ 2>/dev/null || true
          cp target/aarch64-linux-android/release/librat_quickdns.so dist/ 2>/dev/null || true
          cp target/aarch64-linux-android/release/*.so dist/ 2>/dev/null || true
          
          chmod +x dist/* 2>/dev/null || true
          ls -lh dist/
          
      - uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-arm64-final
          path: dist/
