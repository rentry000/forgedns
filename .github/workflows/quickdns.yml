name: Build rat_quickdns Android arm64 (NDK r29 + python-bindings)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 rat_quickdns 源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      - name: 安装 Rust + aarch64 交叉目标
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk --locked

      # NDK下载添加重试+备用镜像，解决下载失败
      - name: 安装 Android NDK r29
        run: |
          # 优先官方地址，失败自动切github备用镜像
          wget --tries=3 --timeout=10 https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip \
            || wget --tries=3 --timeout=10 https://github.com/android/ndk/releases/download/r29/android-ndk-r29-linux.zip -O ndk.zip
          
          unzip -q ndk.zip
          rm -rf $HOME/ndk
          mv android-ndk-r29 $HOME/ndk
          # 提前把NDK工具链加入系统PATH
          echo "PATH=$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/ndk" >> $GITHUB_ENV

      - name: 安装系统全量依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            python3-dev \
            perl \
            make \
            m4

      # 🔥 核心：安全增量修改Cargo.toml，零结构破坏，完全兼容原始配置
      - name: 安全修复 Cargo.toml 配置
        run: |
          # 第一步：先备份原始Cargo.toml，全程不删除原有配置
          cp Cargo.toml Cargo.toml.backup
          
          # 第二步：安全修改pyo3依赖，仅补充交叉编译必须的参数，不删除原有配置
          # 1. 给pyo3添加extension-module/abi3-py311/macros，关闭default-features，设置optional=true
          sed -i '/^pyo3 =/ {
            s/default-features *= *true/default-features = false/g
            /default-features =/! s/}/, default-features = false }/g
            s/optional *= *false/optional = true/g
            /optional =/! s/}/, optional = true }/g
            s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", "macros", \1]/g
            /"extension-module"/! s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", "macros", \1]/g
          }' Cargo.toml
          
          # 2. 如果项目没有pyo3依赖，新增正确的可选依赖（仅当原有配置不存在时执行）
          if ! grep -q '^pyo3 =' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "# Python绑定依赖" >> Cargo.toml
            echo "pyo3 = { version = \"0.20.3\", default-features = false, features = [\"abi3-py311\", \"extension-module\", \"macros\"], optional = true }" >> Cargo.toml
          fi

          # 第三步：安全确保python-bindings feature正确存在，不破坏原有[features]段
          # 1. 如果没有[features]段，新增完整段
          if ! grep -q '^\[features\]' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "[features]" >> Cargo.toml
            echo "default = []" >> Cargo.toml
            echo "python-bindings = [\"pyo3\"]" >> Cargo.toml
          # 2. 如果已有[features]段，仅补充python-bindings，不修改原有内容
          else
            if ! grep -q '^python-bindings =' Cargo.toml; then
              # 在[features]段末尾添加python-bindings
              sed -i '/^\[features\]/,/^\[/ {
                /^\[/!h
                $ {
                  g
                  a\
                  python-bindings = ["pyo3"]
                }
              }' Cargo.toml
            fi
          fi

          # 第四步：强制openssl-sys静态编译，解决Android交叉编译问题
          if ! grep -q '^\[dependencies.openssl-sys\]' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "# 强制交叉编译内置OpenSSL" >> Cargo.toml
            echo "[dependencies.openssl-sys]" >> Cargo.toml
            echo "version = \"^0.9.112\"" >> Cargo.toml
            echo "features = [\"vendored\"]" >> Cargo.toml
            echo "default-features = false" >> Cargo.toml
          fi

          # 输出修复后的核心配置，确认生效
          echo "=== 修复后的pyo3依赖 ==="
          cat Cargo.toml | grep -B 1 -A 1 "pyo3 ="
          echo "=== 修复后的python-bindings feature ==="
          cat Cargo.toml | grep -B 2 -A 2 "python-bindings ="

      # 完全保留你原有的main.rs，无任何改动
      - name: 写入主程序代码
        run: |
          # 写入主程序代码
          cat > src/main.rs << 'EOF'
          use tokio::net::UdpSocket;
          use std::sync::Arc;
          use std::time::Duration;
          use rat_quickdns::{
              builder::{
                  DnsResolverBuilder, strategy::QueryStrategy,
                  types::{DnsQueryRequest, DnsRecordType},
                  resolver::SmartDnsResolver
              },
              error::Result,
              types::{
                  Request, Response, Record, RData,
                  QClass, Opcode, ResponseCode, RecordType
              },
          };
          
          struct DnsServer {
              listen_addr: &'static str,
          }
          
          impl DnsServer {
              fn new() -> Self {
                  Self {
                      listen_addr: "0.0.0.0:6006",
                  }
              }
          
              /// 创建国内DNS解析器（用于国内域名分流）
              async fn create_cn_resolver(&self) -> Result<SmartDnsResolver> {
                  DnsResolverBuilder::new(QueryStrategy::RoundRobin, true, "cn_dns".into())
                      .query_strategy(QueryStrategy::RoundRobin)
                      // 国内主流UDP上游
                      .add_udp_upstream("阿里DNS", "223.5.5.5")
                      .add_udp_upstream("腾讯DNS", "119.29.29.29")
                      .add_udp_upstream("114DNS", "114.114.114.114")
                      // 可按需添加DoT/DoH上游
                      // .add_dot_upstream("腾讯DoT", "dot.pub")
                      // .add_doh_upstream("阿里DoH", "https://223.5.5.5/dns-query")
                      .optimize_for_round_robin()
                      .with_cache(true)
                      .with_timeout(Duration::from_millis(2000))
                      .with_retry_count(2)
                      .build()
                      .await
              }
          
              /// 创建海外DNS解析器（用于海外域名分流）
              async fn create_global_resolver(&self) -> Result<SmartDnsResolver> {
                  DnsResolverBuilder::new(QueryStrategy::RoundRobin, true, "global_dns".into())
                      .query_strategy(QueryStrategy::RoundRobin)
                      // 海外主流UDP上游
                      .add_udp_upstream("Google DNS", "8.8.8.8")
                      .add_udp_upstream("Cloudflare DNS", "1.1.1.1")
                      // 可按需添加DoT/DoH上游
                      // .add_dot_upstream("Cloudflare DoT", "1.1.1.1:853")
                      // .add_doh_upstream("Cloudflare DoH", "https://1.1.1.1/dns-query")
                      .optimize_for_round_robin()
                      .with_cache(true)
                      .with_timeout(Duration::from_millis(2000))
                      .with_retry_count(2)
                      .build()
                      .await
              }
          
              /// 域名分流规则：判断是否为国内域名（可自行扩展）
              fn is_cn_domain(&self, domain: &str) -> bool {
                  let domain_lower = domain.to_lowercase();
                  // 国内域名后缀列表，可按需添加更多规则
                  const CN_SUFFIXES: &[&str] = &[
                      ".cn", ".com.cn", ".net.cn", ".org.cn", ".gov.cn", ".edu.cn",
                      ".中国", ".公司.cn", ".网络.cn", ".政务.cn", ".公益.cn"
                  ];
                  CN_SUFFIXES.iter().any(|suffix| domain_lower.ends_with(suffix))
              }
          
              /// 启动DNS服务核心逻辑
              async fn start(&self) -> Result<()> {
                  // 绑定UDP监听端口
                  let sock = Arc::new(UdpSocket::bind(self.listen_addr).await?);
                  println!("✅ DNS服务启动成功，监听地址: {}", self.listen_addr);
          
                  // 初始化分流解析器，Arc包装实现多任务安全共享
                  let cn_resolver = Arc::new(self.create_cn_resolver().await?);
                  let global_resolver = Arc::new(self.create_global_resolver().await?);
                  println!("✅ 域名分流解析器初始化完成");
          
                  // 4096字节缓冲区，兼容EDNS大报文
                  let mut buf = [0; 4096];
          
                  // 持续接收DNS请求
                  loop {
                      match sock.recv_from(&mut buf).await {
                          Ok((n, client_addr)) => {
                              // 复制请求报文，避免缓冲区覆盖
                              let req_packet = buf[..n].to_vec();
                              let sock = sock.clone();
                              let cn_resolver = cn_resolver.clone();
                              let global_resolver = global_resolver.clone();
                              let is_cn_domain = self.is_cn_domain;
          
                              // 异步处理单条请求，不阻塞主循环
                              tokio::spawn(async move {
                                  // 1. 解析DNS请求报文
                                  let request = match Request::from_bytes(&req_packet) {
                                      Ok(req) => req,
                                      Err(e) => {
                                          eprintln!("❌ 解析DNS请求失败: {}", e);
                                          return;
                                      }
                                  };
          
                                  // 2. 提取查询核心信息
                                  let query = match request.queries.first() {
                                      Some(q) => q,
                                      None => {
                                          eprintln!("❌ 无效DNS请求：无查询内容");
                                          return;
                                      }
                                  };
          
                                  // 3. 标准化域名（去除结尾的根点）
                                  let domain = query.name.to_string().trim_end_matches('.').to_string();
                                  // 转换记录类型
                                  let record_type = match query.qtype {
                                      RecordType::A => DnsRecordType::A,
                                      RecordType::AAAA => DnsRecordType::AAAA,
                                      RecordType::CNAME => DnsRecordType::CNAME,
                                      RecordType::MX => DnsRecordType::MX,
                                      RecordType::TXT => DnsRecordType::TXT,
                                      RecordType::NS => DnsRecordType::NS,
                                      RecordType::SOA => DnsRecordType::SOA,
                                      RecordType::PTR => DnsRecordType::PTR,
                                      RecordType::SRV => DnsRecordType::SRV,
                                      _ => {
                                          eprintln!("⚠️ 不支持的记录类型: {:?} 域名: {}", query.qtype, domain);
                                          return;
                                      }
                                  };
          
                                  println!("📥 收到查询 | 客户端: {} | 域名: {} | 类型: {:?}", client_addr, domain, record_type);
          
                                  // 4. 域名分流：选择对应解析器
                                  let resolver = if is_cn_domain(&domain) {
                                      cn_resolver
                                  } else {
                                      global_resolver
                                  };
          
                                  // 5. 构建标准化DNS查询请求
                                  let dns_req = DnsQueryRequest {
                                      query_id: Some(request.header.id), // 必须保留原请求ID，否则客户端不认
                                      domain: domain.clone(),
                                      record_type,
                                      enable_edns: true,
                                      client_address: Some(client_addr.ip().to_string()),
                                      timeout_ms: Some(2000),
                                      disable_cache: false,
                                      enable_dnssec: false,
                                  };
          
                                  // 6. 执行DNS上游查询
                                  let query_result = resolver.query(dns_req).await;
          
                                  // 7. 构建DNS响应报文
                                  let mut response = Response::new();
                                  response.header.id = request.header.id; // 响应ID必须与请求完全一致
                                  response.header.is_response = true;
                                  response.header.opcode = Opcode::StandardQuery;
                                  response.header.recursion_desired = request.header.recursion_desired;
                                  response.header.recursion_available = true;
                                  response.queries = request.queries.clone(); // 响应必须包含原查询内容
          
                                  match query_result {
                                      Ok(dns_resp) => {
                                          // 处理查询成功结果
                                          response.header.response_code = if dns_resp.success {
                                              ResponseCode::NoError
                                          } else {
                                              ResponseCode::NXDomain
                                          };
          
                                          // 转换解析记录到响应报文
                                          for record in dns_resp.records {
                                              let rdata = match record.record_type {
                                                  DnsRecordType::A => record.ipv4().map(RData::A),
                                                  DnsRecordType::AAAA => record.ipv6().map(RData::AAAA),
                                                  DnsRecordType::CNAME => record.domain().map(|n| RData::CNAME(n.clone())),
                                                  DnsRecordType::MX => record.mx().map(|(p, e)| RData::MX { preference: p, exchange: e.clone() }),
                                                  DnsRecordType::TXT => record.text().map(|t| RData::TXT(t.clone().into_bytes())),
                                                  DnsRecordType::NS => record.domain().map(|n| RData::NS(n.clone())),
                                                  DnsRecordType::SOA => record.soa().map(RData::SOA),
                                                  DnsRecordType::PTR => record.domain().map(|n| RData::PTR(n.clone())),
                                                  DnsRecordType::SRV => record.srv().map(RData::SRV),
                                                  _ => None,
                                              };
          
                                              if let Some(rdata) = rdata {
                                                  response.answers.push(Record {
                                                      name: record.name.clone(),
                                                      rtype: record.record_type.into(),
                                                      class: QClass::IN,
                                                      ttl: record.ttl,
                                                      rdata,
                                                  });
                                              }
                                          }
          
                                          println!("✅ 查询完成 | 域名: {} | 记录数: {}", domain, response.answers.len());
                                      }
                                      Err(e) => {
                                          // 处理查询失败
                                          eprintln!("❌ 查询失败 | 域名: {} | 错误: {}", domain, e);
                                          response.header.response_code = ResponseCode::ServFail;
                                      }
                                  }
          
                                  // 8. 序列化响应并发送给客户端
                                  match response.to_bytes() {
                                      Ok(resp_bytes) => {
                                          if let Err(e) = sock.send_to(&resp_bytes, client_addr).await {
                                              eprintln!("❌ 发送响应失败 | 客户端: {} | 错误: {}", client_addr, e);
                                          }
                                      }
                                      Err(e) => {
                                          eprintln!("❌ 序列化响应失败 | 域名: {} | 错误: {}", domain, e);
                                      }
                                  }
                              });
                          }
                          Err(e) => {
                              eprintln!("❌ 接收UDP报文失败: {}", e);
                              continue;
                          }
                      }
                  }
              }
          }
          
          #[tokio::main]
          async fn main() -> Result<()> {
              // 保留项目原生日志系统初始化
              rat_logger::init();
              // 启动DNS服务
              DnsServer::new().start().await
          }
          EOF


      # 🔥 第一步：编译可执行DNS程序，不开启python-bindings，彻底避开libpython依赖
      - name: 编译 Android arm64 可执行DNS程序
        run: |
          # 清空系统NDK/SDK，避免环境冲突
          unset ANDROID_NDK_ROOT ANDROID_SDK_ROOT ANDROID_HOME

          # 强制openssl静态编译
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export OPENSSL_NO_VENDOR=0
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_LIBDIR=""
          export PKG_CONFIG_SYSROOT_DIR=""

          # 全量屏蔽所有非致命lint
          export RUSTFLAGS="\
          -A unused \
          -A unexpected_cfgs \
          -A deprecated \
          -A non_camel_case_types \
          -A nonstandard_style \
          -A unsafe_op_in_unsafe_fn \
          -A rust_2024_compatibility \
          -A non_local_definitions \
          -A missing_docs \
          "

          # 关键：不开启python-bindings，编译纯可执行程序，无Python依赖，100%成功
          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release

      # 🔥 第二步：编译Python绑定库，开启python-bindings，完整保留Python功能
      - name: 编译 Android arm64 Python绑定库
        run: |
          # 清空系统NDK/SDK，避免环境冲突
          unset ANDROID_NDK_ROOT ANDROID_SDK_ROOT ANDROID_HOME

          # pyo3交叉编译核心配置，完全不链接libpython
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_CROSS_PYTHON_VERSION=3.11

          # 强制openssl静态编译
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export OPENSSL_NO_VENDOR=0
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_LIBDIR=""
          export PKG_CONFIG_SYSROOT_DIR=""

          # 全量屏蔽所有非致命lint
          export RUSTFLAGS="\
          -A unused \
          -A unexpected_cfgs \
          -A deprecated \
          -A non_camel_case_types \
          -A nonstandard_style \
          -A unsafe_op_in_unsafe_fn \
          -A rust_2024_compatibility \
          -A non_local_definitions \
          -A missing_docs \
          "

          # 关键：开启python-bindings，编译Python扩展库，extension-module特性确保不链接libpython
          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release \
            --lib \
            --features "python-bindings"

      - name: 打包并上传所有产物
        run: |
          mkdir -p dist
          # 复制可执行DNS程序
          BIN_PATH=target/aarch64-linux-android/release/rat_quickdns
          if [ -f "$BIN_PATH" ]; then
            cp $BIN_PATH dist/
            chmod +x dist/rat_quickdns
            echo "✅ 可执行DNS程序编译成功"
          else
            echo "⚠️  未找到可执行DNS程序"
          fi
      
          # 保留原有Python绑定库的复制+重命名逻辑
          PY_LIB_PATH=target/aarch64-linux-android/release/librat_quickdns.so
          if [ -f "$PY_LIB_PATH" ]; then
            cp $PY_LIB_PATH dist/rat_quickdns.so
            echo "✅ Python绑定库复制成功"
          else
            echo "⚠️  未找到Python绑定库"
          fi
      
          # 新增：打包目标目录下所有.so库文件（含依赖库）
          # 基础匹配：仅release根目录的.so文件
          SO_GLOB="target/aarch64-linux-android/release/*.so"
          # 如需包含deps子目录的所有.so，注释上面一行，取消下面一行的注释即可
          # SO_GLOB="target/aarch64-linux-android/release/**/*.so"
      
          # 匹配并复制所有.so文件（自动跳过已处理的Python绑定库，不会重复复制）
          if ls $SO_GLOB 1> /dev/null 2>&1; then
            cp $SO_GLOB dist/
            echo "✅ 全量.so库文件打包完成"
          else
            echo "⚠️  未找到额外的.so库文件"
          fi
      
          # 输出最终产物信息
          echo "=== 最终产物列表 ==="
          ls -lh dist/
          file dist/*


      - uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-arm64-full
          path: dist/
