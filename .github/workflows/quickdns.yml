name: Build rat_quickdns Android arm64 (NDK r29 + python-bindings)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 rat_quickdns 源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      # 🔥 彻底解决NDK下载失败：官方安卓环境自动安装NDK r29，无需手动下载
      - name: 配置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android NDK r29
        uses: android-actions/setup-android@v3
        with:
          ndk: '20.1.5948944' # NDK r29 对应的官方版本号
      
      - name: 配置NDK环境变量
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/20.1.5948944" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/ndk/20.1.5948944/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: 安装 Rust + aarch64 交叉目标
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            python3-dev \
            perl \
            make \
            m4

      # 安全优化Cargo.toml，零破坏原有结构，完整保留python-bindings
      - name: 优化 Cargo.toml 配置
        run: |
          cp Cargo.toml Cargo.toml.backup
          
          # 极致性能release配置，无ABI风险
          if ! grep -q '^\[profile.release\]' Cargo.toml; then
            cat >> Cargo.toml << 'EOF'

          # 🔥 极致性能&最小体积编译配置
          [profile.release]
          opt-level = 3
          lto = "fat"
          codegen-units = 1
          panic = "abort"
          strip = "debuginfo"
          incremental = false
          EOF
          fi

          # 新增并发缓存依赖DashMap
          if ! grep -q '^dashmap =' Cargo.toml; then
            echo "dashmap = { version = \"5.5.3\", default-features = false, features = [\"std\"] }" >> Cargo.toml
          fi

          # 安全修复pyo3 Python绑定依赖
          sed -i '/^pyo3 =/ {
            s/default-features *= *true/default-features = false/g
            /default-features =/! s/}/, default-features = false }/g
            s/optional *= *false/optional = true/g
            /optional =/! s/}/, optional = true }/g
            s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", "macros", \1]/g
            /"extension-module"/! s/features *= *\[\([^]]*\)\]/features = ["abi3-py311", "extension-module", "macros", \1]/g
          }' Cargo.toml
          
          if ! grep -q '^pyo3 =' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "pyo3 = { version = \"0.20.3\", default-features = false, features = [\"abi3-py311\", \"extension-module\", \"macros\"], optional = true }" >> Cargo.toml
          fi

          # 确保python-bindings feature存在
          if ! grep -q '^\[features\]' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "[features]" >> Cargo.toml
            echo "default = []" >> Cargo.toml
            echo "python-bindings = [\"pyo3\"]" >> Cargo.toml
          else
            if ! grep -q '^python-bindings =' Cargo.toml; then
              sed -i '/^\[features\]/,/^\[/ {
                /^\[/!h
                $ {
                  g
                  a\
                  python-bindings = ["pyo3"]
                }
              }' Cargo.toml
            fi
          fi

          # 强制openssl静态编译，解决Android交叉编译问题
          if ! grep -q '^\[dependencies.openssl-sys\]' Cargo.toml; then
            echo "" >> Cargo.toml
            echo "[dependencies.openssl-sys]" >> Cargo.toml
            echo "version = \"^0.9.112\"" >> Cargo.toml
            echo "features = [\"vendored\"]" >> Cargo.toml
            echo "default-features = false" >> Cargo.toml
          fi

      # 🔥 零平台兼容问题的主程序，彻底删除所有报错的socket相关代码
      - name: 写入最终兼容版主程序代码
        run: |
          cat > src/main.rs << 'EOF'
          use std::{
              net::IpAddr,
              sync::Arc,
              time::{Duration, Instant},
          };
          use dashmap::DashMap;
          use tokio::net::UdpSocket;
          
          // rat_quickdns 核心导入
          use rat_quickdns::{
              builder::{
                  DnsResolverBuilder,
                  strategy::QueryStrategy,
                  types::{DnsQueryRequest, DnsRecordType, DnsQueryResponse},
                  resolver::SmartDnsResolver,
              },
              error::Result,
          };
          
          // ==================== 核心配置 ====================
          const LISTEN_ADDR: &str = "0.0.0.0:6006";
          const DNS_MAX_UDP_SIZE: usize = 4096;
          const DEFAULT_TTL: u32 = 300;
          const CACHE_MAX_ENTRIES: usize = 10000;
          const CACHE_CLEAN_THRESHOLD: usize = 8000;
          
          // ==================== 零开销DNS内存缓存（核心性能优化） ====================
          #[derive(Clone, Debug)]
          struct CacheEntry {
              ips: Vec<IpAddr>,
              expire_at: Instant,
          }
          
          type DnsCache = Arc<DashMap<(String, DnsRecordType), CacheEntry>>;
          
          fn clean_expired_cache(cache: &DnsCache) {
              let now = Instant::now();
              cache.retain(|_, entry| entry.expire_at > now);
          }
          
          // ==================== 极致优化DNS报文解析与构建 ====================
          fn parse_dns_domain(req_buf: &[u8]) -> Option<(String, DnsRecordType)> {
              if req_buf.len() < 12 {
                  return None;
              }
              
              let mut offset = 12;
              let mut domain = String::with_capacity(256);
              
              while offset < req_buf.len() {
                  let len = req_buf[offset] as usize;
                  if len == 0 {
                      offset += 1;
                      break;
                  }
                  if offset + 1 + len > req_buf.len() {
                      return None;
                  }
                  if !domain.is_empty() {
                      domain.push('.');
                  }
                  offset += 1;
                  domain.push_str(&String::from_utf8_lossy(&req_buf[offset..offset+len]).to_lowercase());
                  offset += len;
              }
              
              if offset + 4 > req_buf.len() {
                  return None;
              }
              
              let qtype = u16::from_be_bytes([req_buf[offset], req_buf[offset+1]]);
              let record_type = match qtype {
                  1 => DnsRecordType::A,
                  28 => DnsRecordType::AAAA,
                  _ => return None,
              };
              
              Some((domain, record_type))
          }
          
          fn build_dns_response(
              req_buf: &[u8],
              record_type: DnsRecordType,
              ips: Vec<IpAddr>,
              rcode: u8,
          ) -> Option<Vec<u8>> {
              if req_buf.len() < 12 {
                  return None;
              }
              
              let mut res = Vec::with_capacity(DNS_MAX_UDP_SIZE);
              
              // 复制事务ID
              res.extend_from_slice(&req_buf[0..2]);
              
              // 标准Flags字段
              let flags_high = (req_buf[2] & 0x7F) | 0x80;
              let flags_low = (req_buf[3] & 0x70) | 0x80 | (rcode & 0x0F);
              res.push(flags_high);
              res.push(flags_low);
              
              // 问题数、回答数
              res.extend_from_slice(&req_buf[4..6]);
              let ancount = if rcode == 0 { ips.len() as u16 } else { 0 };
              res.extend_from_slice(&ancount.to_be_bytes());
              res.extend_from_slice(&[0, 0, 0, 0]);
              
              // 复制问题段
              let mut question_end = 12;
              while question_end < req_buf.len() {
                  let len = req_buf[question_end] as usize;
                  if len == 0 {
                      question_end += 5;
                      break;
                  }
                  question_end += len + 1;
              }
              if question_end > req_buf.len() {
                  return None;
              }
              res.extend_from_slice(&req_buf[12..question_end]);
              
              // 构建回答段
              if rcode == 0 && !ips.is_empty() {
                  for ip in ips {
                      res.extend_from_slice(&[0xC0, 0x0C]);
                      match (ip, record_type) {
                          (IpAddr::V4(ipv4), DnsRecordType::A) => {
                              res.extend_from_slice(&[0x00, 0x01, 0x00, 0x01]);
                              res.extend_from_slice(&DEFAULT_TTL.to_be_bytes());
                              res.extend_from_slice(&[0x00, 0x04]);
                              res.extend_from_slice(&ipv4.octets());
                          }
                          (IpAddr::V6(ipv6), DnsRecordType::AAAA) => {
                              res.extend_from_slice(&[0x00, 0x1C, 0x00, 0x01]);
                              res.extend_from_slice(&DEFAULT_TTL.to_be_bytes());
                              res.extend_from_slice(&[0x00, 0x10]);
                              res.extend_from_slice(&ipv6.octets());
                          }
                          _ => continue,
                      }
                  }
              }
              
              // 处理UDP大包截断
              if res.len() > DNS_MAX_UDP_SIZE {
                  res.truncate(DNS_MAX_UDP_SIZE);
                  res[2] |= 0x02;
              }
              
              Some(res)
          }
          
          // ==================== DNS服务核心 ====================
          #[derive(Clone)]
          struct DnsServer {
              resolver: SmartDnsResolver,
              cache: DnsCache,
          }
          
          impl DnsServer {
              async fn new() -> Result<Self> {
                  // Smart策略自动选最快节点，低发热+极速响应
                  let resolver = DnsResolverBuilder::new(QueryStrategy::Smart, true, "fastest".into())
                      .add_udp_upstream("阿里DNS", "223.5.5.5:53")
                      .add_udp_upstream("阿里备用", "223.6.6.6:53")
                      .add_udp_upstream("腾讯DNS", "119.29.29.29:53")
                      .add_udp_upstream("114DNS", "114.114.114.114:53")
                      .add_udp_upstream("百度DNS", "180.76.76.76:53")
                      .add_doh_upstream("阿里DoH", "https://dns.alidns.com/dns-query")
                      .add_doh_upstream("360DoH", "https://doh.360.cn/dns-query")
                      .with_timeout(Duration::from_millis(1500))
                      .optimize_for_round_robin()
                      .build()
                      .await?;
                  
                  let cache = Arc::new(DashMap::with_capacity(CACHE_MAX_ENTRIES));
                  Ok(Self { resolver, cache })
              }
              
              async fn handle_query(&self, req_data: &[u8]) -> Option<Vec<u8>> {
                  let (domain, record_type) = parse_dns_domain(req_data)?;
                  let cache_key = (domain.clone(), record_type);
                  
                  // 缓存命中直接返回，微秒级响应
                  if let Some(entry) = self.cache.get(&cache_key) {
                      if entry.expire_at > Instant::now() {
                          return build_dns_response(req_data, record_type, entry.ips.clone(), 0);
                      }
                  }
                  
                  // 缓存未命中，向上游查询
                  let query_req = DnsQueryRequest {
                      query_id: None,
                      domain: domain.clone(),
                      record_type,
                      enable_edns: true,
                      client_address: None,
                      timeout_ms: Some(1500),
                      disable_cache: false,
                      enable_dnssec: false,
                  };
                  
                  match self.resolver.query(query_req).await {
                      Ok(response) => {
                          let resolved_ips = response.ip_addresses();
                          let rcode = if response.success && !resolved_ips.is_empty() { 0 } else { 3 };
                          
                          // 写入缓存
                          if rcode == 0 {
                              let expire_at = Instant::now() + Duration::from_secs(DEFAULT_TTL as u64);
                              self.cache.insert(cache_key, CacheEntry { ips: resolved_ips.clone(), expire_at });
                              
                              // 自动清理过期缓存
                              if self.cache.len() >= CACHE_CLEAN_THRESHOLD {
                                  clean_expired_cache(&self.cache);
                              }
                          }
                          
                          build_dns_response(req_data, record_type, resolved_ips, rcode)
                      }
                      Err(_) => {
                          build_dns_response(req_data, record_type, vec![], 2)
                      }
                  }
              }
              
              async fn start(&self, sock: Arc<UdpSocket>) -> Result<()> {
                  println!("✅ rat_quickdns 启动成功，监听地址: {}", LISTEN_ADDR);
                  println!("✅ 极速策略上游已就绪，内存缓存已启用");
                  
                  let mut buf = [0; DNS_MAX_UDP_SIZE];
                  
                  // 主循环，极致精简，最小化CPU开销
                  loop {
                      let (len, client_addr) = match sock.recv_from(&mut buf).await {
                          Ok(res) => res,
                          Err(_) => continue,
                      };
                      
                      let req_data = buf[..len].to_vec();
                      let sock_clone = sock.clone();
                      let server_clone = self.clone();
                      
                      // 异步处理请求，不阻塞主循环
                      tokio::spawn(async move {
                          if let Some(res_bytes) = server_clone.handle_query(&req_data).await {
                              let _ = sock_clone.send_to(&res_bytes, client_addr).await;
                          }
                      });
                  }
              }
          }
          
          // 🔥 低发热核心：单线程current_thread运行时，消除多核心频繁唤醒
          #[tokio::main(flavor = "current_thread")]
          async fn main() -> Result<()> {
              let _ = rat_logger::init();
              
              // 🔥 彻底删除所有平台专属代码，直接用tokio原生bind，100%兼容Android
              let socket = UdpSocket::bind(LISTEN_ADDR).await?;
              let sock = Arc::new(socket);
              
              // 启动服务
              DnsServer::new().await?.start(sock).await
          }
          EOF

      # 合规编译参数，解决ABI警告，Android专属优化
      - name: 编译 Android arm64 可执行程序
        run: |
          unset ANDROID_NDK_ROOT ANDROID_SDK_ROOT ANDROID_HOME
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export PKG_CONFIG_ALLOW_CROSS=1
          export RUSTFLAGS="\
          -C target-cpu=cortex-a76 \
          -C target-feature=+crc,+aes,+sha2 \
          -C link-arg=-s \
          -A unused \
          -A deprecated \
          -A missing_docs \
          "

          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release

      # 完整保留Python绑定编译
      - name: 编译 Android arm64 Python绑定库
        run: |
          unset ANDROID_NDK_ROOT ANDROID_SDK_ROOT ANDROID_HOME
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_CROSS_PYTHON_VERSION=3.11
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export PKG_CONFIG_ALLOW_CROSS=1
          export RUSTFLAGS="\
          -C target-cpu=cortex-a76 \
          -C target-feature=+crc,+aes,+sha2 \
          -C link-arg=-s \
          -A unused \
          -A deprecated \
          -A missing_docs \
          "

          cargo ndk \
            -t aarch64-linux-android \
            --platform 29 \
            build --release \
            --lib \
            --features "python-bindings"

      - name: 打包并上传产物
        run: |
          mkdir -p dist
          # 复制可执行程序
          BIN_PATH=target/aarch64-linux-android/release/rat_quickdns
          if [ -f "$BIN_PATH" ]; then
            cp $BIN_PATH dist/
            chmod +x dist/rat_quickdns
            echo "✅ 可执行程序编译成功"
          fi
      
          # 复制Python绑定库
          PY_LIB_PATH=target/aarch64-linux-android/release/librat_quickdns.so
          if [ -f "$PY_LIB_PATH" ]; then
            cp $PY_LIB_PATH dist/rat_quickdns.so
            echo "✅ Python绑定库编译成功"
          fi
      
          # 打包所有依赖库
          SO_GLOB="target/aarch64-linux-android/release/*.so"
          if ls $SO_GLOB 1> /dev/null 2>&1; then
            cp $SO_GLOB dist/
            echo "✅ 全量.so库文件打包完成"
          fi
      
          echo "=== 最终产物列表 ==="
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-arm64-final
          path: dist/
