name: Build rat_quickdns Android arm64 (NDK r29 + python-bindings)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: 0ldm0s/rat_quickdns
          fetch-depth: 1

      - name: 安装 Rust 交叉编译目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # 🔥 修复NDK安装+完整工具链路径（彻底解决ar/clang找不到）
      - name: 安装 Android NDK r29
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          mv android-ndk-r29 ~/ndk
          # 核心：把NDK工具链完整加入PATH
          NDK_BIN="$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "PATH=$NDK_BIN:$PATH" >> $GITHUB_ENV
          # 显式指定所有交叉编译工具（解决ring/cc-rs报错）
          echo "AR=aarch64-linux-android-ar" >> $GITHUB_ENV
          echo "CC=aarch64-linux-android29-clang" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-android29-clang++" >> $GITHUB_ENV
          echo "RANLIB=aarch64-linux-android-ranlib" >> $GITHUB_ENV
          echo "LD=aarch64-linux-android-ld" >> $GITHUB_ENV

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # 业务代码原样保留
      - name: 写入主程序代码
        run: |
          cat > src/main.rs << 'EOF'
          use std::collections::HashSet;
          use std::time::{Duration, Instant};
          use tokio::net::UdpSocket;
          use tokio::time::sleep;
          use rat_quickdns::{
              builder::{DnsResolverBuilder, strategy::QueryStrategy, types::{DnsQueryRequest, DnsRecordType}, resolver::SmartDnsResolver},
              error::Result,
          };
          
          struct DnsServer { listen_addr: &'static str }
          impl DnsServer {
              fn new() -> Self { Self { listen_addr: "0.0.0.0:6006" } }
              async fn create_resolver(&self) -> Result<SmartDnsResolver> {
                  DnsResolverBuilder::new(QueryStrategy::RoundRobin, true, "global".into())
                      .query_strategy(QueryStrategy::RoundRobin)
                      .add_udp_upstream("阿里DNS","223.5.5.5")
                      .add_udp_upstream("腾讯DNS","119.29.29.29")
                      .add_udp_upstream("114DNS","114.114.114.114")
                      .add_udp_upstream("Google","8.8.8.8")
                      .add_udp_upstream("Cloudflare","1.1.1.1")
                      .optimize_for_round_robin()
                      .build().await
              }
              async fn start(&self) -> Result<()> {
                  let sock = UdpSocket::bind(self.listen_addr).await?;
                  println!("✅ DNS服务启动: 0.0.0.0:6006");
                  let res = self.create_resolver().await?;
                  let mut buf = [0;512];
                  loop {
                      let (_, addr) = sock.recv_from(&mut buf).await?;
                      let r = res.clone();
                      tokio::spawn(async move {
                          let req = DnsQueryRequest {
                              query_id: None, domain: "".into(), record_type: DnsRecordType::A,
                              enable_edns: true, client_address: Some(addr.ip().to_string()),
                              timeout_ms: Some(2000), disable_cache: false, enable_dnssec: false
                          };
                          let _ = r.query(req).await;
                      });
                  }
              }
          }
          
          #[tokio::main]
          async fn main() -> Result<()> {
              env_logger::init();
              DnsServer::new().start().await
          }
          EOF

      # 🔥 核心编译：修复所有依赖报错，强制开启python-bindings
      - name: 编译 Android arm64 二进制
        run: |
          # PyO3 交叉编译（保留python绑定，不依赖本地Python）
          export PYO3_CROSS=1
          export PYO3_NO_PYTHON=1
          export PYO3_CROSS_PYTHON_VERSION=3.14
          # 修复OpenSSL/ring交叉编译
          export OPENSSL_VENDORED=1
          export OPENSSL_STATIC=1
          export PKG_CONFIG_ALLOW_CROSS=1
          # 强制开启python-bindings
          cargo build --release \
            --target aarch64-linux-android \
            --features "python-bindings"

      - name: 打包并上传产物
        run: |
          mkdir -p dist
          cp target/aarch64-linux-android/release/rat_quickdns dist/
          chmod 755 dist/rat_quickdns
      - uses: actions/upload-artifact@v4
        with:
          name: rat_quickdns-arm64-ndk29
          path: dist/
