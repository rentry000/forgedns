name: Build DNS arm64 Android (零发热极速版)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: 写入零发热极速版DNS代码
        run: |
          cat > dns.go << 'EOF'
          package main

          import (
          	"log"
          	"math/rand"
          	"strings"
          	"sync"
          	"time"

          	"github.com/miekg/dns"
          )

          const (
          	ListenAddr  = "0.0.0.0:6005"
          	QueryTimeout = 1200 * time.Millisecond // 极速超时，快速失败
          	CacheMinTTL  = 300 * time.Second       // 最小缓存5分钟，减少网络请求
          	CacheMaxTTL  = 86400 * time.Second     // 最大缓存1天
          	CacheMaxSize = 65536                    // 最大缓存条目，覆盖日常所有访问
          )

          // 🔥 国内/海外上游，全量保留你的分流逻辑
          var (
          	chinaDNS = []string{
          		"223.5.5.5:53",
          		"223.6.6.6:53",
          		"114.114.114.114:53",
          		"119.29.29.29:53",
          	}
          	foreignDNS = []string{
          		"8.8.8.8:53",
          		"8.8.4.4:53",
          		"1.1.1.1:53",
          	}
          )

          // 🔥 缓存结构，零GC开销
          type cacheEntry struct {
          	resp      *dns.Msg
          	expireAt  time.Time
          }

          // 🔥 国内域名后缀前缀树，O(1)匹配，零CPU开销
          type domainTrie struct {
          	children map[string]*domainTrie
          	isEnd    bool
          }
          func newDomainTrie() *domainTrie {
          	return &domainTrie{children: make(map[string]*domainTrie)}
          }
          func (t *domainTrie) Insert(suffix string) {
          	parts := strings.Split(strings.TrimSuffix(suffix, "."), ".")
          	// 反向插入，实现后缀匹配
          	for i, j := 0, len(parts)-1; i < j; i, j = i+1, j-1 {
          		parts[i], parts[j] = parts[j], parts[i]
          	}
          	node := t
          	for _, part := range parts {
          		if _, ok := node.children[part]; !ok {
          			node.children[part] = newDomainTrie()
          		}
          		node = node.children[part]
          	}
          	node.isEnd = true
          }
          func (t *domainTrie) Match(domain string) bool {
          	parts := strings.Split(strings.TrimSuffix(domain, "."), ".")
          	// 反向匹配
          	for i, j := 0, len(parts)-1; i < j; i, j = i+1, j-1 {
          		parts[i], parts[j] = parts[j], parts[i]
          	}
          	node := t
          	for _, part := range parts {
          		child, ok := node.children[part]
          		if !ok {
          			break
          		}
          		node = child
          		if node.isEnd {
          			return true
          		}
          	}
          	return false
          }

          // 🔥 全局单例，零重复初始化
          var (
          	// 全局缓存，线程安全
          	dnsCache   = make(map[string]*cacheEntry)
          	cacheLock  sync.RWMutex
          	// 国内域名匹配树
          	chinaTrie  *domainTrie
          	// 复用DNS客户端，零内存重复分配
          	dnsClient  = &dns.Client{
          		Net:     "udp",
          		Timeout: QueryTimeout,
          		UDPSize: 4096,
          	}
          	// 随机数只初始化一次，零CPU浪费
          	rng = rand.New(rand.NewSource(time.Now().UnixNano()))
          )

          // 🔥 缓存自动清理，避免内存溢出+减少GC压力
          func startCacheCleaner() {
          	ticker := time.NewTicker(10 * time.Minute)
          	defer ticker.Stop()
          	for range ticker.C {
          		cacheLock.Lock()
          		now := time.Now()
          		for key, entry := range dnsCache {
          			if now.After(entry.expireAt) {
          				delete(dnsCache, key)
          			}
          		}
          		// 超过最大容量，清空过期缓存
          		if len(dnsCache) > CacheMaxSize {
          			dnsCache = make(map[string]*cacheEntry, CacheMaxSize)
          		}
          		cacheLock.Unlock()
          	}
          }

          // 🔥 并发查询所有上游，取最快返回的有效响应（极速核心）
          func concurrentQuery(r *dns.Msg, upstreams []string) *dns.Msg {
          	if len(upstreams) == 0 {
          		return nil
          	}
          	
          	resultChan := make(chan *dns.Msg, len(upstreams))
          	var wg sync.WaitGroup
          	
          	for _, upstream := range upstreams {
          		wg.Add(1)
          		go func(up string) {
          			defer wg.Done()
          			resp, _, err := dnsClient.Exchange(r.Copy(), up)
          			if err == nil && resp.Rcode == dns.RcodeSuccess && len(resp.Answer) > 0 {
          				select {
          				case resultChan <- resp:
          				default:
          				}
          			}
          		}(upstream)
          	}
          	
          	// 等待最快结果，超时返回nil
          	go func() {
          		wg.Wait()
          		close(resultChan)
          	}()
          	
          	select {
          	case resp := <-resultChan:
          		return resp
          	case <-time.After(QueryTimeout):
          		return nil
          	}
          }

          type dnsHandler struct{}

          func (h *dnsHandler) ServeDNS(w dns.ResponseWriter, r *dns.Msg) {
          	// 异常请求直接拒绝
          	if len(r.Question) == 0 {
          		dns.HandleFailed(w, r)
          		return
          	}
          	q := r.Question[0]
          	cacheKey := q.String()

          	// 🔥 第一步：优先查缓存，命中直接返回（微秒级响应，零网络IO，零发热）
          	cacheLock.RLock()
          	entry, hit := dnsCache[cacheKey]
          	cacheLock.RUnlock()
          	if hit && time.Now().Before(entry.expireAt) {
          		resp := entry.resp.Copy()
          		resp.Id = r.Id
          		_ = w.WriteMsg(resp)
          		return
          	}

          	// 🔥 第二步：匹配国内/海外上游
          	upstreams := foreignDNS
          	if chinaTrie.Match(strings.ToLower(q.Name)) {
          		upstreams = chinaDNS
          	}

          	// 🔥 第三步：并发查询最快上游，极速响应
          	resp := concurrentQuery(r, upstreams)
          	if resp == nil {
          		dns.HandleFailed(w, r)
          		return
          	}

          	// 🔥 第四步：写入缓存，下次请求直接命中
          	ttl := CacheMinTTL
          	if len(resp.Answer) > 0 {
          		// 取记录的最小TTL
          		for _, ans := range resp.Answer {
          			if ans.Header().Ttl < uint32(ttl.Seconds()) {
          				ttl = time.Duration(ans.Header().Ttl) * time.Second
          			}
          		}
          	}
          	if ttl < CacheMinTTL {
          		ttl = CacheMinTTL
          	}
          	if ttl > CacheMaxTTL {
          		ttl = CacheMaxTTL
          	}

          	cacheLock.Lock()
          	dnsCache[cacheKey] = &cacheEntry{
          		resp:      resp.Copy(),
          		expireAt:  time.Now().Add(ttl),
          	}
          	cacheLock.Unlock()

          	// 返回响应
          	_ = w.WriteMsg(resp)
          }

          func main() {
          	// 🔥 降发热核心：强制单核心运行，彻底消除多核心切换/唤醒，DNS是IO密集型，单核心完全足够
          	runtime.GOMAXPROCS(1)

          	// 初始化国内域名匹配树
          	chinaTrie = newDomainTrie()
          	chinaSuffix := []string{
          		".cn",
          		".com.cn",
          		".net.cn",
          		".org.cn",
          		".gov.cn",
          		".edu.cn",
          	}
          	for _, suf := range chinaSuffix {
          		chinaTrie.Insert(suf)
          	}

          	// 启动缓存自动清理
          	go startCacheCleaner()

          	// 启动DNS服务，UDP优化
          	log.Printf("✅ 零发热极速DNS启动成功，监听地址: %s", ListenAddr)
          	dns.HandleFunc(".", new(dnsHandler).ServeDNS)
          	
          	server := &dns.Server{
          		Addr:       ListenAddr,
          		Net:        "udp",
          		UDPSize:    4096,
          		// 🔥 UDP socket优化，减少内核CPU开销
          		ReadBufferSize: 4 * 1024 * 1024,
          		WriteBufferSize: 2 * 1024 * 1024,
          		ReusePort: true,
          	}
          	
          	log.Fatal(server.ListenAndServe())
          }
          EOF

      - name: 初始化Go模块
        run: |
          go mod init fastdns
          go mod tidy

      - name: 编译Android arm64 静态二进制
        run: |
          # 🔥 静态编译，零依赖，Android直接运行
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build -ldflags="-s -w -extldflags=-static" -o fastdns-arm64

      - name: 校验二进制
        run: |
          ls -lh fastdns-arm64
          file fastdns-arm64

      - name: 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-arm64-ultimate
          path: fastdns-arm64
