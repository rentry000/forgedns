name: Build DNS arm64 Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate dns.go
        run: |
          cat > dns.go << 'EOF'
          package main
          
          import (
          	"context"
          	"flag"
          	"log"
          	"math/rand"
          	"strings"
          	"time"
          
          	"github.com/phuslu/fastdns"
          )
          
          const (
          	ListenAddr = ":6005"
          )
          
          var chinaDNS = []string{
          	"223.5.5.5:53",
          	"223.6.6.6:53",
          	"114.114.114.114:53",
          	"119.29.29.29:53",
          }
          
          var foreignDNS = []string{
          	"8.8.8.8:53",
          	"8.8.4.4:53",
          	"1.1.1.1:53",
          	"1.0.0.1:53",
          }
          
          var chinaSuffix = []string{
          	".cn",
          	".com.cn",
          	".net.cn",
          	".org.cn",
          	".gov.cn",
          	".edu.cn",
          }
          
          type SmartDNS struct{}
          
          func randUpstream(servers []string) string {
          	rand.Seed(time.Now().UnixNano())
          	return servers[rand.Intn(len(servers))]
          }
          
          func isChinaDomain(name []byte) bool {
          	domain := strings.ToLower(string(name))
          	for _, s := range chinaSuffix {
          		if strings.HasSuffix(domain, s) {
          			return true
          		}
          	}
          	return false
          }
          
          func (s *SmartDNS) ServeDNS(rw fastdns.ResponseWriter, req *fastdns.Message) {
          	upstream := randUpstream(foreignDNS)
          	if isChinaDomain(req.Question.Name) {
          		upstream = randUpstream(chinaDNS)
          	}
          
          	resp := fastdns.AcquireMessage()
          	defer fastdns.ReleaseMessage(resp)
          
          	client := fastdns.Client{
          		Timeout: 5 * time.Second,
          		Addr:    upstream,
          	}
          
          	ctx, cancel := context.WithTimeout(context.Background(), 5*time.Second)
          	defer cancel()
          
          	if err := client.Exchange(ctx, req, resp); err != nil {
          		log.Printf("upstream %s error: %v", upstream, err)
          		return
          	}
          
          	_, _ = rw.Write(resp.Raw)
          }
          
          func main() {
          	flag.Parse()
          	log.Printf("smart dns server started on :6005")
          
          	handler := &SmartDNS{}
          	if err := fastdns.ListenAndServe("udp", ListenAddr, handler); err != nil {
          		log.Fatal(err)
          	}
          }
          EOF

      - name: Init go module
        run: |
          go mod init fastdns
          go mod tidy

      - name: Build android arm64
        run: |
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o fastdns-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-arm64
          path: fastdns-arm64
