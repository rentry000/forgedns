name: Build DNS arm64 Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate dns.go
        run: |
          cat > dns.go << 'EOF'
          package main
          
          import (
          	"flag"
          	"log"
          	"math/rand"
          	"strings"
          	"time"
          
          	"github.com/phuslu/fastdns"
          )
          
          const (
          	ListenAddr = "udp://:6005 tcp://:6005"
          )
          
          var chinaDNS = []string{
          	"223.5.5.5:53",
          	"223.6.6.6:53",
          	"114.114.114.114:53",
          	"119.29.29.29:53",
          }
          
          var foreignDNS = []string{
          	"8.8.8.8:53",
          	"8.8.4.4:53",
          	"1.1.1.1:53",
          	"1.0.0.1:53",
          }
          
          var chinaSuffix = []string{
          	".cn",
          	".com.cn",
          	".net.cn",
          	".org.cn",
          	".gov.cn",
          	".edu.cn",
          }
          
          type smartDNS struct{}
          
          func randUpstream(servers []string) string {
          	rand.Seed(time.Now().UnixNano())
          	return servers[rand.Intn(len(servers))]
          }
          
          func isChinaDomain(name []byte) bool {
          	domain := strings.ToLower(string(name))
          	for _, s := range chinaSuffix {
          		if strings.HasSuffix(domain, s) {
          			return true
          		}
          	}
          	return false
          }
          
          func (s *smartDNS) ServeDNS(w fastdns.ResponseWriter, m *fastdns.Message) {
          	if len(m.Question) == 0 {
          		return
          	}
          
          	q := m.Question[0]
          	up := randUpstream(foreignDNS)
          	if isChinaDomain(q.Name) {
          		up = randUpstream(chinaDNS)
          	}
          
          	c := fastdns.Client{Timeout: 5 * time.Second}
          	resp, err := c.Exchange(up, m)
          	if err != nil {
          		log.Printf("exchange error: %v", err)
          		return
          	}
          
          	w.WriteMsg(resp)
          }
          
          func main() {
          	flag.Parse()
          	log.Printf("dns server started on %s", ListenAddr)
          
          	parts := strings.Fields(ListenAddr)
          	if err := fastdns.Serve(parts[0], &smartDNS{}); err != nil {
          		log.Fatal(err)
          	}
          }
          EOF
          
      - name: Init go module
        run: |
          go mod init fastdns
          go mod tidy

      - name: Build android arm64
        run: |
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o fastdns-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-arm64
          path: fastdns-arm64
