name: Build DNS arm64 Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate dns.go
        run: |
          cat > dns.go << 'EOF'
          package main
          
          import (
          	"log"
          	"math/rand"
          	"strings"
          	"time"
          
          	"github.com/miekg/dns"
          )
          
          const (
          	ListenPort = ":6005"
          )
          
          var chinaDNS = []string{
          	"223.5.5.5:53",
          	"223.6.6.6:53",
          	"114.114.114.114:53",
          	"119.29.29.29:53",
          }
          
          var foreignDNS = []string{
          	"8.8.8.8:53",
          	"8.8.4.4:53",
          	"1.1.1.1:53",
          }
          
          var chinaSuffix = []string{
          	".cn",
          	".com.cn",
          	".net.cn",
          	".org.cn",
          	".gov.cn",
          	".edu.cn",
          }
          
          func randUp(servers []string) string {
          	rand.Seed(time.Now().UnixNano())
          	return servers[rand.Intn(len(servers))]
          }
          
          func isChinaDomain(qName string) bool {
          	name := strings.ToLower(qName)
          	for _, suf := range chinaSuffix {
          		if strings.HasSuffix(name, suf) {
          			return true
          		}
          	}
          	return false
          }
          
          type dnsHandler struct{}
          
          func (h *dnsHandler) ServeDNS(w dns.ResponseWriter, r *dns.Msg) {
          	msg := new(dns.Msg)
          	msg.SetReply(r)
          	msg.Compress = false
          
          	if len(r.Question) == 0 {
          		dns.HandleFailed(w, r)
          		return
          	}
          
          	q := r.Question[0]
          	upstream := randUp(foreignDNS)
          	if isChinaDomain(q.Name) {
          		upstream = randUp(chinaDNS)
          	}
          
          	// 这里修复：只接收 2 个返回值
          	resp, err := dns.Exchange(r, upstream)
          	if err != nil {
          		dns.HandleFailed(w, r)
          		return
          	}
          
          	w.WriteMsg(resp)
          }
          
          func main() {
          	log.Printf("DNS server started on 0.0.0.0:6005 (udp)")
          	
          	handler := new(dnsHandler)
          	dns.HandleFunc(".", handler.ServeDNS)
          	
          	server := &dns.Server{
          		Addr: ListenPort,
          		Net:  "udp",
          	}
          	
          	log.Fatal(server.ListenAndServe())
          }
          EOF

      - name: Init Go module
        run: |
          go mod init fastdns
          go mod tidy

      - name: Build Android arm64
        run: |
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o fastdns-arm64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-arm64
          path: fastdns-arm64
