name: Build DNS arm64 Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate dns.go
        run: |
          cat > dns.go << 'EOF'
          package main
          
          import (
          	"log"
          	"math/rand"
          	"net"
          	"strings"
          	"time"
          
          	"github.com/phuslu/fastdns"
          )
          
          const (
          	ListenAddr = ":6005"
          )
          
          var chinaDNS = []string{
          	"223.5.5.5:53",
          	"223.6.6.6:53",
          	"114.114.114.114:53",
          	"119.29.29.29:29",
          }
          
          var foreignDNS = []string{
          	"8.8.8.8:53",
          	"8.8.4.4:53",
          	"1.1.1.1:53",
          }
          
          var chinaSuffix = []string{
          	".cn", ".com.cn", ".net.cn", ".gov.cn", ".edu.cn",
          }
          
          func randUp() string {
          	rand.Seed(time.Now().UnixNano())
          	return chinaDNS[rand.Intn(len(chinaDNS))]
          }
          
          func randForeign() string {
          	rand.Seed(time.Now().UnixNano())
          	return foreignDNS[rand.Intn(len(foreignDNS))]
          }
          
          func isCN(name []byte) bool {
          	d := strings.ToLower(string(name))
          	for _, s := range chinaSuffix {
          		if strings.HasSuffix(d, s) {
          			return true
          		}
          	}
          	return false
          }
          
          func main() {
          	conn, err := net.ListenUDP("udp", &net.UDPAddr{Port: 6005})
          	if err != nil {
          		log.Fatal(err)
          	}
          	defer conn.Close()
          
          	log.Println("smart dns running on :6005 (udp)")
          
          	buf := make([]byte, 512)
          	for {
          		n, addr, err := conn.ReadFromUDP(buf)
          		if err != nil || n == 0 {
          			continue
          		}
          
          		req := &fastdns.Message{}
          		if err := req.Unmarshal(buf[:n]); err != nil {
          			continue
          		}
          
          		up := randForeign()
          		if isCN(req.Question.Name) {
          			up = randUp()
          		}
          
          		resp, err := fastdns.Exchange(up, req)
          		if err != nil {
          			continue
          		}
          
          		raw, _ := resp.Marshal()
          		_, _ = conn.WriteToUDP(raw, addr)
          	}
          }
          EOF
          
      - name: Init module
        run: |
          go mod init fastdns
          go mod tidy

      - name: Build arm64
        run: |
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o fastdns-arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-arm64
          path: fastdns-arm64
