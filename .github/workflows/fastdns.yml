name: Build DNS arm64 Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # 直接在 Action 里生成 dns.go，不需要你仓库有源码
      - name: Generate dns.go
        run: |
          cat > dns.go << 'EOF'
          package main

          import (
            "flag"
            "log"
            "math/rand"
            "net"
            "strings"
            "time"

            "github.com/phuslu/fastdns"
          )

          const (
            ListenAddr = "udp://:6005 tcp://:6005"
          )

          var chinaDNS = []string{
            "223.5.5.5:53",
            "223.6.6.6:53",
            "114.114.114.114:53",
            "119.29.29.29:53",
          }

          var foreignDNS = []string{
            "8.8.8.8:53",
            "8.8.4.4:53",
            "1.1.1.1:53",
            "1.0.0.1:53",
            "9.9.9.9:53",
          }

          var chinaSuffix = []string{
            ".cn", ".com.cn", ".net.cn", ".org.cn", ".gov.cn", ".edu.cn",
          }

          type smartDNS struct{}

          func randUpstream(servers []string) string {
            rand.Seed(time.Now().UnixNano())
            return servers[rand.Intn(len(servers))]
          }

          func isChinaDomain(domain string) bool {
            for _, s := range chinaSuffix {
              if strings.HasSuffix(domain, s) {
                return true
              }
            }
            return false
          }

          func (s *smartDNS) ServeDNS(rw fastdns.ResponseWriter, req *fastdns.Message) {
            domain := strings.TrimSuffix(req.Question.Domain, ".")
            up := randUpstream(foreignDNS)
            if isChinaDomain(domain) {
              up = randUpstream(chinaDNS)
            }
            _ = fastdns.ProxyUpstream(rw, req, up)
          }

          func dig(domain string) {
            req := &fastdns.Message{
              Question: fastdns.Question{Domain: domain, Type: fastdns.TypeA},
            }
            up := randUpstream(foreignDNS)
            if isChinaDomain(domain) {
              up = randUpstream(chinaDNS)
            }
            resp, err := fastdns.Exchange(up, req)
            if err != nil {
              log.Fatal(err)
            }
            log.Printf("domain: %s upstream: %s", domain, up)
            for _, ans := range resp.Answers {
              if a, ok := ans.(fastdns.ARecord); ok {
                log.Printf("A: %s", a.IP)
              }
            }
          }

          func main() {
            flag.Parse()
            if len(flag.Args()) == 0 {
              log.Printf("dns server started on %s", ListenAddr)
              log.Fatal(fastdns.ListenAndServe(strings.Fields(ListenAddr)..., &smartDNS{}))
              return
            }
            dig(flag.Arg(0))
          }
          EOF

      # 编译安卓 arm64 静态二进制
      - name: Build for android arm64
        run: |
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o fastdns-arm64

      # 上传成品
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-arm64
          path: fastdns-arm64
