name: Build MiSub Magisk Module (v2.5.0 Miniflare PrePacked Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 克隆MiSub v2.5.0+最新代码
      - name: Clone MiSub Repository
        run: |
          git clone --depth 1 https://github.com/imzyb/MiSub.git .

      # 2. 配置Node.js构建环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 构建前端产物 + 预打包arm64兼容依赖（修复npm参数报错）
      - name: Build & PreInstall Arm64 Compatible Dependencies
        run: |
          # 第一步：安装开发依赖，构建前端纯静态产物（无架构依赖）
          npm install --only=dev
          npm run build

          # 第二步：临时注入交叉编译环境变量，安装生产依赖+Miniflare
          # 核心修复：通过npm_config_* 环境变量指定目标架构，无全局配置报错
          # --ignore-scripts 跳过原生模块编译，Miniflare 3.x纯JS实现，跨架构兼容
          npm_config_arch=arm64 \
          npm_config_platform=linux \
          npm install miniflare@3 --only=prod --ignore-scripts --registry=https://registry.npmmirror.com

      # 4. 生成Miniflare启动脚本（稳定兼容版）
      - name: Create Miniflare Startup Script
        run: |
          cat << 'EOF' > start.js
          const { Miniflare } = require('miniflare');
          const path = require('path');
          const fs = require('fs');

          // 持久化数据目录（模块内，刷入不丢失）
          const dataDir = path.join(__dirname, 'data');
          if (!fs.existsSync(dataDir)) fs.mkdirSync(dataDir, { recursive: true });

          async function startServer() {
            const mf = new Miniflare({
              // 核心配置：适配Cloudflare Pages项目
              sitePath: path.join(__dirname, 'dist'),
              // 自动加载Pages入口_worker.js
              workers: [path.join(__dirname, 'dist/_worker.js')],
              
              // 监听配置：修复127.0.0.1无法访问，支持本机+同网段
              host: '0.0.0.0',
              port: 8787,
              
              // MiSub必需的环境变量与存储绑定
              bindings: {
                ADMIN_PASSWORD: process.env.ADMIN_PASSWORD || 'admin',
              },
              // D1数据库绑定（持久化，原生兼容MiSub所有SQL）
              d1Databases: {
                MISUB_DB: path.join(dataDir, 'misub.db'),
              },
              // KV存储绑定（持久化）
              kvNamespaces: {
                MISUB_KV: path.join(dataDir, 'kv'),
              },
              
              // 运行时优化，关闭不必要的开发功能
              watch: false,
              liveReload: false,
              disableCache: false,
              verbose: true,
            });

            // 启动服务
            const server = await mf.startServer();
            console.log(`=============================================`);
            console.log(`MiSub v2.5.0 启动成功！`);
            console.log(`本地访问地址：http://127.0.0.1:8787`);
            console.log(`同网段访问地址：http://手机IP:8787`);
            console.log(`管理后台入口：http://127.0.0.1:8787/login`);
            console.log(`默认管理员密码：admin`);
            console.log(`数据持久化目录：${dataDir}`);
            console.log(`=============================================`);

            // 优雅退出处理
            process.on('SIGTERM', async () => {
              await mf.dispose();
              server.close();
              process.exit(0);
            });
            process.on('SIGINT', async () => {
              await mf.dispose();
              server.close();
              process.exit(0);
            });
          }

          startServer().catch((err) => {
            console.error('MiSub启动失败：', err);
            process.exit(1);
          });
          EOF

      # 5. 打包Magisk模块（预打包所有依赖，刷入即用）
      - name: Package Magisk Module
        run: |
          # 创建模块目录结构
          mkdir -p magisk_module/misub
          mkdir -p magisk_module/misub/data
          
          # 复制所有核心文件：构建产物、启动脚本、预安装的node_modules
          cp -r dist start.js node_modules package.json magisk_module/misub/
          
          # 1. 模块基础信息配置
          cat << 'EOF' > magisk_module/module.prop
          id=misub_v250_miniflare_prepacked
          name=MiSub v2.5.0 Magisk (Miniflare预打包版)
          version=v2.5.0
          versionCode=250
          author=imzyb | Miniflare适配
          description=MiSub订阅管理工具，预打包arm64兼容Miniflare运行时，无需手机端联网安装，刷入即用，完美兼容Cloudflare原生API。
          updateJson=https://raw.githubusercontent.com/imzyb/MiSub/main/module_update.json
          EOF
          
          # 2. 开机自启脚本（无安装逻辑，直接启动）
          cat << 'EOF' > magisk_module/service.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          
          ############################## 请修改此处为你手机的Node.js可执行文件路径 ##############################
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          ########################################################################################################
          
          # 环境变量初始化
          export PATH="${NODE_BIN%/*}:$PATH"
          export NODE_ENV=production
          # 自定义管理员密码（修改此处后重启模块生效）
          export ADMIN_PASSWORD="admin"
          
          # 日志文件路径
          LOG_FILE="$MODDIR/run.log"
          APP_DIR="$MODDIR/misub"
          
          # 清空旧日志
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] MiSub模块启动中..." > $LOG_FILE
          
          # 等待系统启动完成
          until [ "$(getprop sys.boot_completed)" = "1" ]; do
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 等待系统启动完成..." >> $LOG_FILE
            sleep 5
          done
          
          # 检查Node.js环境是否可用
          if [ ! -x "$NODE_BIN" ]; then
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 错误：Node.js二进制文件不存在或无执行权限，路径：$NODE_BIN" >> $LOG_FILE
            exit 1
          fi
          
          # 验证Node.js版本
          NODE_VERSION=$($NODE_BIN -v 2>> $LOG_FILE)
          if [ $? -ne 0 ]; then
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 错误：Node.js执行失败，请检查架构是否匹配（需arm64版本）" >> $LOG_FILE
            exit 1
          fi
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Node.js版本：$NODE_VERSION" >> $LOG_FILE
          
          # 进入应用目录
          cd $APP_DIR
          
          # 检查端口是否被占用
          if netstat -tulpn | grep -q :8787; then
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 警告：8787端口被占用，尝试终止占用进程..." >> $LOG_FILE
            fuser -k 8787/tcp >> $LOG_FILE 2>&1
            sleep 2
          fi
          
          # 直接启动MiSub服务（无需安装依赖）
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] 启动MiSub服务..." >> $LOG_FILE
          $NODE_BIN start.js >> $LOG_FILE 2>&1 &
          
          # 记录服务PID
          echo $! > $MODDIR/service.pid
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] 服务启动完成，PID：$(cat $MODDIR/service.pid)" >> $LOG_FILE
          EOF
          
          # 3. 模块卸载脚本
          cat << 'EOF' > magisk_module/uninstall.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          # 终止服务进程
          if [ -f "$MODDIR/service.pid" ]; then
            kill -9 $(cat $MODDIR/service.pid) 2>/dev/null
          fi
          # 清理端口占用
          fuser -k 8787/tcp 2>/dev/null
          # 删除模块文件
          rm -rf $MODDIR
          EOF
          
          # 赋予脚本执行权限
          chmod 755 magisk_module/service.sh
          chmod 755 magisk_module/uninstall.sh
          
          # 打包模块
          cd magisk_module && zip -r ../MiSub_v250_Magisk_Miniflare_PrePacked.zip .

      # 6. 上传构建产物
      - name: Upload Magisk Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSub-v250-Magisk-Miniflare-PrePacked
          path: MiSub_v250_Magisk_Miniflare_PrePacked.zip
