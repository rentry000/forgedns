name: 自动构建 MiSub Magisk 模块卡刷包
on:
  push:
    tags:
      - 'v*'
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-misub-magisk-module:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 初始化系统环境
        run: |
          sudo apt-get update
          sudo apt-get install -y git jq zip tree

      - name: 2. 拉取 MiSub 官方最新完整代码（先拉取代码，保证lock文件存在）
        run: |
          git clone --depth=1 https://github.com/imzyb/MiSub.git
          cd MiSub
          echo "=== 代码拉取完成，项目核心信息 ==="
          cat package.json | jq '.name, .version, .type'
          echo "✅ package-lock.json 已就绪"
          ls -la package-lock.json

      - name: 3. 安装 Node.js 20 LTS 稳定版（移除cache配置，彻底解决锁文件报错）
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 严格按照package-lock.json安装全量依赖
        working-directory: ./MiSub
        run: |
          # 1. 用npm ci严格按照lock文件安装，100%匹配官方版本
          npm ci --force --no-audit
          # 2. 补装运行时核心依赖（Express服务+SQLite数据库）
          npm install express better-sqlite3 --save --force --no-audit
          # 3. 兜底优化vite配置
          if [ -f "vite.config.js" ]; then
            sed -i 's/export default defineConfig({/export default defineConfig({\n  build: { minify: "esbuild" },/' vite.config.js
            echo "✅ vite配置优化完成"
          fi
          # 校验依赖安装结果
          echo "=== 依赖安装完成，核心模块版本 ==="
          npm list vite @vitejs/plugin-vue vue express better-sqlite3

      - name: 5. 构建前端静态文件
        working-directory: ./MiSub
        run: |
          npm run build -- --mode production --emptyOutDir --logLevel warn
          # 校验构建结果
          echo "=== 前端构建结果校验 ==="
          if [ -d "./dist" ] && [ -f "./dist/index.html" ]; then
            echo "✅ 前端dist目录构建成功"
            tree -L 2 ./dist
          else
            echo "❌ 前端构建失败"
            exit 1
          fi

      - name: 6. 精简依赖，减小模块体积
        working-directory: ./MiSub
        run: |
          echo "=== 开始精简node_modules ==="
          # 剔除运行时无用的开发依赖
          npm uninstall vitest happy-dom miniflare wrangler @vue/test-utils --save-dev
          # 剔除其他系统的二进制包，仅保留Android arm64适配文件
          rm -rf node_modules/esbuild/darwin-* node_modules/esbuild/win32-* node_modules/esbuild/linux-x64 node_modules/esbuild/linux-ia32 node_modules/esbuild/linux-riscv64 node_modules/esbuild/linux-s390x node_modules/esbuild/linux-mips64el node_modules/esbuild/linux-ppc64 node_modules/esbuild/freebsd-* node_modules/esbuild/netbsd-* node_modules/esbuild/openbsd-* node_modules/esbuild/aix-* node_modules/esbuild/openharmony-*
          rm -rf node_modules/@esbuild/ node_modules/lightningcss-* node_modules/@tailwindcss/oxide-*
          # 剔除无用文档、测试文件
          find node_modules -type d -name "test" -o -name "tests" -o -name "docs" -o -name "example" -o -name "examples" | xargs rm -rf
          find node_modules -name "*.md" -o -name "*.txt" -o -name "LICENSE" | xargs rm -f
          echo "✅ 依赖精简完成，最终大小："
          du -sh node_modules

      - name: 7. 生成Magisk模块全量文件
        working-directory: ./MiSub
        run: |
          # 创建模块目录结构
          mkdir -p magisk-module/META-INF/com/google/android
          mkdir -p magisk-module/conf
          mkdir -p magisk-module/misub

          # 1. module.prop 模块信息
          cat > magisk-module/module.prop << EOF
          id=misub-magisk
          name=MiSub 订阅转换Magisk模块
          version=$(cat package.json | jq -r '.version')
          versionCode=$(date +%Y%m%d)
          author=imzyb & Magisk适配
          description=MiSub订阅转换工具，完整Web管理界面，开机自启，复用/data/adb/modules/subs-goaway/bin/output/node
          minMagisk=20000
          EOF
          
                    # 2. service.sh 开机自启+进程守护
                    cat > magisk-module/service.sh << 'EOF'
          #!/system/bin/sh
          until [ -d /data/adb ]; do
              sleep 1
          done
          
          MODDIR=${0%/*}
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          MISUB_DIR="$MODDIR/misub"
          ENV_FILE="$MODDIR/conf/env.config"
          LOG_FILE="$MODDIR/run.log"
          PID_FILE="$MODDIR/service.pid"
          
          echo "[$(date "+%Y-%m-%d %H:%M:%S")] MiSub服务启动中..." > $LOG_FILE
          
          if [ ! -f "$NODE_BIN" ]; then
              echo "[$(date "+%Y-%m-%d %H:%M:%S")] 错误：Node.js二进制不存在，路径：$NODE_BIN" >> $LOG_FILE
              exit 1
          fi
          chmod 755 $NODE_BIN
          
          if [ -f "$ENV_FILE" ]; then
              export $(grep -v '^#' $ENV_FILE | xargs)
              echo "[$(date "+%Y-%m-%d %H:%M:%S")] 加载自定义配置成功" >> $LOG_FILE
          else
              export PORT=3000
              export ADMIN_PASSWORD=admin123
              export COOKIE_SECRET=misub-magisk-random-secret-64bit-$(date +%s)
              export DB_PATH="$MODDIR/misub.db"
          fi
          
          chmod 755 $MISUB_DIR
          chmod 644 $MISUB_DIR/app.js
          chmod -R 644 $MISUB_DIR/dist $MISUB_DIR/functions
          chmod 755 $MISUB_DIR/node_modules/.bin/* 2>/dev/null
          
          if [ -f "$PID_FILE" ]; then
              old_pid=$(cat $PID_FILE)
              if kill -0 $old_pid 2>/dev/null; then
                  kill -9 $old_pid
                  echo "[$(date "+%Y-%m-%d %H:%M:%S")] 停止旧进程成功，PID：$old_pid" >> $LOG_FILE
              fi
              rm -f $PID_FILE
          fi
          
          start_misub() {
              cd $MISUB_DIR
              setsid $NODE_BIN app.js >> $LOG_FILE 2>&1 &
              service_pid=$!
              echo $service_pid > $PID_FILE
              echo "[$(date "+%Y-%m-%d %H:%M:%S")] 服务启动成功，PID：$service_pid，端口：$PORT" >> $LOG_FILE
          }
          
          start_misub
          
          while true; do
              sleep 30
              current_pid=$(cat $PID_FILE 2>/dev/null)
              if [ -z "$current_pid" ] || ! kill -0 $current_pid 2>/dev/null; then
                  echo "[$(date "+%Y-%m-%d %H:%M:%S")] 服务异常退出，正在重启..." >> $LOG_FILE
                  start_misub
              fi
          done
          EOF
          
                    # 3. stop.sh 服务停止脚本
                    cat > magisk-module/stop.sh << 'EOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          PID_FILE="$MODDIR/service.pid"
          
          if [ -f "$PID_FILE" ]; then
              pid=$(cat $PID_FILE)
              if kill -0 $pid 2>/dev/null; then
                  kill -9 $pid
                  echo "MiSub服务已停止，PID：$pid"
              fi
              rm -f $PID_FILE
          fi
          rm -f $MODDIR/run.log
          EOF
          
                    # 4. env.config 自定义配置
                    cat > magisk-module/conf/env.config << 'EOF'
          PORT=3000
          ADMIN_PASSWORD=admin123
          COOKIE_SECRET=misub-magisk-your-custom-secret-2024
          DB_PATH=/data/adb/modules/misub-magisk/misub.db
          EOF
          
                    # 5. app.js 服务入口
                    cat > magisk-module/misub/app.js << 'EOF'
          import express from 'express';
          import fs from 'fs';
          import path from 'path';
          import Database from 'better-sqlite3';
          import { fileURLToPath } from 'url';
          
          const __filename = fileURLToPath(import.meta.url);
          const __dirname = path.dirname(__filename);
          
          const app = express();
          const PORT = process.env.PORT || 3000;
          const DB_PATH = process.env.DB_PATH || path.join(__dirname, 'misub.db');
          
          const db = new Database(DB_PATH);
          try {
              const schemaSql = fs.readFileSync(path.join(__dirname, 'schema.sql'), 'utf8');
              db.exec(schemaSql);
              console.log("✅ 数据库表结构初始化成功");
          } catch (err) {
              console.warn("⚠️ 表结构已存在，跳过初始化", err.message);
          }
          try {
              db.exec(`
              CREATE TABLE IF NOT EXISTS kv (
                key TEXT PRIMARY KEY,
                value TEXT NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              `);
          } catch (err) {
              console.warn("⚠️ KV表已存在，跳过初始化", err.message);
          }
          
          app.use(express.json({ limit: '50mb' }));
          app.use(express.urlencoded({ extended: true }));
          
          function sendResponse(res, workerResponse) {
              res.status(workerResponse.status);
              workerResponse.headers.forEach((value, key) => res.setHeader(key, value));
              workerResponse.body?.pipe(res) || res.send(workerResponse.body);
          }
          
          function createContext(req, res) {
              const url = new URL(req.url, `http://${req.headers.host}`);
              return {
                  request: new Request(url, {
                      method: req.method,
                      headers: req.headers,
                      body: req.method !== 'GET' && req.method !== 'HEAD' ? req.body : undefined,
                      duplex: 'half'
                  }),
                  env: {
                      MISUB_DB: {
                          prepare: (sql) => {
                              const stmt = db.prepare(sql);
                              return {
                                  all: (...params) => stmt.all(...params),
                                  run: (...params) => stmt.run(...params),
                                  get: (...params) => stmt.get(...params),
                              };
                          },
                          exec: (sql) => db.exec(sql)
                      },
                      MISUB_KV: {
                          get: (key) => db.prepare('SELECT value FROM kv WHERE key = ?').get(key)?.value,
                          put: (key, value) => db.prepare('REPLACE INTO kv (key, value) VALUES (?, ?)').run(key, value),
                          delete: (key) => db.prepare('DELETE FROM kv WHERE key = ?').run(key),
                      },
                      ADMIN_PASSWORD: process.env.ADMIN_PASSWORD || 'admin123',
                      COOKIE_SECRET: process.env.COOKIE_SECRET || 'misub-magisk-default-secret',
                  },
                  waitUntil: (promise) => promise.catch(console.error),
                  params: {},
                  data: {}
              };
          }
          
          const functionsPath = path.join(__dirname, 'functions');
          app.all('*', async (req, res, next) => {
              const reqPath = req.path;
              let targetFile = '';
              if (reqPath.startsWith('/api')) {
                  const apiPath = reqPath.slice(4);
                  const directFile = path.join(functionsPath, `${apiPath}.js`);
                  const indexFile = path.join(functionsPath, apiPath, 'index.js');
                  if (fs.existsSync(directFile)) targetFile = directFile;
                  else if (fs.existsSync(indexFile)) targetFile = indexFile;
              }
          
              if (targetFile && fs.existsSync(targetFile)) {
                  try {
                      const handlerModule = await import(`file://${targetFile}`);
                      const handler = handlerModule.default || handlerModule.onRequest;
                      if (handler) {
                          const context = createContext(req, res);
                          const response = await handler(context);
                          return sendResponse(res, response);
                      }
                  } catch (err) {
                      console.error(`API执行错误 [${reqPath}]:`, err);
                      return res.status(500).json({ error: '服务器内部错误', detail: err.message });
                  }
              }
          
              next();
          });
          
          app.use(express.static(path.join(__dirname, 'dist')));
          
          app.get('*', (req, res) => {
              const indexPath = path.join(__dirname, 'dist', 'index.html');
              if (fs.existsSync(indexPath)) {
                  res.sendFile(indexPath);
              } else {
                  res.status(404).send('前端文件未找到，请检查模块安装是否完整');
              }
          });
          
          app.listen(PORT, '0.0.0.0', () => {
              console.log(`=================================`);
              console.log(`MiSub Magisk模块 服务启动成功`);
              console.log(`访问地址: http://0.0.0.0:${PORT}`);
              console.log(`管理员密码: ${process.env.ADMIN_PASSWORD || 'admin123'}`);
              console.log(`数据库文件: ${DB_PATH}`);
              console.log(`=================================`);
          });
          EOF
          
                    # 6. update-binary 卡刷安装脚本
                    cat > magisk-module/META-INF/com/google/android/update-binary << 'EOF'
          #!/sbin/sh
          umask 022
          OUTFD=$2
          ZIPFILE=$3
          MODDIR=/data/adb/modules/misub-magisk
          
          ui_print() {
              echo -n -e "ui_print $1\n" > /proc/self/fd/$OUTFD
              echo -n -e "ui_print\n" > /proc/self/fd/$OUTFD
          }
          
          ui_print "*******************************"
          ui_print "MiSub 订阅转换 Magisk 模块"
          ui_print "版本: $(grep 'version=' $MODDIR/module.prop | cut -d'=' -f2 2>/dev/null || echo "latest")"
          ui_print "*******************************"
          
          mkdir -p $MODDIR
          mkdir -p $MODDIR/conf
          mkdir -p $MODDIR/misub
          
          ui_print "- 正在解压模块文件"
          unzip -o "$ZIPFILE" 'module.prop' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'service.sh' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'stop.sh' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'conf/*' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'misub/*' -d $MODDIR >/dev/null 2>&1
          
          ui_print "- 正在设置文件权限"
          chmod 644 $MODDIR/module.prop
          chmod 755 $MODDIR/service.sh
          chmod 755 $MODDIR/stop.sh
          chmod 755 $MODDIR/misub
          chmod 644 $MODDIR/conf/env.config
          chmod -R 644 $MODDIR/misub/*
          chmod 755 $MODDIR/misub/node_modules/.bin/* 2>/dev/null
          
          ui_print "- 安装完成"
          ui_print "- 请重启手机生效"
          ui_print "- 重启后访问: http://手机IP:3000"
          ui_print "- 默认管理员密码: admin123"
          ui_print "*******************************"
          exit 0
          EOF
          
          # 7. 标准updater-script
          touch magisk-module/META-INF/com/google/android/updater-script

          # 复制项目核心文件
          echo "- 正在复制项目核心文件"
          cp -r dist functions schema.sql package.json node_modules magisk-module/misub/

          # 设置权限
          chmod 755 magisk-module/service.sh
          chmod 755 magisk-module/stop.sh
          chmod 755 magisk-module/META-INF/com/google/android/update-binary

          # 打包卡刷包
          MOD_VERSION=$(cat package.json | jq -r '.version')
          BUILD_DATE=$(date +%Y%m%d)
          ZIP_NAME="MiSub-Magisk-v${MOD_VERSION}-${BUILD_DATE}.zip"
          cd magisk-module
          zip -r ../$ZIP_NAME *
          cd ..
          echo "✅ Magisk模块卡刷包打包完成: $ZIP_NAME"
          ls -lh $ZIP_NAME

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV

      - name: 8. 上传模块包到Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ./MiSub/${{ env.ZIP_NAME }}
          retention-days: 90

      - name: 9. 打Tag自动发布Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MiSub Magisk模块 ${{ env.MOD_VERSION }}
          body: |
            ## MiSub 订阅转换 Magisk 模块
            严格按照官方package-lock.json锁定版本构建，完整保留所有原生功能，开机自启，进程守护。
            ### 使用说明
            1. 前置依赖：手机已刷入subs-goaway模块，确保Node.js路径 `/data/adb/modules/subs-goaway/bin/output/node` 存在
            2. 下载zip包，Magisk中刷入
            3. 重启手机生效
            4. 访问 `http://手机IP:3000`，默认密码 `admin123`
          files: ./MiSub/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
