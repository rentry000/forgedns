name: MiSub Magisk模块API全兼容版
on:
  push:
    tags:
      - 'v*'
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-misub-magisk:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 初始化环境
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git jq zip tree
          npm config set audit false
          npm config set fund false

      - name: 2. 拉取MiSub官方源码
        run: |
          git clone --depth=1 https://github.com/imzyb/MiSub.git
          cd MiSub
          echo "✅ 官方代码拉取完成，版本: $(cat package.json | jq -r '.version')"

      - name: 3. 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          check-latest: true

      - name: 4. 安装全量依赖
        working-directory: ./MiSub
        run: |
          npm ci
          npm install express sql.js node-fetch https-proxy-agent --save --save-exact
          npx vite --version
          echo "✅ 依赖安装完成"

      - name: 5. 前端构建（修复BASE_URL）
        working-directory: ./MiSub
        run: |
          npm run build -- --mode production --emptyOutDir --base=/
          if [ -d "./dist" ] && [ -f "./dist/index.html" ]; then
            echo "✅ 前端构建成功"
            tree ./dist -L 2
          else
            echo "❌ 前端构建失败"
            exit 1
          fi

      - name: 6. 清理开发依赖，仅保留生产依赖
        working-directory: ./MiSub
        run: |
          rm -rf node_modules package-lock.json
          npm install express sql.js node-fetch https-proxy-agent --save --save-exact
          npm prune --production
          rm -rf node_modules/**/*.node
          echo "✅ 生产依赖安装完成"
          npm ls --prod

      - name: 7. 生成Magisk模块文件
        working-directory: ./MiSub
        run: |
          mkdir -p magisk-module/META-INF/com/google/android
          mkdir -p magisk-module/conf
          mkdir -p magisk-module/misub

          MOD_VERSION=$(cat package.json | jq -r '.version')
          BUILD_DATE=$(date +%Y%m%d)
          ZIP_NAME="MiSub-Magisk-API-Full-v${MOD_VERSION}-${BUILD_DATE}.zip"

          # 1. module.prop
          cat > magisk-module/module.prop << EOF
          id=misub-magisk-stable
          name=MiSub 订阅转换API全兼容版
          version=${MOD_VERSION}
          versionCode=${BUILD_DATE}
          author=imzyb & Magisk适配
          description=MiSub订阅转换工具，API全兼容，无404报错，全架构适配
          minMagisk=20000
          EOF
          
                    # 2. app.js 修复版
                    cat > magisk-module/misub/app.js << 'EOF'
          import express from 'express';
          import fs from 'fs';
          import path from 'path';
          import initSqlJs from 'sql.js';
          import { fileURLToPath } from 'url';
          import fetch from 'node-fetch';
          import { HttpsProxyAgent } from 'https-proxy-agent';
          
          const __filename = fileURLToPath(import.meta.url);
          const __dirname = path.dirname(__filename);
          globalThis.fetch = fetch;
          
          const app = express();
          const PORT = process.env.PORT || 3000;
          const HOST = process.env.HOST || '0.0.0.0';
          const DB_PATH = process.env.DB_PATH || path.join(__dirname, 'misub.db');
          const ADMIN_PASSWORD = process.env.ADMIN_PASSWORD || 'admin123';
          const COOKIE_SECRET = process.env.COOKIE_SECRET || 'misub-magisk-default-secret';
          const functionsPath = path.join(__dirname, 'functions');
          
          app.use(express.json({ limit: '100mb' }));
          app.use(express.urlencoded({ extended: true }));
          
          app.use((req, res, next) => {
              res.header('Access-Control-Allow-Origin', '*');
              res.header('Access-Control-Allow-Methods', 'GET, POST, PUT, DELETE, PATCH, OPTIONS');
              res.header('Access-Control-Allow-Headers', 'Content-Type, Authorization, Cookie');
              res.header('Access-Control-Allow-Credentials', 'true');
              if (req.method === 'OPTIONS') {
                  return res.status(204).end();
              }
              next();
          });
          
          globalThis.misubFetch = async (url, options = {}) => {
              const defaultOptions = {
                  follow: 20,
                  timeout: 30000,
                  headers: {
                      'User-Agent': 'ClashMetaForAndroid/3.4.0',
                      'Accept': '*/*',
                      ...options.headers
                  }
              };
              return fetch(url, { ...defaultOptions, ...options });
          };
          
          let db;
          async function initDB() {
              const SQL = await initSqlJs();
              if (fs.existsSync(DB_PATH)) {
                  const fileBuffer = fs.readFileSync(DB_PATH);
                  db = new SQL.Database(fileBuffer);
                  console.log("✅ 数据库加载成功");
              } else {
                  db = new SQL.Database();
                  const schemaSql = fs.readFileSync(path.join(__dirname, 'schema.sql'), 'utf8');
                  db.exec(schemaSql);
                  db.exec(`
                  CREATE TABLE IF NOT EXISTS kv (
                      key TEXT PRIMARY KEY,
                      value TEXT NOT NULL,
                      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                  );
                  `);
                  const data = db.export();
                  fs.writeFileSync(DB_PATH, Buffer.from(data));
                  console.log("✅ 数据库初始化成功");
              }
          }
          
          const dbWrapper = {
              prepare: (sql) => {
                  const stmt = db.prepare(sql);
                  return {
                      all: async (...params) => {
                          stmt.bind(params);
                          const result = [];
                          while (stmt.step()) {
                              result.push(stmt.getAsObject());
                          }
                          stmt.reset();
                          return { results: result };
                      },
                      run: async (...params) => {
                          stmt.bind(params);
                          stmt.step();
                          stmt.reset();
                          const data = db.export();
                          fs.writeFileSync(DB_PATH, Buffer.from(data));
                          return { success: true, changes: db.getRowsModified(), meta: { changes: db.getRowsModified() } };
                      },
                      get: async (...params) => {
                          stmt.bind(params);
                          const result = stmt.step() ? stmt.getAsObject() : null;
                          stmt.reset();
                          return result;
                      },
                  };
              },
              exec: async (sql) => {
                  db.exec(sql);
                  const data = db.export();
                  fs.writeFileSync(DB_PATH, Buffer.from(data));
                  return { success: true };
              }
          };
          
          const kvWrapper = {
              get: async (key) => {
                  const res = await dbWrapper.prepare('SELECT value FROM kv WHERE key = ?').get(key);
                  return res?.value || null;
              },
              put: async (key, value) => {
                  await dbWrapper.prepare('REPLACE INTO kv (key, value) VALUES (?, ?)').run(key, value);
                  return true;
              },
              delete: async (key) => {
                  await dbWrapper.prepare('DELETE FROM kv WHERE key = ?').run(key);
                  return true;
              },
              list: async () => {
                  const res = await dbWrapper.prepare('SELECT key, value FROM kv').all();
                  return res.results || [];
              }
          };
          
          globalThis.env = {
              MISUB_DB: dbWrapper,
              MISUB_KV: kvWrapper,
              ADMIN_PASSWORD,
              COOKIE_SECRET,
              NODE_ENV: 'production'
          };
          
          app.all('/api/*', async (req, res) => {
              try {
                  const reqPath = req.path.replace(/^\/api\//, '');
                  let targetFile = '';
          
                  const directFile = path.join(functionsPath, `${reqPath}.js`);
                  const indexFile = path.join(functionsPath, reqPath, 'index.js');
                  const rootIndexFile = path.join(functionsPath, reqPath + '/index.js');
          
                  if (fs.existsSync(directFile)) {
                      targetFile = directFile;
                  } else if (fs.existsSync(indexFile)) {
                      targetFile = indexFile;
                  } else if (fs.existsSync(rootIndexFile)) {
                      targetFile = rootIndexFile;
                  } else {
                      return res.status(404).json({ error: 'API not found', path: req.path });
                  }
          
                  const url = new URL(req.url, `http://127.0.0.1:${PORT}`);
                  const request = new Request(url, {
                      method: req.method,
                      headers: req.headers,
                      body: req.method !== 'GET' && req.method !== 'HEAD' ? JSON.stringify(req.body) : undefined,
                      duplex: 'half'
                  });
          
                  const context = {
                      request,
                      env: globalThis.env,
                      waitUntil: (promise) => promise.catch(console.error),
                      params: {},
                      data: {}
                  };
          
                  const handlerModule = await import(`file://${targetFile}`);
                  const handler = handlerModule.default || handlerModule.onRequest || handlerModule.onRequestGet || handlerModule.onRequestPost;
                  
                  if (!handler) {
                      return res.status(500).json({ error: 'API handler not found', file: targetFile });
                  }
          
                  const response = await handler(context);
                  res.status(response.status || 200);
                  
                  if (response.headers) {
                      if (response.headers.forEach) {
                          response.headers.forEach((value, key) => res.setHeader(key, value));
                      } else {
                          Object.keys(response.headers).forEach(key => res.setHeader(key, response.headers[key]));
                      }
                  }
          
                  if (response.body) {
                      const body = await response.text();
                      try {
                          const jsonBody = JSON.parse(body);
                          return res.json(jsonBody);
                      } catch {
                          return res.send(body);
                      }
                  }
                  return res.end();
          
              } catch (err) {
                  console.error(`API错误 [${req.path}]:`, err);
                  return res.status(500).json({ error: '服务器内部错误', detail: err.message });
              }
          });
          
          app.use(express.static(path.join(__dirname, 'dist'), {
              maxAge: '1d',
              setHeaders: (res, filePath) => {
                  if (filePath.endsWith('.html')) {
                      res.setHeader('Cache-Control', 'no-cache');
                  }
              }
          }));
          
          app.get('*', (req, res) => {
              const indexPath = path.join(__dirname, 'dist', 'index.html');
              if (fs.existsSync(indexPath)) {
                  res.sendFile(indexPath);
              } else {
                  res.status(404).send('前端文件缺失');
              }
          });
          
          process.on('uncaughtException', (err) => {
              console.error('未捕获异常:', err);
          });
          process.on('unhandledRejection', (err) => {
              console.error('未处理Promise拒绝:', err);
          });
          
          initDB().then(() => {
              app.listen(PORT, HOST, () => {
                  console.log(`MiSub Magisk版启动成功，监听 http://${HOST}:${PORT}`);
              });
          }).catch(err => {
              console.error("数据库初始化失败:", err);
              process.exit(1);
          });
          EOF
          
                    # 3. service.sh
                    cat > magisk-module/service.sh << 'EOF'
          #!/system/bin/sh
          until [ -d /data/adb ]; do
              sleep 1
          done
          
          MODDIR=${0%/*}
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          MISUB_DIR="$MODDIR/misub"
          ENV_FILE="$MODDIR/conf/env.config"
          LOG_FILE="$MODDIR/run.log"
          ERROR_LOG="$MODDIR/error.log"
          PID_FILE="$MODDIR/service.pid"
          CRASH_COUNT=0
          MAX_CRASH=10
          
          log_info() {
              echo "[$(date "+%Y-%m-%d %H:%M:%S")] [INFO] $1" >> $LOG_FILE
          }
          log_error() {
              echo "[$(date "+%Y-%m-%d %H:%M:%S")] [ERROR] $1" >> $ERROR_LOG
          }
          
          > $LOG_FILE
          > $ERROR_LOG
          log_info "=== 服务启动开始 ==="
          
          log_info "等待系统开机完成..."
          until [ "$(getprop sys.boot_completed)" = "1" ]; do
              sleep 2
          done
          log_info "系统开机完成"
          
          log_info "等待网络就绪..."
          NETWORK_READY=0
          for i in {1..60}; do
              if ping -c 1 -W 2 223.5.5.5 >/dev/null 2>&1; then
                  NETWORK_READY=1
                  break
              fi
              sleep 1
          done
          if [ $NETWORK_READY -eq 1 ]; then
              log_info "网络就绪"
          else
              log_error "网络超时"
          fi
          
          if [ -f "$ENV_FILE" ]; then
              export $(grep -v '^#' $ENV_FILE | xargs) 2>> $ERROR_LOG
              log_info "加载自定义配置成功"
          else
              export PORT=3000
              export HOST=0.0.0.0
              export ADMIN_PASSWORD=admin123
              export COOKIE_SECRET=misub-magisk-$(head -c 32 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9')
              export DB_PATH="$MODDIR/misub.db"
              log_info "使用默认配置"
          fi
          
          export NODE_TLS_REJECT_UNAUTHORIZED=0
          export NODE_EXTRA_CA_CERTS=/system/etc/security/cacerts
          export ANDROID_DNS_MODE=local
          export NODE_ENV=production
          export NODE_OPTIONS="--dns-result-order=ipv4first"
          
          setenforce 0 2>/dev/null
          chcon -R u:object_r:system_file:s0 $MODDIR 2>/dev/null
          chcon u:object_r:system_file:s0 $NODE_BIN 2>/dev/null
          
          chmod 755 $NODE_BIN
          chmod 755 $MISUB_DIR
          chmod 755 $MISUB_DIR/functions
          chmod 644 $MISUB_DIR/app.js
          chmod -R 755 $MISUB_DIR/node_modules
          chmod -R 644 $MISUB_DIR/dist
          chmod 644 $MISUB_DIR/schema.sql
          chmod 600 $ENV_FILE 2>/dev/null
          
          iptables -C OUTPUT -m owner --uid-owner 0 -j ACCEPT 2>/dev/null || iptables -A OUTPUT -m owner --uid-owner 0 -j ACCEPT 2>> $ERROR_LOG
          iptables -t nat -C OUTPUT -m owner --uid-owner 0 -j ACCEPT 2>/dev/null || iptables -t nat -A OUTPUT -m owner --uid-owner 0 -j ACCEPT 2>> $ERROR_LOG
          iptables -C INPUT -p tcp --dport $PORT -j ACCEPT 2>/dev/null || iptables -A INPUT -p tcp --dport $PORT -j ACCEPT 2>> $ERROR_LOG
          
          setprop net.dns1 223.5.5.5 2>/dev/null
          setprop net.dns2 8.8.8.8 2>/dev/null
          
          if [ -f "$PID_FILE" ]; then
              old_pid=$(cat $PID_FILE 2>/dev/null)
              if [ -n "$old_pid" ]; then
                  kill -9 $old_pid 2>/dev/null
              fi
              rm -f $PID_FILE
          fi
          pkill -9 node 2>/dev/null
          killall -9 node 2>/dev/null
          sleep 1
          
          if [ ! -f "$NODE_BIN" ]; then
              log_error "Node.js不存在，请安装subs-goaway模块"
              exit 1
          fi
          
          start_service() {
              cd $MISUB_DIR
              $NODE_BIN app.js >> $LOG_FILE 2>> $ERROR_LOG &
              service_pid=$!
              echo $service_pid > $PID_FILE
              log_info "服务启动，PID: $service_pid"
              CRASH_COUNT=0
          }
          
          start_service
          
          while true; do
              sleep 10
              current_pid=$(cat $PID_FILE 2>/dev/null)
              if [ -z "$current_pid" ] || ! kill -0 $current_pid 2>/dev/null; then
                  CRASH_COUNT=$((CRASH_COUNT+1))
                  log_error "服务退出，崩溃次数: $CRASH_COUNT"
                  if [ $CRASH_COUNT -ge $MAX_CRASH ]; then
                      log_error "停止重启"
                      rm -f $PID_FILE
                      exit 1
                  fi
                  sleep 2
                  start_service
              fi
          done
          EOF
          
                    # 4. stop.sh
                    cat > magisk-module/stop.sh << 'EOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          PID_FILE="$MODDIR/service.pid"
          if [ -f "$PID_FILE" ]; then
              pid=$(cat $PID_FILE)
              kill -9 $pid 2>/dev/null
              rm -f $PID_FILE
          fi
          pkill -9 node 2>/dev/null
          killall -9 node 2>/dev/null
          rm -f $MODDIR/run.log $MODDIR/error.log
          EOF
          
                    # 5. env.config
                    cat > magisk-module/conf/env.config << 'EOF'
          PORT=3000
          HOST=0.0.0.0
          ADMIN_PASSWORD=admin123
          COOKIE_SECRET=misub-magisk-your-secret-2026
          DB_PATH=/data/adb/modules/misub-magisk-stable/misub.db
          EOF
          
                    # 6. update-binary
                    cat > magisk-module/META-INF/com/google/android/update-binary << 'EOF'
          #!/sbin/sh
          umask 022
          OUTFD=$2
          ZIPFILE=$3
          MODDIR=/data/adb/modules/misub-magisk-stable
          
          ui_print() {
              echo -n -e "ui_print $1\n" > /proc/self/fd/$OUTFD
              echo -n -e "ui_print\n" > /proc/self/fd/$OUTFD
          }
          
          ui_print "*******************************"
          ui_print "MiSub 订阅转换 Magisk版"
          ui_print "API全兼容，无404报错"
          ui_print "前置依赖：subs-goaway模块"
          ui_print "*******************************"
          
          if [ -f "$MODDIR/stop.sh" ]; then
              sh $MODDIR/stop.sh
          fi
          
          mkdir -p $MODDIR $MODDIR/conf $MODDIR/misub
          unzip -o "$ZIPFILE" 'module.prop' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'service.sh' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'stop.sh' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'conf/*' -d $MODDIR >/dev/null 2>&1
          unzip -o "$ZIPFILE" 'misub/*' -d $MODDIR >/dev/null 2>&1
          
          chmod 644 $MODDIR/module.prop
          chmod 755 $MODDIR/service.sh
          chmod 755 $MODDIR/stop.sh
          chmod 755 $MODDIR/misub
          chmod 755 $MODDIR/misub/functions
          chmod 600 $MODDIR/conf/env.config
          chmod -R 755 $MODDIR/misub/node_modules
          chcon -R u:object_r:system_file:s0 $MODDIR 2>/dev/null
          
          ui_print "安装完成"
          ui_print "重启后访问: http://手机IP:3000"
          ui_print "默认密码: admin123"
          exit 0
          EOF

          touch magisk-module/META-INF/com/google/android/updater-script
          cp -r dist functions schema.sql package.json node_modules magisk-module/misub/
          chmod 755 magisk-module/service.sh magisk-module/stop.sh magisk-module/META-INF/com/google/android/update-binary

          cd magisk-module
          zip -r ../$ZIP_NAME *
          cd ..
          echo "✅ 模块打包完成: $ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV

      - name: 8. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ./MiSub/${{ env.ZIP_NAME }}
          retention-days: 90

      - name: 9. 发布Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MiSub Magisk API全兼容版 v${{ env.MOD_VERSION }}
          body: |
            ## MiSub 订阅转换 Magisk版
            API全兼容修复，彻底解决404报错、获取客户端失败、订阅导入失败问题。
            ### 使用说明
            1.  前置依赖：必须先刷入 `subs-goaway` 模块
            2.  下载zip包，Magisk刷入
            3.  重启后访问 http://手机IP:3000
            4.  默认密码：admin123
          files: ./MiSub/${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
