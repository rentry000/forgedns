name: Build MiSub v2.5.0 Magisk (Universal Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 使用直接克隆，绕过 Git Fetch 匹配问题
      - name: Clone Repository
        run: |
          git clone --depth 1 --branch v2.5.0 https://github.com/imzyb/MiSub.git .
          # 如果 v2.5.0 tag 不存在，会自动回退到 main
          if [ $? -ne 0 ]; then git clone --depth 1 https://github.com/imzyb/MiSub.git .; fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        run: |
          npm install
          # 安装 hono 的 node 适配器和纯 JS 的 SQL 引擎 (无需 native 编译)
          npm install @hono/node-server sql.js
          npm run build

      - name: Inject Backend Adapter (entry.js)
        run: |
          cat << 'EOF' > entry.js
          const { serve } = require('@hono/node-server');
          const { serveStatic } = require('@hono/node-server/serve-static');
          const initSqlJs = require('sql.js');
          const fs = require('fs');
          const path = require('path');

          async function start() {
            // 1. 初始化纯 JS 数据库环境 (模拟 D1)
            const SQL = await initSqlJs();
            const dbPath = path.join(__dirname, 'misub.db');
            let dbFile = fs.existsSync(dbPath) ? fs.readFileSync(dbPath) : null;
            const sqlite = new SQL.Database(dbFile);

            // 简单的 D1 接口模拟
            const D1Mock = {
              prepare: (sql) => ({
                bind: (...args) => ({
                  first: async () => {
                    const stmt = sqlite.prepare(sql);
                    const res = stmt.getAsObject(args);
                    stmt.free();
                    return res;
                  },
                  run: async () => {
                    sqlite.run(sql, args);
                    fs.writeFileSync(dbPath, sqlite.export());
                    return { success: true };
                  },
                  all: async () => {
                    const stmt = sqlite.prepare(sql);
                    const results = [];
                    while(stmt.step()) results.push(stmt.getAsObject(args));
                    stmt.free();
                    return { results };
                  }
                })
              })
            };

            // 2. 加载后端 Hono App
            // 注意：v2.5.0 编译后的入口通常在 .output/server 或 dist/_worker.js
            const appModule = require('./dist/_worker.js'); 
            const app = appModule.default;

            // 3. 注入环境变量
            const handler = (req) => {
              return app.fetch(req, {
                MISUB_DB: D1Mock, // 对应 wrangler-cf-pages.toml 里的绑定
                ADMIN_PASSWORD: "admin"
              });
            };

            // 4. 启动服务并托管静态文件
            const server = new (require('hono').Hono)();
            server.use('/*', serveStatic({ root: './dist' })); // 托管前端
            server.all('/api/*', (c) => handler(c.req.raw)); // 托管 API

            serve({ fetch: server.fetch, port: 8787 });
            console.log("MiSub v2.5.0 is running on http://127.0.0.1:8787");
          }

          start();
          EOF

      - name: Create Magisk Module
        run: |
          mkdir -p magisk_module/misub
          # 只拷贝构建后的产物，减小体积
          cp -r dist entry.js node_modules package.json magisk_module/misub/
          cp schema.sql magisk_module/misub/ || true

          cat << 'EOF' > magisk_module/module.prop
          id=misub_v250_js_fixed
          name=MiSub v2.5.0 (No-Native)
          version=v2.5.0
          versionCode=250
          author=GitHub_Actions
          description=使用 sql.js 纯 JS 模拟层运行的 v2.5.0。不依赖 C++ 编译，兼容手机 Node。
          EOF

          cat << 'EOF' > magisk_module/service.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          export PATH="${NODE_BIN%/*}:$PATH"
          
          until [ "$(getprop sys.boot_completed)" = "1" ]; do sleep 5; done
          
          cd $MODDIR/misub
          # 增加内存限制，防止手机上 Node 占用过高
          $NODE_BIN --max-old-space-size=256 entry.js > $MODDIR/run.log 2>&1 &
          EOF
          
          chmod +x magisk_module/service.sh
          cd magisk_module && zip -r ../MiSub_v250_Portable.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MiSub-v250-Portable
          path: MiSub_v250_Portable.zip
