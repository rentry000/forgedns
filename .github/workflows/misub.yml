name: Build MiSub Magisk Module

on:
  workflow_dispatch: # 允许手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MiSub Repository
        uses: actions/checkout@v4
        with:
          repository: 'imzyb/MiSub'
          ref: 'main' # 如果新版本模拟失败，可将其改为旧版稳定的 commit hash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 确保使用和手机端相近的 Node 版本

      - name: Install Dependencies
        run: |
          npm install
          # 安装 wrangler 用于本地模拟 Cloudflare 环境
          npm install wrangler -g

      - name: Prepare Magisk Module Structure
        run: |
          mkdir -p magisk_module/misub
          # 将项目所有文件打包进去（包括 node_modules，因为 wrangler 依赖它们）
          # 注意：打包 node_modules 会导致模块体积较大，但为了本地离线运行是必须的
          rsync -a --exclude='.git' --exclude='magisk_module' ./ magisk_module/misub/
          
          # 创建 module.prop
          cat << 'EOF' > magisk_module/module.prop
          id=misub_mobile
          name=MiSub Local Server (Wrangler)
          version=v1.0
          versionCode=1
          author=GitHub_Actions
          description=在本地使用 Wrangler 模拟 Cloudflare 环境运行 MiSub，修复后端无响应问题。依赖现有的 Node.js 二进制文件。
          EOF
          
          # 创建 service.sh (开机自启脚本)
          cat << 'EOF' > magisk_module/service.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          
          # 指向你现有的 node 环境路径
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          export PATH="${NODE_BIN%/*}:$PATH"
          export HOME="$MODDIR" # 为 wrangler 提供必要的本地读写权限缓存目录
          
          # 等待开机完成
          until [ "$(getprop sys.boot_completed)" = "1" ]; do
              sleep 2
          done
          
          cd $MODDIR/misub
          
          # 使用现有的 node 调用项目内的 wrangler 启动本地开发服务器模拟环境
          # 暴露在 0.0.0.0 以便局域网访问，具体端口看项目输出（通常是 8787）
          nohup $NODE_BIN ./node_modules/wrangler/bin/wrangler.js dev --local --ip 0.0.0.0 > $MODDIR/run.log 2>&1 &
          EOF
          
          chmod +x magisk_module/service.sh

      - name: Zip Magisk Module
        run: |
          cd magisk_module
          zip -r9 ../MiSub_Magisk_Module.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSub-Magisk-Module
          path: MiSub_Magisk_Module.zip
