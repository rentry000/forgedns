name: Build MiSub Magisk Module (v2.5.0 Direct)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 直接克隆整个仓库的最新代码 (main 分支目前即 v2.5.0+)
      - name: Clone Repository
        run: |
          git clone --depth 1 https://github.com/imzyb/MiSub.git .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. 安装依赖并注入 Hono 适配器
      - name: Install & Build
        run: |
          npm install
          # 安装能让 Node.js 运行 Worker 代码的适配器，以及纯 JS 的 SQL 引擎
          npm install @hono/node-server sql.js
          npm run build

      # 3. 编写本地运行适配层 (entry.js)
      # 这个文件会将静态前端和 D1 数据库后端揉在一起
      - name: Create Entry Script
        run: |
          cat << 'EOF' > entry.js
          const { serve } = require('@hono/node-server');
          const { serveStatic } = require('@hono/node-server/serve-static');
          const initSqlJs = require('sql.js');
          const fs = require('fs');
          const path = require('path');

          async function initApp() {
            // A. 初始化模拟数据库 (D1 兼容层)
            const SQL = await initSqlJs();
            const dbPath = path.join(__dirname, 'misub_local.db');
            let dbFile = fs.existsSync(dbPath) ? fs.readFileSync(dbPath) : null;
            const sqlite = new SQL.Database(dbFile);

            const D1Mock = {
              prepare: (sql) => ({
                bind: (...args) => ({
                  first: async () => {
                    const stmt = sqlite.prepare(sql);
                    const res = stmt.getAsObject(args);
                    stmt.free();
                    return res;
                  },
                  run: async () => {
                    sqlite.run(sql, args);
                    fs.writeFileSync(dbPath, sqlite.export());
                    return { success: true };
                  },
                  all: async () => {
                    const stmt = sqlite.prepare(sql);
                    const results = [];
                    while(stmt.step()) results.push(stmt.getAsObject(args));
                    stmt.free();
                    return { results };
                  }
                })
              })
            };

            // B. 加载后端 Logic (注意: v2.5.0 的入口在 _worker.js)
            const worker = require('./dist/_worker.js').default;

            // C. 使用 Hono 重新包装，同时托管静态网页和 API
            const { Hono } = require('hono');
            const app = new Hono();

            // 托管前端静态文件 (Vite build 后的产物)
            app.use('/*', serveStatic({ root: './dist' }));

            // 拦截所有发往 /api 的请求，并注入我们的 D1Mock 数据库
            app.all('/api/*', (c) => {
              return worker.fetch(c.req.raw, {
                MISUB_DB: D1Mock, // 对应 toml 里的数据库名
                ADMIN_PASSWORD: "admin" // 默认密码
              });
            });

            const port = 8787;
            console.log(`MiSub v2.5.0 已就绪: http://127.0.0.1:${port}`);
            serve({ fetch: app.fetch, port });
          }

          initApp().catch(console.error);
          EOF

      # 4. 生成 Magisk 模块包
      - name: Package Magisk Module
        run: |
          mkdir -p magisk_module/misub
          # 关键点：我们要把 dist, entry.js 和 node_modules 全部打包进去
          cp -r dist entry.js node_modules package.json magisk_module/misub/

          cat << 'EOF' > magisk_module/module.prop
          id=misub_v250_portable
          name=MiSub v2.5.0 Magisk
          version=v2.5.0
          versionCode=250
          author=GitHub_Actions
          description=基于作者 v2.5.0 的最新代码，通过 Hono Node 适配器和纯 JS D1 模拟层实现本地化运行。
          EOF

          cat << 'EOF' > magisk_module/service.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          # 指定你手机里的 Node 路径
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          export PATH="${NODE_BIN%/*}:$PATH"

          # 等待系统彻底启动
          until [ "$(getprop sys.boot_completed)" = "1" ]; do sleep 5; done

          cd $MODDIR/misub
          # 运行适配层，并将日志输出到模块目录
          $NODE_BIN entry.js > $MODDIR/run.log 2>&1 &
          EOF

          chmod +x magisk_module/service.sh
          cd magisk_module && zip -r ../MiSub_v250_Magisk.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSub-v250-Magisk
          path: MiSub_v250_Magisk.zip
