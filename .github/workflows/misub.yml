name: Build MiSub v2.5.0 Magisk (Hono Adapter)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MiSub v2.5.0
        uses: actions/checkout@v4
        with:
          repository: 'imzyb/MiSub'
          ref: 'v2.5.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject Node Adapter & Build
        run: |
          npm install
          # 核心步骤：安装让 Node 运行 Worker 代码的桥梁
          npm install @hono/node-server
          
          # 编写注入文件 entry.js
          # 这里假设 v2.5.0 的后端逻辑位于 src/index.ts 或编译后的对应位置
          cat << 'EOF' > entry.js
          const { serve } = require('@hono/node-server');
          // 注意：这里的引入路径需根据 v2.5.0 的源码结构调整，通常编译后在 dist
          const app = require('./dist/index.js').default; 
          
          const port = 8787;
          console.log(`Server is running on http://localhost:${port}`);
          
          serve({
            fetch: app.fetch,
            port
          });
          EOF

          # 构建项目生成 dist 文件夹
          npm run build || true

      - name: Prepare Magisk Module
        run: |
          mkdir -p magisk_module/misub
          # 排除不必要的大文件
          rsync -a --exclude='.git' --exclude='magisk_module' ./ magisk_module/misub/
          
          cat << 'EOF' > magisk_module/module.prop
          id=misub_v250_fixed
          name=MiSub v2.5.0 Node-Fixed
          version=v2.5.0-Adapter
          versionCode=250
          author=GitHub_Actions
          description=使用 @hono/node-server 适配器强制让 v2.5.0 在原生 Node 环境运行。
          EOF
          
          cat << 'EOF' > magisk_module/service.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          NODE_BIN="/data/adb/modules/subs-goaway/bin/output/node"
          export PATH="${NODE_BIN%/*}:$PATH"
          export NODE_ENV="production"
          
          # 确保日志有写入权限
          exec > $MODDIR/run.log 2>&1
          
          until [ "$(getprop sys.boot_completed)" = "1" ]; do
              sleep 2
          done
          
          cd $MODDIR/misub
          echo "Starting MiSub v2.5.0 with Node Adapter..."
          
          # 运行我们注入的入口文件
          $NODE_BIN entry.js &
          EOF
          
          chmod +x magisk_module/service.sh

      - name: Zip Magisk Module
        run: |
          cd magisk_module
          zip -r9 ../MiSub_v250_Adapter.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSub-v250-Adapter
          path: MiSub_v250_Adapter.zip
