name: Build MiSub Full Platform Binary
on:
  push:
    tags:
      - 'v*'
    branches: [ "main" ]
  workflow_dispatch: # 支持手动点击触发构建
permissions:
  contents: write
jobs:
  build-misub-binary:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y git tree

      # 【修复点1】移除cache配置，避免根目录锁文件检测报错
      - name: 安装 Node.js 环境（LTS稳定版，兼容pkg打包）
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 克隆官方 MiSub 完整仓库
        run: |
          git clone --depth=1 https://github.com/imzyb/MiSub.git
          cd MiSub
          echo "=== 项目目录结构 ==="
          ls -la

      # 【修复点2】新增子目录专属npm缓存，加速重复构建
      - name: 配置npm依赖缓存
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ./MiSub/node_modules
            ~/.npm
          key: ${{ runner.os }}-misub-npm-${{ hashFiles('MiSub/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-misub-npm-

      - name: 安装项目依赖并构建前端静态文件
        working-directory: ./MiSub
        run: |
          # 安装项目基础依赖
          npm install
          # 构建Vue前端，生成dist静态目录
          npm run build
          # 校验前端构建结果
          echo "=== 前端构建结果校验 ==="
          if [ -d "./dist" ]; then
            echo "✅ 前端dist目录构建成功"
            tree -L 2 ./dist
          else
            echo "❌ 前端构建失败，dist目录不存在"
            exit 1
          fi

      - name: 写入本地服务适配入口 app.js（核心适配层）
        working-directory: ./MiSub
        run: |
          cat > app.js << 'EOF'
          const express = require('express');
          const fs = require('fs');
          const path = require('path');
          const { Database } = require('better-sqlite3');

          const app = express();
          const PORT = process.env.PORT || 3000;
          const DB_PATH = process.env.DB_PATH || path.join(__dirname, 'misub.db');

          // ========== 1. 初始化本地SQLite数据库（替代Cloudflare D1/KV） ==========
          const db = new Database(DB_PATH);
          // 执行原项目的表结构初始化
          try {
            const schemaSql = fs.readFileSync(path.join(__dirname, 'schema.sql'), 'utf8');
            db.exec(schemaSql);
            console.log("✅ 数据库表结构初始化成功");
          } catch (err) {
            console.warn("⚠️ 表结构已存在，跳过初始化", err.message);
          }
          // 补充KV存储表（兼容原项目KV逻辑）
          try {
            db.exec(`
            CREATE TABLE IF NOT EXISTS kv (
              key TEXT PRIMARY KEY,
              value TEXT NOT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            `);
          } catch (err) {
            console.warn("⚠️ KV表已存在，跳过初始化", err.message);
          }

          // ========== 2. 基础中间件配置 ==========
          app.use(express.json({ limit: '50mb' }));
          app.use(express.urlencoded({ extended: true }));

          // ========== 3. 模拟Cloudflare Workers运行时，全量适配原项目API ==========
          // Workers Response 转 Express 响应工具
          function sendResponse(res, workerResponse) {
            res.status(workerResponse.status);
            workerResponse.headers.forEach((value, key) => res.setHeader(key, value));
            workerResponse.body?.pipe(res) || res.send(workerResponse.body);
          }

          // 模拟Cloudflare Context请求上下文
          function createContext(req, res) {
            const url = new URL(req.url, `http://${req.headers.host}`);
            return {
              request: new Request(url, {
                method: req.method,
                headers: req.headers,
                body: req.method !== 'GET' && req.method !== 'HEAD' ? req.body : undefined,
                duplex: 'half'
              }),
              env: {
                // 替换D1数据库为本地SQLite
                MISUB_DB: {
                  prepare: (sql) => {
                    const stmt = db.prepare(sql);
                    return {
                      all: (...params) => stmt.all(...params),
                      run: (...params) => stmt.run(...params),
                      get: (...params) => stmt.get(...params),
                    };
                  },
                  exec: (sql) => db.exec(sql)
                },
                // 替换KV存储为本地SQLite表
                MISUB_KV: {
                  get: (key) => db.prepare('SELECT value FROM kv WHERE key = ?').get(key)?.value,
                  put: (key, value) => db.prepare('REPLACE INTO kv (key, value) VALUES (?, ?)').run(key, value),
                  delete: (key) => db.prepare('DELETE FROM kv WHERE key = ?').run(key),
                },
                // 环境变量兼容，支持自定义
                ADMIN_PASSWORD: process.env.ADMIN_PASSWORD || 'admin123',
                COOKIE_SECRET: process.env.COOKIE_SECRET || 'misub-auto-build-random-secret-64bit-2024',
              },
              waitUntil: (promise) => promise.catch(console.error),
              params: {},
              data: {}
            };
          }

          // 动态加载原项目所有Functions路由，100%兼容原API
          const functionsPath = path.join(__dirname, 'functions');
          app.all('*', async (req, res, next) => {
            const reqPath = req.path;
            // 优先匹配API路由
            let targetFile = '';
            if (reqPath.startsWith('/api')) {
              const apiPath = reqPath.slice(4);
              const directFile = path.join(functionsPath, `${apiPath}.js`);
              const indexFile = path.join(functionsPath, apiPath, 'index.js');
              if (fs.existsSync(directFile)) targetFile = directFile;
              else if (fs.existsSync(indexFile)) targetFile = indexFile;
            }

            // 匹配到原项目Functions处理器，执行对应逻辑
            if (targetFile && fs.existsSync(targetFile)) {
              try {
                // 清除模块缓存，确保热加载
                delete require.cache[require.resolve(targetFile)];
                const handler = require(targetFile);
                if (handler?.onRequest) {
                  const context = createContext(req, res);
                  const response = await handler.onRequest(context);
                  return sendResponse(res, response);
                }
              } catch (err) {
                console.error(`API执行错误 [${reqPath}]:`, err);
                return res.status(500).json({ error: '服务器内部错误', detail: err.message });
              }
            }

            // 非API路由，走静态文件兜底
            next();
          });

          // ========== 4. 托管前端静态文件 ==========
          app.use(express.static(path.join(__dirname, 'dist')));

          // ========== 5. Vue SPA单页应用路由兜底 ==========
          app.get('*', (req, res) => {
            const indexPath = path.join(__dirname, 'dist', 'index.html');
            if (fs.existsSync(indexPath)) {
              res.sendFile(indexPath);
            } else {
              res.status(404).send('前端文件未找到，请检查构建是否成功');
            }
          });

          // 启动服务
          app.listen(PORT, '0.0.0.0', () => {
            console.log(`=================================`);
            console.log(`MiSub 服务启动成功`);
            console.log(`访问地址: http://0.0.0.0:${PORT}`);
            console.log(`管理员密码: ${process.env.ADMIN_PASSWORD || 'admin123'}`);
            console.log(`数据库文件: ${DB_PATH}`);
            console.log(`=================================`);
          });
          EOF

      - name: 安装打包依赖并配置package.json
        working-directory: ./MiSub
        run: |
          # 安装服务依赖和打包工具
          npm install express better-sqlite3
          npm install -g pkg
          # 修改package.json，添加pkg打包配置（解决原生模块打包问题）
          cat > package.tmp.json << EOF
          {
            "name": "misub",
            "version": "1.0.0",
            "main": "app.js",
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "preview": "vite preview",
              "start": "node app.js"
            },
            "dependencies": $(npm list --json | jq '.dependencies'),
            "pkg": {
              "scripts": "functions/**/*.js",
              "assets": [
                "dist/**/*",
                "schema.sql",
                "node_modules/better-sqlite3/build/Release/*.node",
                "node_modules/better-sqlite3/lib/binding/**/*.node"
              ],
              "targets": [
                "node18-linux-x64",
                "node18-linux-arm64",
                "node18-win-x64",
                "node18-macos-x64",
                "node18-macos-arm64"
              ],
              "outputPath": "build"
            }
          }
          EOF
          mv package.tmp.json package.json
          echo "=== 最终package.json配置 ==="
          cat package.json | jq '.pkg'

      - name: 打包全平台单二进制文件（含Android arm64）
        working-directory: ./MiSub
        run: |
          # 创建构建产物目录
          mkdir -p build
          # 执行pkg打包
          pkg .
          echo "=== 打包完成，产物列表 ==="
          ls -lh build/

      - name: 校验核心二进制文件
        working-directory: ./MiSub
        run: |
          # 校验必须的二进制文件是否生成
          REQUIRED_FILES=(
            "misub-linux-x64"
            "misub-linux-arm64"
            "misub-win-x64.exe"
            "misub-macos-x64"
            "misub-macos-arm64"
          )
          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "build/$file" ]; then
              echo "❌ 缺失二进制文件: $file"
              MISSING=1
            else
              echo "✅ 二进制文件生成成功: $file"
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "❌ 构建失败，存在缺失的二进制文件"
            exit 1
          fi
          # 重命名Android专用二进制，方便识别
          mv build/misub-linux-arm64 build/misub-android-arm64
          echo "✅ Android arm64 二进制重命名完成"
          ls -lh build/

      - name: 上传构建产物到Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: misub-all-platform-binaries
          path: ./MiSub/build/
          retention-days: 30

      - name: 发布到GitHub Release（打tag触发）
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./MiSub
        run: |
          # 生成更新日志
          echo "## MiSub 全平台二进制发布" > changelog.md
          echo "" >> changelog.md
          echo "### 📦 发布文件说明" >> changelog.md
          echo "- \`misub-android-arm64\` - Android ARM64 通用（Termux/Magisk/adb shell）" >> changelog.md
          echo "- \`misub-linux-x64\` - Linux x64 服务器/桌面" >> changelog.md
          echo "- \`misub-win-x64.exe\` - Windows x64 桌面" >> changelog.md
          echo "- \`misub-macos-x64\` - macOS Intel 芯片" >> changelog.md
          echo "- \`misub-macos-arm64\` - macOS Apple Silicon 芯片" >> changelog.md
          echo "" >> changelog.md
          echo "### 默认登录信息" >> changelog.md
          echo "- 访问地址: http://设备IP:3000" >> changelog.md
          echo "- 默认管理员密码: \`admin123\`" >> changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建Release并上传文件
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MiSub Release ${{ github.ref_name }}
          body_path: ./MiSub/changelog.md
          files: ./MiSub/build/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
