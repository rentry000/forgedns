            3.  重启手机自动生效，无需任何手动修改
            4.  访问地址：http://你的手机IP:3005
            5.  默认账号密码：admin / admin123
            ### 日志路径
            运行日志：`/data/adb/modules/misub-magisk-stable/run.log`
            错误日志：`/data/adb/modules/misub-magisk-stable/error.log`
          files: ./MiSub/${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
