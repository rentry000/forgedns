name: Build sdproxy Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Fix go module
        run: |
          go mod init sdproxy
          go mod tidy

      # 👇 完全对齐官方快速开始命令，只加 Android 架构参数
      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o sdproxy-android-arm64-v8a .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sdproxy-android-arm64-v8a
          path: sdproxy-android-arm64-v8a
