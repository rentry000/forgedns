name: Build sdproxy Android arm64-v8a

on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 第一步：克隆代码 (等价于 git clone)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: cbuijs/sdproxy # 指定克隆的项目地址
          path: sdproxy             # 克隆到 sdproxy 目录

      # 第二步：进入项目目录并构建 (等价于 cd sdproxy && go build)
      - name: Build for Android arm64-v8a
        run: |
          cd sdproxy
          # 核心构建命令：完全按你的要求，只加 Android 目标平台参数
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o sdproxy-android-arm64-v8a .

      # 第三步：上传构建好的二进制文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdproxy-android-arm64-v8a
          path: sdproxy/sdproxy-android-arm64-v8a
