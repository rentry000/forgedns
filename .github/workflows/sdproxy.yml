name: Build sdproxy Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # 解决：go: cannot find main module
      - name: Init Go module
        run: |
          go mod init github.com/cbuijs/sdproxy
          go mod tidy

      # 编译 Android arm64-v8a 静态二进制
      - name: Build for Android arm64-v8a
        run: |
          CGO_ENABLED=0 \
          GOOS=linux \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o sdproxy-android-arm64-v8a

      - name: Show file info
        run: file sdproxy-android-arm64-v8a

      # 上传构建产物
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sdproxy-android-arm64-v8a
          path: sdproxy-android-arm64-v8a
