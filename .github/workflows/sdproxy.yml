name: Build sdproxy Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # 修复：go: cannot find main module
      - name: Init Go module
        run: |
          go mod init sdproxy
          go mod tidy

      # 完全对标官方编译风格 · Android arm64-v8a
      - name: Build for Android arm64-v8a
        run: |
          CGO_ENABLED=0 \
          GOOS=linux \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o sdproxy-android-arm64-v8a

      - name: Check binary
        run: file sdproxy-android-arm64-v8a

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdproxy-android-arm64-v8a
          path: sdproxy-android-arm64-v8a
