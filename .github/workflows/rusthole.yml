name: Build rusthole Android arm64 static

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      TARGET: aarch64-linux-android
      NDK_VER: r29
      API: 21
      REPO_URL: https://github.com/KevinKickass/rusthole.git

    steps:
      - name: Install dependencies
        run: apt update && apt install -y git wget unzip

      - name: Clone rusthole
        run: |
          git clone $REPO_URL rusthole
          cd rusthole && ls -la

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Install NDK ${{ env.NDK_VER }}
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip
          unzip -q ndk.zip
          mv android-ndk-${NDK_VER} /opt/ndk
          echo "TOOLCHAIN=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Export full cross compile env
        run: |
          TARGET=aarch64_linux_android
          echo "CARGO_TARGET_${TARGET}_LINKER=$TOOLCHAIN/aarch64-linux-android${API}-clang" >> $GITHUB_ENV
          echo "CC_${TARGET}=$TOOLCHAIN/aarch64-linux-android${API}-clang" >> $GITHUB_ENV
          echo "CXX_${TARGET}=$TOOLCHAIN/aarch64-linux-android${API}-clang++" >> $GITHUB_ENV
          # 关键修复：NDK r29 用 llvm-ar 替代旧的 aarch64-linux-android-ar
          echo "AR_${TARGET}=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_${TARGET}=$TOOLCHAIN/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP_${TARGET}=$TOOLCHAIN/llvm-strip" >> $GITHUB_ENV

      - name: Build release
        run: |
          cd rusthole
          cargo build --release --target ${{ env.TARGET }}

      - name: Strip binary
        run: |
          $TOOLCHAIN/llvm-strip rusthole/target/${{ env.TARGET }}/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-arm64-v8a
          path: rusthole/target/${{ env.TARGET }}/release/rusthole
