name: Build rusthole Android arm64
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq git wget unzip

      - name: Clone rusthole
        run: git clone --depth 1 https://github.com/KevinKickass/rusthole.git

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install NDK r29
        run: |
          wget -qO ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 ~/ndk
          NDK_BIN="$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "NDK_BIN=$NDK_BIN" >> $GITHUB_ENV
          # 关键修复：给 aws-lc-sys 创建软链接，补齐它要的无版本号工具
          ln -s $NDK_BIN/aarch64-linux-android21-clang $NDK_BIN/aarch64-linux-android-clang
          ln -s $NDK_BIN/aarch64-linux-android21-clang++ $NDK_BIN/aarch64-linux-android-clang++
          ln -s $NDK_BIN/llvm-ar $NDK_BIN/aarch64-linux-android-ar
          ln -s $NDK_BIN/llvm-ranlib $NDK_BIN/aarch64-linux-android-ranlib
          # 把工具目录加入 PATH
          echo "$NDK_BIN" >> $GITHUB_PATH

      - name: Set cross compile env
        run: |
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_AARCH64_LINUX_ANDROID=$NDK_BIN/aarch64-linux-android-clang" >> $GITHUB_ENV
          echo "CXX_AARCH64_LINUX_ANDROID=$NDK_BIN/aarch64-linux-android-clang++" >> $GITHUB_ENV
          echo "AR_AARCH64_LINUX_ANDROID=$NDK_BIN/aarch64-linux-android-ar" >> $GITHUB_ENV
          echo "RANLIB_AARCH64_LINUX_ANDROID=$NDK_BIN/aarch64-linux-android-ranlib" >> $GITHUB_ENV

      - name: Build release
        run: |
          cd rusthole
          cargo build --release --target aarch64-linux-android

      - name: Strip binary
        run: |
          $NDK_BIN/llvm-strip rusthole/target/aarch64-linux-android/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-arm64-v8a
          path: rusthole/target/aarch64-linux-android/release/rusthole
