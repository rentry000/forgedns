name: Build rusthole for Android arm64
on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    env:
      TARGET: aarch64-linux-android
      NDK_VER: r29
      API_LEVEL: 21
      REPO: https://github.com/KevinKickass/rusthole.git

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git wget unzip

      - name: Clone rusthole
        run: |
          git clone --depth 1 $REPO rusthole

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Download & setup NDK r29
        run: |
          wget -qO ndk.zip https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip
          unzip -q ndk.zip
          mv android-ndk-${NDK_VER} ~/ndk
          echo "TOOLCHAIN=$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Set cross compile env (fix ar/ring/zstd)
        run: |
          TARGET_ENV=aarch64_linux_android
          echo "CARGO_TARGET_${TARGET_ENV}_LINKER=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_${TARGET_ENV}=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_${TARGET_ENV}=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_${TARGET_ENV}=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_${TARGET_ENV}=$TOOLCHAIN/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP_${TARGET_ENV}=$TOOLCHAIN/llvm-strip" >> $GITHUB_ENV

      - name: Build release
        run: |
          cd rusthole
          cargo build --release --target ${{ env.TARGET }}

      - name: Strip binary
        run: |
          $TOOLCHAIN/llvm-strip rusthole/target/${{ env.TARGET }}/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-arm64-v8a
          path: rusthole/target/${{ env.TARGET }}/release/rusthole
