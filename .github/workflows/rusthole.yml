name: Build Rusthole for Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android  # 安卓 arm64 主流设备
          # - armv7-linux-androideabi # 可选 armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Android NDK
        run: |
          apt update && apt install -y wget unzip
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 /opt/android-ndk
          echo "ANDROID_NDK=/opt/android-ndk" >> $GITHUB_ENV

      - name: Configure cross compile env
        run: |
          TARGET=${{ matrix.target }}
          NDK=/opt/android-ndk
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$TOOLCHAIN/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CC_$TARGET=$TOOLCHAIN/$TARGET-clang" >> $GITHUB_ENV
          echo "CXX_$TARGET=$TOOLCHAIN/$TARGET-clang++" >> $GITHUB_ENV

      - name: Build static binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          TARGET=${{ matrix.target }}
          NDK=/opt/android-ndk
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          $TOOLCHAIN/llvm-strip target/$TARGET/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rusthole
