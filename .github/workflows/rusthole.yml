name: Build rusthole arm64 musl static (Android compatible)
on:
  workflow_dispatch:

jobs:
  build-musl-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: KevinKickass/rusthole
          
      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq musl-tools

      - name: Build full static binary
        run: |
          cargo build --release --target aarch64-unknown-linux-musl --all-features

      - name: Strip binary
        run: |
          strip target/aarch64-unknown-linux-musl/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-arm64-musl-static
          path: target/aarch64-unknown-linux-musl/release/rusthole
