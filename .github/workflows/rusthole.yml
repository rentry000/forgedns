name: Build rusthole for Android arm64-v8a
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq git wget unzip

      - name: Clone rusthole
        run: git clone --depth 1 https://github.com/KevinKickass/rusthole.git

      - name: Install Rust & target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install NDK r29
        run: |
          wget -qO ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 ~/ndk
          echo "NDK_BIN=$HOME/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      # 核心修复：所有环境变量 **全大写**，Cargo 才会识别，不再用系统 cc
      - name: Set full cross compile env
        run: |
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_AARCH64_LINUX_ANDROID=$NDK_BIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CXX_AARCH64_LINUX_ANDROID=$NDK_BIN/aarch64-linux-android21-clang++" >> $GITHUB_ENV
          echo "AR_AARCH64_LINUX_ANDROID=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_AARCH64_LINUX_ANDROID=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP_AARCH64_LINUX_ANDROID=$NDK_BIN/llvm-strip" >> $GITHUB_ENV
          # 强制静态链接，修复 Android 动态库依赖
          echo "RUSTFLAGS=-C target-feature=+crt-static -C link-arg=-llog" >> $GITHUB_ENV

      - name: Build release
        run: |
          cd rusthole
          cargo build --release --target aarch64-linux-android

      - name: Strip binary
        run: |
          $NDK_BIN/llvm-strip rusthole/target/aarch64-linux-android/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-arm64
          path: rusthole/target/aarch64-linux-android/release/rusthole
