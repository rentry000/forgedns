name: Build rusthole for Android

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    env:
      TARGET: aarch64-linux-android
      NDK_VER: r29
      API_LEVEL: 21

    steps:
      - name: Clone rusthole repo
        run: |
          git clone https://github.com/KevinKickass/rusthole.git
          cd rusthole
          ls -la

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Install Android NDK ${{ env.NDK_VER }}
        run: |
          apt update && apt install -y wget unzip
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip
          unzip -q ndk.zip
          mv android-ndk-${NDK_VER} /opt/ndk
          echo "ANDROID_NDK_HOME=/opt/ndk" >> $GITHUB_ENV

      - name: Set cross-compile toolchain
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV

      - name: Build release binary
        run: |
          cd rusthole
          cargo build --release --target ${{ env.TARGET }}

      - name: Strip binary
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          $TOOLCHAIN/llvm-strip rusthole/target/${{ env.TARGET }}/release/rusthole

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-arm64-v8a
          path: rusthole/target/${{ env.TARGET }}/release/rusthole
