name: Build rusthole arm64 musl static (Android full CLI)
on:
  workflow_dispatch:

jobs:
  build-musl-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rusthole
        uses: actions/checkout@v4
        with:
          repository: KevinKickass/rusthole

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build static binary for Android arm64
        run: |
          cross build --release \
            --target aarch64-unknown-linux-musl \
            --all-features
# 👆这条就是：所有功能 100% 全部启用，不留一个

      - name: Upload final binary
        uses: actions/upload-artifact@v4
        with:
          name: rusthole-android-arm64-musl
          path: target/aarch64-unknown-linux-musl/release/rusthole
