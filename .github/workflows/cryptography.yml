name: Build Android Wheels for Foghorn

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up NDK + Toolchain
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build Static OpenSSL (fixed)
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=aarch64-linux-android24-clang
          export AR=aarch64-linux-android-ar
          export RANLIB=aarch64-linux-android-ranlib
          
          wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar -xf openssl-1.1.1w.tar.gz && cd openssl-1.1.1w
          
          ./Configure android-arm64 -D__ANDROID_API__=24 no-shared no-tests \
            --prefix=\( (pwd)/install --openssldir= \)(pwd)/install
          make -j$(nproc)
          make install_sw
          echo "OPENSSL_DIR=$(pwd)/install" >> $GITHUB_ENV

      - name: Build Cryptography + Pydantic-Core Wheels
        env:
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          PYO3_NO_PYTHON: 1
          RUSTFLAGS: "-C link-arg=-Wl,--allow-shlib-undefined"
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
        run: |
          pip install -U pip maturin cffi setuptools wheel
          mkdir -p dist

          # Cryptography
          pip download --no-binary :all: --no-deps cryptography==46.0.5
          tar -xzf cryptography-*.tar.gz && cd cryptography-*
          maturin build --release --target aarch64-linux-android --out ../dist
          cd ..

          # Pydantic-core (FastAPI 核心)
          pip download --no-binary :all: --no-deps pydantic-core
          tar -xzf pydantic_core-*.tar.gz && cd pydantic_core-*
          maturin build --release --target aarch64-linux-android --out ../dist
          cd ..

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-wheels
          path: dist/*.whl
