name: Build Android aarch64 Python 3.14 Wheels
on:
  workflow_dispatch:

jobs:
  build_android_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # 核心：安装Android NDK，唯一能编译出Android兼容二进制的工具链
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27b
          link-to-sdk: true

      # 安装Rust和Android目标
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y make pkg-config
          pip install wheel setuptools setuptools-rust

      - name: Build Android compatible wheels
        env:
          # NDK交叉编译核心配置
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TARGET_HOST: aarch64-linux-android
          ANDROID_PLATFORM: 24
          
          # 指定NDK的编译器（针对Android Bionic库编译）
          CC: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET_HOST}${ANDROID_PLATFORM}-clang
          CXX: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET_HOST}${ANDROID_PLATFORM}-clang++
          AR: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          RANLIB: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          
          # Rust Android交叉编译配置
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${CC}
          RUSTFLAGS: -C link-arg=-Wl,--allow-shlib-undefined
          CARGO_BUILD_TARGET: aarch64-linux-android
          
          # PyO3交叉编译适配
          PYO3_CROSS_PYTHON_VERSION: 3.14
          PYO3_NO_PYTHON: 1
        run: |
          mkdir -p dist
          
          # 定义需要编译的包
          declare -A pkgs
          pkgs=( ["cffi"]="cffi>=1.17.0" ["pydantic-core"]="pydantic-core" ["bcrypt"]="bcrypt>=4.0.0" )
          
          for pkg_name in "${!pkgs[@]}"; do
            pkg_spec=${pkgs[$pkg_name]}
            echo "--------------------------------------------------"
            echo "🚀 正在编译Android aarch64版本: $pkg_spec"
            echo "--------------------------------------------------"
            
            rm -rf build_source && mkdir -p build_source && cd build_source
            
            # 下载源码
            pip download --no-binary :all: --no-deps "$pkg_spec"
            tar -xzf *.tar.gz --strip-components=1
            
            # 核心：构建wheel，指定Android平台标签
            python setup.py bdist_wheel --plat-name android_aarch64
            
            # 复制产物
            cp dist/*.whl ../dist/
            cd ..
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-314-aarch64-wheels
          path: dist/*.whl
