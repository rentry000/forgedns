name: Build py2droid Android aarch64 Python 3.14 Wheels
on:
  workflow_dispatch:

# 全局统一版本配置
env:
  PY_FULL_VERSION: "3.14.3"
  PY_ABI_VERSION: "3.14"
  PY2DROID_VERSION: "v0.3.1"
  ANDROID_NDK_VERSION: "r27b"
  ANDROID_TARGET_ARCH: "aarch64-linux-android"
  ANDROID_API_LEVEL: 24
  LIBFFI_VERSION: "3.4.6"
  OPENSSL_VERSION: "1.1.1w"
  LIBSODIUM_VERSION: "1.0.20"

jobs:
  build_android_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set up Host Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '${{ env.PY_ABI_VERSION }}'
          allow-prereleases: true

      # Android NDK 交叉编译核心工具链
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          link-to-sdk: true

      # Rust Android aarch64目标架构支持
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.ANDROID_TARGET_ARCH }}

      # 【核心修复1】强制升级wheel到最新版，确保标签命令兼容
      - name: Install host build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            make \
            pkg-config \
            patchelf \
            binutils-aarch64-linux-gnu \
            wget \
            unzip \
            xz-utils \
            autoconf \
            automake \
            libtool \
            perl \
            build-essential \
            libffi-dev \
            python3-dev
          
          # 强制升级构建工具（确保 cffi 等能正常编译）
          python -m pip install -U --force-reinstall \
            pip \
            wheel \
            setuptools \
            setuptools-rust \
            cffi \
            maturin \
            build \
            auditwheel \
            patchelf

      # ==============================================
      # 步骤1：准备py2droid Python 3.14交叉编译环境
      # ==============================================
      - name: Prepare py2droid Python 3.14 cross-compile environment
        run: |
          mkdir -p py2droid_env python_headers
          cd py2droid_env
          
          # 1. 下载并解压py2droid官方包
          echo "📥 下载py2droid ${{ env.PY2DROID_VERSION }} 官方包..."
          wget -O py2droid.zip \
            https://github.com/Mrakorez/py2droid/releases/download/${{ env.PY2DROID_VERSION }}/py2droid-${{ env.PY2DROID_VERSION }}.zip \
            --tries=5 --timeout=15
          
          echo "解压py2droid包..."
          unzip -q py2droid.zip
          
          # 查找并解压内层cpython压缩包
          echo "查找cpython-arm64.tar.xz..."
          PYTHON_TAR=$(find . -name "cpython-arm64.tar.xz" -type f | head-n 1)
          if [ -z "$PYTHON_TAR" ]; then
            echo "❌ 错误：未找到cpython-arm64.tar.xz，py2droid包结构异常"
            exit 1
          fi
          tar -xJf "$PYTHON_TAR"
          
          # 2. 校验py2droid核心运行时库
          echo "校验py2droid核心库文件..."
          PY2DROID_PREFIX=$(pwd)/prefix
          PY2DROID_LIB_DIR=${PY2DROID_PREFIX}/lib
          PY2DROID_INCLUDE_DIR=${PY2DROID_PREFIX}/include/python${{ env.PY_ABI_VERSION }}
          
          if [ ! -f "${PY2DROID_LIB_DIR}/libpython${{ env.PY_ABI_VERSION }}.so" ]; then
            echo "❌ 错误：未找到libpython${{ env.PY_ABI_VERSION }}.so"
            exit 1
          fi
          echo "✅ 成功提取py2droid原生Python库"
          echo "py2droid lib目录: ${PY2DROID_LIB_DIR}"
          
          # 3. 补充完整头文件（官方源码兜底）
          echo "📥 准备Python ${{ env.PY_FULL_VERSION }} 编译头文件..."
          if [ -d "${PY2DROID_INCLUDE_DIR}" ] && [ -f "${PY2DROID_INCLUDE_DIR}/Python.h" ]; then
            echo "✅ 检测到py2droid自带完整头文件，直接使用"
            FINAL_INCLUDE_DIR=${PY2DROID_INCLUDE_DIR}
          else
            echo "⚠️ py2droid未带完整头文件，从Python官方源码补充"
            cd ../python_headers
            wget -O Python-${{ env.PY_FULL_VERSION }}.tgz \
              https://www.python.org/ftp/python/${{ env.PY_FULL_VERSION }}/Python-${{ env.PY_FULL_VERSION }}.tgz \
              --tries=5 --timeout=15
            tar -xzf Python-${{ env.PY_FULL_VERSION }}.tgz
            
            FINAL_INCLUDE_DIR=$(pwd)/combined_include
            mkdir -p ${FINAL_INCLUDE_DIR}
            cp -r Python-${{ env.PY_FULL_VERSION }}/Include/* ${FINAL_INCLUDE_DIR}/
            cp ${PY2DROID_INCLUDE_DIR}/pyconfig.h ${FINAL_INCLUDE_DIR}/ 2>/dev/null || true
            
            if [ ! -f "${FINAL_INCLUDE_DIR}/Python.h" ]; then
              echo "❌ 错误：头文件构建失败，缺少核心Python.h"
              exit 1
            fi
            echo "✅ 成功构建适配py2droid的完整头文件目录"
          fi
          
          echo "最终Python include目录: ${FINAL_INCLUDE_DIR}"
          
          # 导出核心路径到全局环境变量
          echo "PY2DROID_PREFIX=${PY2DROID_PREFIX}" >> $GITHUB_ENV
          echo "PY2DROID_LIB_DIR=${PY2DROID_LIB_DIR}" >> $GITHUB_ENV
          echo "PY2DROID_INCLUDE_DIR=${FINAL_INCLUDE_DIR}" >> $GITHUB_ENV

      # ==============================================
      # 步骤2：交叉编译libffi
      # ==============================================
      - name: Cross-compile libffi for Android aarch64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=${TOOLCHAIN}/sysroot
          export CC=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang
          export CXX=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang++
          export AR=${TOOLCHAIN}/bin/llvm-ar
          export RANLIB=${TOOLCHAIN}/bin/llvm-ranlib
          export STRIP=${TOOLCHAIN}/bin/llvm-strip
          
          mkdir -p libffi_build libffi_install
          cd libffi_build
          
          echo "📥 下载libffi ${{ env.LIBFFI_VERSION }} 源码..."
          wget -O libffi.tar.gz \
            https://github.com/libffi/libffi/releases/download/v${{ env.LIBFFI_VERSION }}/libffi-${{ env.LIBFFI_VERSION }}.tar.gz \
            --tries=5 --timeout=15
          tar -xzf libffi.tar.gz --strip-components=1
          
          echo "🔧 配置libffi交叉编译..."
          ./configure \
            --host=${{ env.ANDROID_TARGET_ARCH }} \
            --prefix=$(pwd)/../libffi_install \
            --enable-shared \
            --enable-static \
            --with-sysroot=${SYSROOT}
          
          echo "🚀 编译libffi..."
          make -j$(nproc)
          make install
          
          LIBFFI_INSTALL_DIR=$(pwd)/../libffi_install
          if [ ! -f "${LIBFFI_INSTALL_DIR}/include/ffi.h" ] || [ ! -f "${LIBFFI_INSTALL_DIR}/lib/libffi.so" ]; then
            echo "❌ 错误：libffi编译失败"
            exit 1
          fi
          
          echo "✅ libffi交叉编译完成"
          echo "libffi include目录: ${LIBFFI_INSTALL_DIR}/include"
          echo "libffi lib目录: ${LIBFFI_INSTALL_DIR}/lib"
          
          echo "LIBFFI_INSTALL_DIR=${LIBFFI_INSTALL_DIR}" >> $GITHUB_ENV
          echo "LIBFFI_INCLUDE_DIR=${LIBFFI_INSTALL_DIR}/include" >> $GITHUB_ENV
          echo "LIBFFI_LIB_DIR=${LIBFFI_INSTALL_DIR}/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${LIBFFI_INSTALL_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      # ==============================================
      # 步骤3：交叉编译OpenSSL 1.1.1w
      # ==============================================
      - name: Cross-compile OpenSSL 1.1.1w for Android aarch64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=${TOOLCHAIN}/sysroot
          export CC=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang
          export CXX=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang++
          export AR=${TOOLCHAIN}/bin/llvm-ar
          export RANLIB=${TOOLCHAIN}/bin/llvm-ranlib
          export STRIP=${TOOLCHAIN}/bin/llvm-strip
          export ANDROID_NDK_ROOT=${ANDROID_NDK_HOME}
          export PATH=${TOOLCHAIN}/bin:${PATH}
          export MACHINE=aarch64
          export RELEASE=2
          export SYSTEM=android
          
          mkdir -p openssl_build openssl_install
          cd openssl_build
          
          echo "📥 下载OpenSSL ${{ env.OPENSSL_VERSION }} 源码..."
          wget -O openssl.tar.gz \
            https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz \
            --tries=5 --timeout=15
          tar -xzf openssl.tar.gz --strip-components=1
          
          echo "🔧 配置OpenSSL 1.1.1w 交叉编译..."
          ./Configure \
            android-arm64 \
            -D__ANDROID_API__=${{ env.ANDROID_API_LEVEL }} \
            --prefix=$(pwd)/../openssl_install \
            --openssldir=$(pwd)/../openssl_install/ssl \
            no-shared \
            no-asm \
            no-comp \
            no-ssl2 \
            no-ssl3 \
            no-weak-ssl-ciphers
          
          echo "🚀 编译OpenSSL 1.1.1w..."
          make -j$(nproc)
          make install_sw
          
          OPENSSL_INSTALL_DIR=$(pwd)/../openssl_install
          if [ ! -f "${OPENSSL_INSTALL_DIR}/include/openssl/ssl.h" ] || [ ! -f "${OPENSSL_INSTALL_DIR}/lib/libcrypto.a" ]; then
            echo "❌ 错误：OpenSSL 1.1.1w 编译失败"
            exit 1
          fi
          
          echo "✅ OpenSSL 1.1.1w 交叉编译完成"
          echo "OpenSSL include目录: ${OPENSSL_INSTALL_DIR}/include"
          echo "OpenSSL lib目录: ${OPENSSL_INSTALL_DIR}/lib"
          
          echo "OPENSSL_INSTALL_DIR=${OPENSSL_INSTALL_DIR}" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=${OPENSSL_INSTALL_DIR}/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=${OPENSSL_INSTALL_DIR}/lib" >> $GITHUB_ENV
          echo "OPENSSL_DIR=${OPENSSL_INSTALL_DIR}" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV

      # ==============================================
      # 步骤3.5：交叉编译 libsodium（修复 pynacl）
      # ==============================================
      - name: Cross-compile libsodium for Android aarch64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=${TOOLCHAIN}/sysroot
          export CC=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang
          export CXX=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang++
          export AR=${TOOLCHAIN}/bin/llvm-ar
          export RANLIB=${TOOLCHAIN}/bin/llvm-ranlib
          export STRIP=${TOOLCHAIN}/bin/llvm-strip
          
          mkdir -p libsodium_build libsodium_install
          cd libsodium_build
          
          echo "📥 下载 libsodium ${{ env.LIBSODIUM_VERSION }} 源码..."
          wget -O libsodium.tar.gz \
            https://download.libsodium.org/libsodium/releases/libsodium-${{ env.LIBSODIUM_VERSION }}-stable.tar.gz \
            --tries=5 --timeout=15
          tar -xzf libsodium.tar.gz --strip-components=1
          
          echo "🔧 配置 libsodium 交叉编译..."
          ./configure \
            --host=${{ env.ANDROID_TARGET_ARCH }} \
            --prefix=$(pwd)/../libsodium_install \
            --enable-static \
            --disable-shared \
            --disable-dependency-tracking \
            --with-pic
          
          echo "🚀 编译 libsodium..."
          make -j$(nproc)
          make install
          
          LIBSODIUM_INSTALL_DIR=$(pwd)/../libsodium_install
          if [ ! -f "${LIBSODIUM_INSTALL_DIR}/include/sodium.h" ] || [ ! -f "${LIBSODIUM_INSTALL_DIR}/lib/libsodium.a" ]; then
            echo "❌ 错误：libsodium 编译失败"
            exit 1
          fi
          
          echo "✅ libsodium 交叉编译完成"
          echo "libsodium include: ${LIBSODIUM_INSTALL_DIR}/include"
          echo "libsodium lib: ${LIBSODIUM_INSTALL_DIR}/lib"
          
          echo "LIBSODIUM_INSTALL_DIR=${LIBSODIUM_INSTALL_DIR}" >> $GITHUB_ENV
          echo "LIBSODIUM_INCLUDE_DIR=${LIBSODIUM_INSTALL_DIR}/include" >> $GITHUB_ENV
          echo "LIBSODIUM_LIB_DIR=${LIBSODIUM_INSTALL_DIR}/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${LIBSODIUM_INSTALL_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      # ==============================================
      # 步骤4：构建 Android aarch64 wheels
      # ==============================================
      - name: Build Android aarch64 wheels for py2droid
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # 基础工具链配置
          export TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=${TOOLCHAIN}/sysroot
          export CC=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang
          export CXX=${TOOLCHAIN}/bin/${{ env.ANDROID_TARGET_ARCH }}${{ env.ANDROID_API_LEVEL }}-clang++
          export AR=${TOOLCHAIN}/bin/llvm-ar
          export RANLIB=${TOOLCHAIN}/bin/llvm-ranlib
          export STRIP=${TOOLCHAIN}/bin/llvm-strip
          
          # 编译链接参数
          export CPPFLAGS="-I${PY2DROID_INCLUDE_DIR} -I${LIBFFI_INCLUDE_DIR} -I${OPENSSL_INCLUDE_DIR} -I${LIBSODIUM_INCLUDE_DIR} --sysroot=${SYSROOT}"
          export CFLAGS="${CPPFLAGS} -fPIC -O2 -DANDROID -D__ANDROID_API__=${{ env.ANDROID_API_LEVEL }}"
          export CXXFLAGS="${CFLAGS}"
          export LDFLAGS="-L${PY2DROID_LIB_DIR} -L${LIBFFI_LIB_DIR} -L${OPENSSL_LIB_DIR} -L${LIBSODIUM_LIB_DIR} -L${SYSROOT}/usr/lib/${{ env.ANDROID_TARGET_ARCH }}/${{ env.ANDROID_API_LEVEL }} --sysroot=${SYSROOT} -Wl,--allow-shlib-undefined"
          
          export PKG_CONFIG_PATH="${PKG_CONFIG_PATH}:${LIBSODIUM_LIB_DIR}/pkgconfig"
          
          # Rust交叉编译配置
          export CARGO_BUILD_TARGET=${{ env.ANDROID_TARGET_ARCH }}
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${CC}
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=${AR}
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS="-C link-arg=-Wl,--allow-shlib-undefined -C link-arg=-Wl,-z,now -C strip=symbols"
          export PKG_CONFIG_ALLOW_CROSS=1
          export CARGO_NET_GIT_FETCH_WITH_CLI=true
          
          # PyO3交叉编译配置
          export PYO3_CROSS=1
          export PYO3_CROSS_PYTHON_VERSION=${{ env.PY_ABI_VERSION }}
          export PYO3_CROSS_LIB_DIR=${PY2DROID_LIB_DIR}
          export PYO3_CROSS_INCLUDE_DIR=${PY2DROID_INCLUDE_DIR}
          export PYO3_NO_AUTO_LINK=1
          export PYO3_ABI3=0
          
          # 创建产物目录
          mkdir -p dist raw_wheels
          
          # 定义需要编译的包
          declare -A pkgs
          pkgs=( 
            ["cffi"]="cffi>=1.17.2" 
            ["pynacl"]="pynacl>=1.5.0"
            ["bcrypt"]="bcrypt>=4.0.0" 
            ["cryptography"]="cryptography>=43.0.0"
            ["pydantic-core"]="pydantic-core" 
            ["paramiko"]="paramiko>=3.0.0"
            ["invoke"]="invoke>=2.0.0"
          )

          # 循环构建每个包
          for pkg_name in "${!pkgs[@]}"; do
            pkg_spec=${pkgs[$pkg_name]}
            echo "--------------------------------------------------"
            echo "🚀 正在构建: $pkg_spec"
            echo "--------------------------------------------------"
            
            rm -rf build_source pyo3-config.ini && mkdir -p build_source && cd build_source
            
            export PYO3_ABI3=0
            CONFIG_FILE="../pyo3-config.ini"
            echo "implementation=CPython" > $CONFIG_FILE
            echo "version=${{ env.PY_ABI_VERSION }}" >> $CONFIG_FILE
            echo "shared=true" >> $CONFIG_FILE
            echo "abi3=false" >> $CONFIG_FILE
            echo "lib_name=python${{ env.PY_ABI_VERSION }}" >> $CONFIG_FILE
            echo "lib_dir=${PY2DROID_LIB_DIR}" >> $CONFIG_FILE
            echo "include_dir=${PY2DROID_INCLUDE_DIR}" >> $CONFIG_FILE
            
            export PYO3_CONFIG_FILE=$(pwd)/../pyo3-config.ini
            export SODIUM_INSTALL=system
            
            # ========================
            # 【终极修复】彻底禁用 cryptography Rust 后端
            # ========================
            if [ "$pkg_name" = "cryptography" ]; then
              echo "🔥 彻底禁用 cryptography Rust，使用纯C扩展（永久解决abi3报错）"
              export CRYPTOGRAPHY_DONT_BUILD_RUST=1
              export CRYPTOGRAPHY_USE_OPENSSL=system
              export OPENSSL_STATIC=1
            fi
            
            # 下载源码包
            echo "📥 下载 $pkg_spec 源码包..."
            pkg_base=$(echo "$pkg_spec" | cut -d'>' -f1 | tr -d ' =')
            
            sdist_url=$(python -c '
            import sys
            import json
            import urllib.request
            pkg = sys.argv[1]
            try:
                with urllib.request.urlopen(f"https://pypi.org/pypi/{pkg}/json") as resp:
                    data = json.load(resp)
                latest = data["info"]["version"]
                for file_info in data["releases"][latest]:
                    if file_info["packagetype"] == "sdist" and file_info["filename"].endswith((".tar.gz", ".zip")):
                        print(file_info["url"])
                        break
                else:
                    print("")
            except Exception:
                print("")
            ' "$pkg_base")

            if [ -z "$sdist_url" ]; then
              echo "❌ 无法获取 $pkg_spec 的 sdist 下载链接"
              exit 1
            fi

            wget -q --show-progress -O sdist.tar.gz "$sdist_url"
            tar -xzf sdist.tar.gz --strip-components=1
            
            # 构建 wheel
            python -m build \
              --wheel \
              --outdir ./dist \
              --config-setting="--plat-name=android_24_arm64_v8a" \
              --no-isolation \
              --verbose
            
            cp dist/*.whl ../raw_wheels/
            cd ..
            echo "✅ $pkg_name 构建完成"
          done

          # 统一 wheel 标签
          echo "--------------------------------------------------"
          echo "📦 统一标签：cp314-cp314-android_24_arm64_v8a"
          echo "--------------------------------------------------"
          
          rm -rf dist/*
          
          for wheel in raw_wheels/*.whl; do
            wheel_name=$(basename "$wheel")
            echo "处理：$wheel_name"
            
            cp "$wheel" dist/
            target_wheel="dist/$wheel_name"
            
            python -m wheel tags \
              --python-tag cp314 \
              --abi-tag cp314 \
              --platform-tag android_24_arm64_v8a \
              "$target_wheel"
              
            rm -f "$target_wheel"
            echo "✅ 标签修正完成"
          done

      # 验证构建产物的Android兼容性
      - name: Validate py2droid compatible wheels
        run: |
          echo "===== 验证构建产物兼容性 ====="
          all_valid=true
          for wheel in dist/*.whl; do
            echo "--------------------------------------------------"
            echo "验证文件: $(basename $wheel)"
            unzip -q "$wheel" -d ./validate_temp
            find ./validate_temp -name "*.so" -type f | while read so_file; do
              echo "  检查二进制: $(basename $so_file)"
              deps=$(aarch64-linux-gnu-readelf -d "$so_file" 2>/dev/null | grep NEEDED || echo "无动态依赖")
              echo "    动态依赖: $deps"
              if echo "$deps" | grep -q "libc.so.6"; then
                echo "    ❌ 不兼容：检测到glibc依赖，无法在Android上运行"
                all_valid=false
              else
                echo "    ✅ 兼容：无glibc依赖，适配py2droid Android环境"
              fi
            done
            rm -rf ./validate_temp
          done
          
          if [ "$all_valid" = "false" ]; then
            echo "❌ 部分构建产物不兼容py2droid"
            exit 1
          else
            echo "✅ 所有构建产物验证通过，100%兼容py2droid ${{ env.PY2DROID_VERSION }}"
          fi

      # 上传最终构建产物
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: py2droid-android-aarch64-python314-wheels
          path: dist/*.whl
