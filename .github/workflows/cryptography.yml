name: Build Android 3.14 Wheels (PyO3 Fixed)

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 增加 Swap 空间，防止 Rust 编译内存溢出 (OOM)
      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      # 2. 安装 QEMU 模拟器以支持 ARM64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build with cibuildwheel
        env:
          # --- 基础选择器 ---
          CIBW_BUILD: "cp314-manylinux_aarch64"
          CIBW_ARCHS: "aarch64"
          CIBW_BUILD_VERBOSITY: 3
          
          # --- 容器初始化：安装工具链 ---
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y wget tar unzip gcc gcc-c++ make libffi-devel openssl-devel pkgconfig &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env &&
            rustup target add aarch64-linux-android

          # --- 关键环境变量：修复 PyO3 ABI 报错 ---
          CIBW_ENVIRONMENT_LINUX: >
            PATH="$PATH:$HOME/.cargo/bin"
            LDFLAGS="-Wl,--allow-shlib-undefined"
            PYO3_NO_PYTHON=1
            # 告诉 Rust 编译器使用稳定的 ABI 接口
            RUSTFLAGS="--cfg pyo3_disable_inventory --cfg-feature=\"pyo3/abi3-py310\""
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            CARGO_BUILD_JOBS=2
            PKG_CONFIG_PATH=/usr/lib64/pkgconfig:/usr/share/pkgconfig
            # 传递我们在 run 阶段生成的配置文件路径
            PYO3_CONFIG_FILE="/project/pyo3-config.ini"

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""

        run: |
          pip install cibuildwheel
          mkdir -p dist
          
          # 针对 Python 3.14 优化的包版本
          declare -A pkgs
          pkgs=( ["cffi"]="cffi>=1.17.0" ["pydantic-core"]="pydantic-core" ["bcrypt"]="bcrypt>=4.0.0" )
          
          for pkg_name in "${!pkgs[@]}"; do
            pkg_spec=${pkgs[$pkg_name]}
            echo "--------------------------------------------------"
            echo "🚀 正在编译: $pkg_spec"
            echo "--------------------------------------------------"
            
            rm -rf build_source && mkdir build_source && cd build_source
            
            # --- 核心修复：动态生成 PyO3 配置文件 ---
            # 这会告诉编译器：我们要编的是 CPython 3.14，使用共享库和 abi3
            cat <<EOF > ../pyo3-config.ini
            implementation=CPython
            version=3.14
            shared=true
            abi3=true
            EOF

            # 下载并解压源码
            pip download --no-binary :all: --no-deps "$pkg_spec"
            tar -xzf *.tar.gz --strip-components=1
            
            # 运行编译 (注意：pyo3-config.ini 在项目根目录，会被映射到容器的 /project/pyo3-config.ini)
            cibuildwheel . --output-dir ../dist --platform linux
            
            cd ..
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-314-wheels-fixed
          path: dist/*.whl
