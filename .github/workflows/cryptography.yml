name: Build Cryptography for Py2droid (Python 3.14 Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 使用最新的 Python 3.14
          python-version: '3.14'

      - name: Set up Rust for Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build Android OpenSSL 1.1.1w
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar -xf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          export CC=aarch64-linux-android24-clang
          ./Configure android-arm64 -D__ANDROID_API__=24 no-shared
          make -j$(nproc)
          echo "OPENSSL_DIR=$(pwd)" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(pwd)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(pwd)/include" >> $GITHUB_ENV

      - name: Build Cryptography Wheel with Maturin
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          
          CARGO_BUILD_TARGET: aarch64-linux-android
          CRYPTOGRAPHY_OPENSSL_NO_VENDOR: 1
          AARCH64_LINUX_ANDROID_OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          AARCH64_LINUX_ANDROID_OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          AARCH64_LINUX_ANDROID_OPENSSL_STATIC: 1
        run: |
          # 1. 关键：增加 setuptools 依赖
          pip install -U pip maturin cffi setuptools
          
          # 2. 生成对应 3.14 的“空库”
          mkdir -p dummy_lib
          $CC -shared -o dummy_lib/libpython3.14.so -x c /dev/null
          export LIBRARY_PATH=$(pwd)/dummy_lib:$LIBRARY_PATH
          
          # 3. 准备 3.14 版 PyO3 配置文件
          cat <<EOF > pyo3-config.ini
          implementation=CPython
          version=3.14
          shared=true
          abi3=true
          lib_name=python3.14
          lib_dir=$(pwd)/dummy_lib
          EOF
          export PYO3_CONFIG_FILE=$(pwd)/pyo3-config.ini
          
          # 4. 下载源码并编译
          wget https://files.pythonhosted.org/packages/60/04/ee2a9e8542e4fa2773b81771ff8349ff19cdd56b7258a0cc442639052edb/cryptography-46.0.5.tar.gz
          tar -xzf cryptography-46.0.5.tar.gz
          cd cryptography-46.0.5
          
          maturin build --release --target aarch64-linux-android --out ../dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptography-py314-android-arm64
          path: "dist/*.whl"
