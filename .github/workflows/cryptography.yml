name: Build Android aarch64 Python 3.14 Wheels
on:
  workflow_dispatch:

jobs:
  build_android_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      # 核心：Android官方NDK，唯一能编译出Android兼容二进制的工具链
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27b
          link-to-sdk: true

      # 安装Rust和Android aarch64目标
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install latest build dependencies
        run: |
          sudo apt update
          sudo apt install -y make pkg-config patchelf binutils-aarch64-linux-gnu
          # 升级所有构建工具到最新版，兼容Python 3.14和现代构建规范
          pip install -U pip wheel setuptools setuptools-rust maturin

      - name: Build Android compatible wheels
        env:
          # 仅保留GitHub Actions预解析的基础变量（无shell展开依赖）
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TARGET_ARCH: aarch64-linux-android
          ANDROID_API: 24
          TARGET_PYTHON_VERSION: 3.14
          # 全局Rust构建配置
          CARGO_BUILD_TARGET: aarch64-linux-android
          RUSTFLAGS: -C link-arg=-Wl,--allow-shlib-undefined -C strip=symbols
          # 交叉编译全局开关
          PKG_CONFIG_ALLOW_CROSS: 1
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: |
          # ==============================================
          # 【致命问题修复】核心环境变量必须在shell内export
          # 原脚本在env块中用${VAR}引用变量，GitHub Actions不会展开shell变量，导致CC是字面量而非实际路径
          # ==============================================
          export TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
          # 绑定NDK的编译工具，100%确保路径正确展开
          export CC=${TOOLCHAIN}/bin/${TARGET_ARCH}${ANDROID_API}-clang
          export CXX=${TOOLCHAIN}/bin/${TARGET_ARCH}${ANDROID_API}-clang++
          export AR=${TOOLCHAIN}/bin/llvm-ar
          export RANLIB=${TOOLCHAIN}/bin/llvm-ranlib
          export STRIP=${TOOLCHAIN}/bin/llvm-strip
          
          # Rust Android交叉编译核心配置，确保linker路径正确传递给cargo
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${CC}
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=${AR}
          
          # ==============================================
          # 【PyO3交叉编译修复】补充必须的交叉编译开关
          # ==============================================
          export PYO3_CROSS=1
          export PYO3_CROSS_PYTHON_VERSION=${TARGET_PYTHON_VERSION}
          export PYO3_NO_PYTHON=1
          export PYO3_CONFIG_FILE=${GITHUB_WORKSPACE}/pyo3-config.ini
          
          # 预先生成PyO3配置，彻底避免语法坑
          cat > ${PYO3_CONFIG_FILE} << 'EOF'
          implementation=CPython
          version=3.14
          shared=true
          abi3=true
          lib_name=python3.14
          EOF
          
          # 创建输出目录
          mkdir -p dist raw_wheels
          
          # 定义需要编译的包
          declare -A pkgs
          pkgs=( 
            ["cffi"]="cffi>=1.17.0" 
            ["bcrypt"]="bcrypt>=4.0.0" 
            ["pydantic-core"]="pydantic-core" 
          )
          
          for pkg_name in "${!pkgs[@]}"; do
            pkg_spec=${pkgs[$pkg_name]}
            echo "--------------------------------------------------"
            echo "🚀 正在编译Android aarch64版本: $pkg_spec"
            echo "--------------------------------------------------"
            
            # 清空构建目录，避免污染
            rm -rf build_source && mkdir -p build_source && cd build_source
            
            # 下载源码（仅下载源码，不下载二进制包和依赖）
            pip download --no-binary :all: --no-deps "$pkg_spec"
            tar -xzf *.tar.gz --strip-components=1
            
            # ==============================================
            # 【构建逻辑优化】分场景适配不同构建系统
            # ==============================================
            # 1. 适配maturin构建的Rust包（如pydantic-core）
            if [ -f pyproject.toml ] && grep -q "maturin" pyproject.toml; then
              echo "使用maturin构建"
              maturin build --release --target ${TARGET_ARCH} --interpreter python${TARGET_PYTHON_VERSION} --out ./dist
            # 2. 适配setuptools构建的包（含setuptools-rust，如bcrypt、cffi）
            else
              echo "使用setuptools构建"
              python setup.py bdist_wheel --plat-name android_aarch64
            fi
            
            # 复制原始构建产物到临时目录
            cp dist/*.whl ../raw_wheels/
            cd ..
            echo "✅ $pkg_name 构建完成，原始产物已保存"
          done
          
          # ==============================================
          # 【Wheel标签修复】统一修正平台标签，确保Android pip能识别
          # 原脚本wheel pack命令用法错误，改用正确的wheel tags命令
          # ==============================================
          echo "--------------------------------------------------"
          echo "📦 统一修正Wheel平台标签"
          echo "--------------------------------------------------"
          for wheel in raw_wheels/*.whl; do
            echo "处理: $(basename $wheel)"
            # 移除原有平台标签，设置Android aarch64标签，输出到dist目录
            wheel tags \
              --platform-tag android_aarch64 \
              --python-tag py314 \
              --abi-tag abi3 \
              --remove-existing \
              --output-dir dist/ \
              "$wheel"
          done
          
          echo "✅ 所有包构建完成，最终产物已输出到dist目录"

      # 验证：确保构建产物无glibc依赖，真正兼容Android Bionic库
      - name: Validate Android wheels
        run: |
          echo "===== 验证构建产物兼容性 ====="
          all_valid=true
          for wheel in dist/*.whl; do
            echo "--------------------------------------------------"
            echo "验证文件: $(basename $wheel)"
            unzip -q "$wheel" -d ./validate_temp
            # 检查所有so文件的依赖，确保无glibc链接
            find ./validate_temp -name "*.so" -type f | while read so_file; do
              echo "  检查二进制: $(basename $so_file)"
              # 读取动态依赖
              deps=$(aarch64-linux-gnu-readelf -d "$so_file" 2>/dev/null | grep NEEDED || echo "无动态依赖")
              echo "    依赖: $deps"
              # 检查是否链接了glibc（Android不兼容）
              if echo "$deps" | grep -q "libc.so.6"; then
                echo "    ❌ 错误：检测到glibc依赖，不兼容Android"
                all_valid=false
              else
                echo "    ✅ 无glibc依赖，兼容Android"
              fi
            done
            rm -rf ./validate_temp
          done
          
          if [ "$all_valid" = "false" ]; then
            echo "❌ 部分构建产物不兼容Android"
            exit 1
          else
            echo "✅ 所有构建产物验证通过，完全兼容Android aarch64"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-314-aarch64-compatible-wheels
          path: dist/*.whl
