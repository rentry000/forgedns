name: Build Cryptography for Py2droid (OpenSSL 1.1.1w)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust for Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c # r25c 对 OpenSSL 1.1.1w 兼容性较好

      - name: Build Android OpenSSL 1.1.1w
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # 1. 准备工具链路径 (将 NDK llvm 目录加入 PATH)
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          
          # 2. 下载并解压 OpenSSL 1.1.1w
          wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar -xf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          
          # 3. 关键：设置环境变量强制 OpenSSL 使用 Clang
          # 对于 1.1.1w，必须手动指定 CC 为 clang
          export CC=aarch64-linux-android24-clang
          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          
          ./Configure android-arm64 -D__ANDROID_API__=24 no-shared
          make -j$(nproc)
          
          # 导出绝对路径给下一步
          echo "OPENSSL_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Build Cryptography Wheel
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CRYPTOGRAPHY_OPENSSL_NO_VENDOR: 1
        run: |
          pip install -U pip wheel setuptools-rust
          # 这里的 OPENSSL_DIR 会自动使用上一步导出的路径
          pip wheel https://files.pythonhosted.org/packages/60/04/ee2a9e8542e4fa2773b81771ff8349ff19cdd56b7258a0cc442639052edb/cryptography-46.0.5.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptography-android-arm64
          path: "*.whl"
