name: Build Android aarch64 Python 3.14 Wheels
on:
  workflow_dispatch:

jobs:
  build_android_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      # 核心：Android官方NDK，唯一能编译出Android兼容二进制的工具链
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27b
          link-to-sdk: true

      # 安装Rust和Android aarch64目标
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install latest build dependencies
        run: |
          sudo apt update
          sudo apt install -y make pkg-config patchelf binutils-aarch64-linux-gnu
          # 升级所有构建工具到最新版，兼容Python 3.14和现代构建规范
          pip install -U pip wheel setuptools setuptools-rust maturin crossenv

      - name: Build Android compatible wheels
        env:
          # NDK核心配置，指定Android目标平台
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TARGET_ARCH: aarch64-linux-android
          ANDROID_API: 24
          
          # 绑定NDK的编译工具，强制链接Android Bionic库（而非桌面glibc）
          CC: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET_ARCH}${ANDROID_API}-clang
          CXX: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET_ARCH}${ANDROID_API}-clang++
          AR: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          RANLIB: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          STRIP: ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          
          # Rust Android交叉编译核心配置，100%适配Android
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${CC}
          CARGO_BUILD_TARGET: aarch64-linux-android
          RUSTFLAGS: -C link-arg=-Wl,--allow-shlib-undefined -C strip=symbols
          
          # PyO3交叉编译适配，兼容Python 3.14预览版
          PYO3_CROSS_PYTHON_VERSION: 3.14
          PYO3_NO_PYTHON: 1
          PYO3_CONFIG_FILE: ${{ github.workspace }}/pyo3-config.ini
          
          # 核心：通过环境变量给setuptools传递平台名，无参数报错风险
          SETUPTOOLS_PLAT_NAME: android_aarch64
          WHEEL_PLAT_NAME: android_aarch64
        run: |
          mkdir -p dist raw_wheels
          
          # 预先生成PyO3配置，彻底避免EOF语法坑
          cat > pyo3-config.ini << 'EOF'
          implementation=CPython
          version=3.14
          shared=true
          abi3=true
          EOF
          
          # 定义需要编译的包
          declare -A pkgs
          pkgs=( 
            ["cffi"]="cffi>=1.17.0" 
            ["bcrypt"]="bcrypt>=4.0.0" 
            ["pydantic-core"]="pydantic-core" 
          )
          
          for pkg_name in "${!pkgs[@]}"; do
            pkg_spec=${pkgs[$pkg_name]}
            echo "--------------------------------------------------"
            echo "🚀 正在编译Android aarch64版本: $pkg_spec"
            echo "--------------------------------------------------"
            
            rm -rf build_source && mkdir -p build_source && cd build_source
            
            # 下载源码
            pip download --no-binary :all: --no-deps "$pkg_spec"
            tar -xzf *.tar.gz --strip-components=1
            
            # 核心修正：正确构建wheel，无--plat-name参数报错
            # 方式1：兼容setuptools构建的包（如cffi）
            if [ -f setup.py ]; then
              python setup.py bdist_wheel --plat-name android_aarch64
            # 方式2：兼容maturin构建的Rust包（如bcrypt、pydantic-core）
            elif [ -f pyproject.toml ] && grep -q "maturin" pyproject.toml; then
              maturin build --release --target aarch64-linux-android --interpreter python3.14 --out ./dist
            # 通用兼容方式
            else
              pip wheel . -w ./dist --no-binary :all: --verbose
            fi
            
            # 复制原始构建产物
            cp dist/*.whl ../raw_wheels/
            cd ..
            
            # 核心：强制修正wheel平台标签，确保Android pip能识别
            for wheel in raw_wheels/*.whl; do
              # 重命名并修正标签为android_aarch64，彻底解决平台不支持问题
              wheel pack "$wheel" --plat-name android_aarch64 -d dist/
              rm -f "$wheel"
            done
          done

      # 验证：确保构建产物无glibc依赖，真正兼容Android
      - name: Validate Android wheels
        run: |
          echo "===== 验证构建产物兼容性 ====="
          for wheel in dist/*.whl; do
            echo "--------------------------------------------------"
            echo "验证文件: $wheel"
            unzip -q "$wheel" -d ./validate_temp
            # 检查所有so文件的依赖，确保无glibc链接
            find ./validate_temp -name "*.so" -type f | while read so_file; do
              echo "  检查二进制: $(basename $so_file)"
              aarch64-linux-gnu-readelf -d "$so_file" | grep NEEDED || echo "    无动态依赖"
            done
            rm -rf ./validate_temp
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-314-aarch64-compatible-wheels
          path: dist/*.whl
