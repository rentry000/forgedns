name: Build Android bcrypt Wheels

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest  # 必须使用Linux或macOS运行器[[__LINK_ICON]](https://cibuildwheel.readthedocs.org/?f_link_type=f_linkinlinenote&flow_extra=eyJkb2NfcG9zaXRpb24iOjAsImRvY19pZCI6IjQ0OGIyNjVhYzNmZTEyY2UtNjhhNDkxYTZhNjJiZTE4NyIsImlubGluZV9kaXNwbGF5X3Bvc2l0aW9uIjowfQ%3D%3D "[__LINK_ICON]")
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          
      - name: Install cibuildwheel
        run: pip install cibuildwheel>=3.4.0
        
      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk-version: 25.1.8937393
          build-tools-version: 33.0.2
          
      - name: Build Android wheels
        run: cibuildwheel --platform android
        env:
          CIBW_ARCHS: android:aarch64
          CIBW_ANDROID_API_LEVEL: 24
          CIBW_BEFORE_BUILD: cargo update
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-wheels
          path: ./wheelhouse/*.whl
