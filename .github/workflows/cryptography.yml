name: Build Android Wheels (CIBW Robust Version)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build with cibuildwheel
        env:
          # 只构建 Python 3.14 的 ARM64 版本
          CIBW_BUILD: "cp314-manylinux_aarch64"
          CIBW_ARCHS: "aarch64"
          
          # --- 修正后的 Before All：安装必要工具和 Rust ---
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y wget tar unzip gcc gcc-c++ make libffi-devel openssl-devel &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            echo "source $HOME/.cargo/env" >> $HOME/.bashrc

          # --- 核心环境变量：解决 PyExc_ValueError 报错 ---
          CIBW_ENVIRONMENT_LINUX: >
            PATH="$PATH:$HOME/.cargo/bin"
            LDFLAGS="-Wl,--allow-shlib-undefined"
            PYO3_NO_PYTHON=1
            CARGO_NET_GIT_FETCH_WITH_CLI=true

          # 禁止自动修复依赖，确保生成的包保持“纯净”
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""

        run: |
          pip install cibuildwheel
          mkdir -p dist
          
          # 待编译列表
          packages=("cffi" "pydantic-core" "bcrypt")
          
          for pkg in "${packages[@]}"; do
            echo "--------------------------------------------------"
            echo "🚀 正在编译原生 ARM64 模块: $pkg"
            echo "--------------------------------------------------"
            
            rm -rf build_source && mkdir build_source && cd build_source
            # 下载源码
            pip download --no-binary :all: --no-deps $pkg
            tar -xzf *.tar.gz --strip-components=1
            
            # 执行编译
            cibuildwheel . --output-dir ../dist --platform linux
            
            cd ..
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-314-wheels-bundle
          path: dist/*.whl
