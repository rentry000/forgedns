name: Build Cryptography for Py2droid (Fixed PyO3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust for Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build Android OpenSSL 1.1.1w
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar -xf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          export CC=aarch64-linux-android24-clang
          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          ./Configure android-arm64 -D__ANDROID_API__=24 no-shared
          make -j$(nproc)
          echo "OPENSSL_DIR=$(pwd)" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(pwd)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(pwd)/include" >> $GITHUB_ENV

      - name: Build Cryptography Wheel
        env:
          # --- 基础交叉编译配置 ---
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          
          # --- 修复 PyO3 错误的核心变量 ---
          PYO3_CROSS: 1
          PYO3_CROSS_LIB_DIR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/24
          PYO3_CROSS_PYTHON_VERSION: "3.11"
          # 关键：告诉 PyO3 不要去查 _sysconfigdata，直接开始构建
          PYO3_NO_PYTHON: 1
          
          # --- OpenSSL 配置 ---
          CRYPTOGRAPHY_OPENSSL_NO_VENDOR: 1
          AARCH64_LINUX_ANDROID_OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          AARCH64_LINUX_ANDROID_OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          AARCH64_LINUX_ANDROID_OPENSSL_STATIC: 1
        run: |
          pip install -U pip wheel setuptools-rust
          # 使用 --no-deps 避免 pip 尝试去构建不需要的依赖
          pip wheel https://files.pythonhosted.org/packages/60/04/ee2a9e8542e4fa2773b81771ff8349ff19cdd56b7258a0cc442639052edb/cryptography-46.0.5.tar.gz --no-deps

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptography-46.0.5-android-arm64
          path: "*.whl"
