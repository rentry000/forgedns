name: Build Android 3.14 Wheels (Final Stable)

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 增加 Swap 空间，防止 Rust 编译 (pydantic-core) 内存溢出
      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      # 2. 安装 QEMU 模拟器以支持 ARM64 容器运行
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build with cibuildwheel
        env:
          # --- 基础配置 ---
          CIBW_BUILD: "cp314-manylinux_aarch64"
          CIBW_ARCHS: "aarch64"
          CIBW_BUILD_VERBOSITY: 3
          
          # --- 容器初始化：安装 NDK 依赖、编译工具和 Rust ---
          # 修复：manylinux镜像默认使用yum，替换dnf为yum
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget tar unzip gcc gcc-c++ make libffi-devel openssl-devel pkgconfig &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env &&
            rustup target add aarch64-linux-android

          # --- 核心环境变量：修复 PyO3 ABI 报错 ---
          # 修复：用|保留换行，避免折叠标量导致的变量解析问题
          CIBW_ENVIRONMENT_LINUX: |
            PATH="$PATH:$HOME/.cargo/bin"
            LDFLAGS="-Wl,--allow-shlib-undefined"
            PYO3_NO_PYTHON=1
            RUSTFLAGS="--cfg pyo3_disable_inventory --cfg-feature=\"pyo3/abi3-py310\""
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            CARGO_BUILD_JOBS=2
            PKG_CONFIG_PATH=/usr/lib64/pkgconfig:/usr/share/pkgconfig
            PYO3_CONFIG_FILE="/project/pyo3-config.ini"

          # 禁止修复，防止 Android 环境下出现 GLIBC 版本冲突
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""

        run: |
          pip install cibuildwheel
          mkdir -p dist
          
          # 定义需要编译的包
          declare -A pkgs
          pkgs=( ["cffi"]="cffi>=1.17.0" ["pydantic-core"]="pydantic-core" ["bcrypt"]="bcrypt>=4.0.0" )
          
          for pkg_name in "${!pkgs[@]}"; do
            pkg_spec=${pkgs[$pkg_name]}
            echo "--------------------------------------------------"
            echo "🚀 正在编译: $pkg_spec"
            echo "--------------------------------------------------"
            
            rm -rf build_source && mkdir build_source && cd build_source
            
            # --- 核心修复：EOF 必须完全顶格，不能有任何缩进 ---
            cat <<EOF > ../pyo3-config.ini
            implementation=CPython
            version=3.14
            shared=true
            abi3=true
            EOF
            
            # 下载源码并准备环境
            pip download --no-binary :all: --no-deps "$pkg_spec"
            tar -xzf *.tar.gz --strip-components=1
            
            # 启动 cibuildwheel
            cibuildwheel . --output-dir ../dist --platform linux
            
            cd ..
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-314-wheels-bundle
          path: dist/*.whl
