name: dnscache-go Android ARM64 Build
on:
  workflow_dispatch:   # 手动一键触发
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: efex33/dnscache-go
          ref: master

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Cross compile Android ARM64 static binary
        env:
          CGO_ENABLED: 0
          GOOS: android
          GOARCH: arm64
        run: |
          go build -ldflags "-s -w" -o dnscache-go-android-arm64 ./cmd/dnscache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnscache-go-android-arm64
          path: dnscache-go-android-arm64
          retention-days: 90
