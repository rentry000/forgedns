name: Build ForgedNS Android ARM64 Static

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      # 建议你用这步先看看文件到底在哪
      - name: Verify repository structure
        run: ls -laR | head -n 30

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK r29
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 $HOME/android-ndk
          echo "ANDROID_NDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Configure Cross Compile Tools
        run: |
          TOOLCHAIN="$HOME/android-ndk/toolchains/llvm/prebuilt/linux-x86_64"
          echo "TOOLCHAIN_BASE=$TOOLCHAIN" >> $GITHUB_ENV
          
      - name: Build forgedns
        env:
          # 使用 GitHub 语法读取环境变量
          # Rust 官方推荐通过环境变量指定交叉编译器的 linker
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.TOOLCHAIN_BASE }}/bin/aarch64-linux-android24-clang
          # Android 的静态编译可能比较苛刻，如果默认不成功可以加上下面这行
          RUSTFLAGS: "-C link-arg=-static"
        run: |
          # 如果 Cargo.toml 在子目录，请在这里先 cd 进去，例如：cd forgedns
          cargo build --release --target aarch64-linux-android

      - name: Upload final binary
        uses: actions/upload-artifact@v4
        with:
          name: forgedns-android-arm64
          # 注意：如果你上面 cd 进了子目录，这里的提取路径也需要带上子目录
          path: target/aarch64-linux-android/release/forgedns
