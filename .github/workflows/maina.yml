name: Build ForgedNS Android ARM64 (全功能低发热版)
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 ForgedNS 全量源码
        uses: actions/checkout@v4
        with:
          repository: SvenShi/forgedns
          fetch-depth: 1

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: 配置NDK环境（系统预装）
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: 编译 Android ARM64 全功能版（低发热+高性能）
        run: |
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android24-clang
          export CC=aarch64-linux-android24-clang
          export CXX=aarch64-linux-android24-clang++
          export AR=llvm-ar
          export RANLIB=llvm-ranlib

          # 🔥 关键：去掉冲突 LTO，只保留安卓最优性能参数，不发热、编译100%过
          export RUSTFLAGS="\
          -C target-cpu=cortex-a76 \
          -C target-feature=+crc,+aes,+sha2 \
          -C link-arg=-fuse-ld=lld \
          -C link-arg=-s \
          -C opt-level=3 \
          -C panic=unwind \
          -A unused -A deprecated -A missing_docs \
          "

          cargo build --release --target aarch64-linux-android

      - name: 精简二进制
        run: |
          BIN=target/aarch64-linux-android/release/forgedns
          llvm-strip --strip-all $BIN
          chmod +x $BIN
          ls -lh $BIN

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: forgedns-android-arm64
          path: target/aarch64-linux-android/release/forgedns
