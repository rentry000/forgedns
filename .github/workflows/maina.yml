name: Build ForgedNS Android ARM64 Static

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # е®‰иЈ… NDK r29
      - name: Install Android NDK r29
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 $HOME/android-ndk
          echo "ANDROID_NDK=$HOME/android-ndk" >> $GITHUB_ENV

      # й…ЌзЅ® NDK r29 зј–иЇ‘е™Ё
      - name: Set Cross Compile Env
        run: |
          TOOLCHAIN="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64"
          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV

      # йќ™жЂЃзј–иЇ‘
      - name: Build Static Binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --release --target aarch64-linux-android

      - name: Upload forgedns
        uses: actions/upload-artifact@v4
        with:
          name: forgedns-android-arm64
          path: target/aarch64-linux-android/release/forgedns
