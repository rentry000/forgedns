name: Build ForgedNS Android ARM64 Static

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Clone forgedns repo
        run: |
          git clone https://github.com/SvenShi/forgedns.git
          cd forgedns
          ls -la

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK r29
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 ~/android-ndk

      - name: Build forgedns
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /home/runner/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          RUSTFLAGS: "-C link-arg=-static"
        run: |
          cd forgedns
          cargo build --release --target aarch64-linux-android

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: forgedns-android-arm64
          path: forgedns/target/aarch64-linux-android/release/forgedns
