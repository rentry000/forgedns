name: Android ARM64 二进制自动构建
on:
  # 手动一键触发（推荐，随时可构建）
  workflow_dispatch:
  # 推送main分支时自动构建
  push:
    branches: [ main ]
    tags:
      - 'v*'
  # PR提交时自动测试构建
  pull_request:
    branches: [ main ]

jobs:
  build-android-arm64:
    name: 构建 Android ARM64 二进制
    runs-on: ubuntu-latest
    env:
      # 固定ARM64配置，无需修改
      TARGET: aarch64-linux-android
      ARCH: arm64-v8a
      ANDROID_API: 30  # 兼容Android 11+，覆盖99%现役安卓设备
      NDK_VERSION: r27b # 最新LTS稳定版，兼容Rust与安卓系统

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}
          components: rustfmt, clippy

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: 配置交叉编译环境
        run: |
          # 配置NDK工具链路径
          NDK_TOOLCHAIN=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "NDK_TOOLCHAIN=$NDK_TOOLCHAIN" >> $GITHUB_ENV
          
          # 配置ARM64专属链接器与归档工具
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_TOOLCHAIN/${{ env.TARGET }}${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "AR_AARCH64_LINUX_ANDROID=$NDK_TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          
          # 核心：全静态编译+去除调试符号，生成安卓无依赖独立二进制
          echo "RUSTFLAGS=-C target-feature=+crt-static -C strip=symbols" >> $GITHUB_ENV

      - name: 执行 Release 构建
        run: |
          cargo build --release --target ${{ env.TARGET }}
          # 重命名二进制文件，方便识别
          cp target/${{ env.TARGET }}/release/dnscache dnscache-android-${{ env.ARCH }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dnscache-android-${{ env.ARCH }}
          path: dnscache-android-${{ env.ARCH }}
          if-no-files-found: error
          retention-days: 90

  # 可选：打Tag时自动发布到 GitHub Release
  release:
    name: 发布到 GitHub Release
    needs: build-android-arm64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载ARM64构建产物
        uses: actions/download-artifact@v4
        with:
          name: dnscache-android-arm64-v8a

      - name: 生成校验文件
        run: |
          sha256sum dnscache-android-arm64-v8a > sha256sum.txt

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: dnscache Android ARM64 构建 ${{ github.ref_name }}
          files: |
            dnscache-android-arm64-v8a
            sha256sum.txt
          generate_release_notes: true
          draft: false
          prerelease: false
