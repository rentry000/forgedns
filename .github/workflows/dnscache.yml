name: Android ARM64 dnscache 构建
on:
  workflow_dispatch: # 手动一键触发
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build-arm64:
    name: 构建 Android ARM64 静态二进制
    runs-on: ubuntu-latest
    env:
      TARGET: aarch64-linux-android
      ARCH: arm64-v8a
      ANDROID_API: 30
      NDK_VERSION: r27b
      REPO: pzaino/dnscache # 官方dnscache仓库，自带正确的Cargo.toml

    steps:
      - name: 拉取官方dnscache完整代码（含Cargo.toml）
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }} # 关键修复：直接拉取带Cargo.toml的官方仓库
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: 配置交叉编译环境
        run: |
          NDK_TOOLCHAIN=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          # 配置ARM64链接器
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_TOOLCHAIN/${{ env.TARGET }}${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "AR_AARCH64_LINUX_ANDROID=$NDK_TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          # 全静态编译，生成安卓无依赖二进制
          echo "RUSTFLAGS=-C target-feature=+crt-static -C strip=symbols" >> $GITHUB_ENV

      - name: 验证Cargo.toml存在（排错用，可删除）
        run: |
          pwd
          ls -la Cargo.toml
          cat Cargo.toml

      - name: 执行Release构建
        run: cargo build --release --target ${{ env.TARGET }}

      - name: 重命名并上传产物
        run: cp target/${{ env.TARGET }}/release/dnscache dnscache-android-${{ env.ARCH }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: dnscache-android-${{ env.ARCH }}
          path: dnscache-android-${{ env.ARCH }}
          retention-days: 90

  # 打Tag自动发布到Release
  release:
    needs: build-arm64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dnscache-android-arm64-v8a
      - name: 生成校验文件
        run: sha256sum dnscache-android-arm64-v8a > sha256sum.txt
      - uses: softprops/action-gh-release@v2
        with:
          name: dnscache Android ARM64 构建 ${{ github.ref_name }}
          files: |
            dnscache-android-arm64-v8a
            sha256sum.txt
          generate_release_notes: true
