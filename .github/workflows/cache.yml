name: Build libffi for Android aarch64

on:
  push:
  workflow_dispatch:

jobs:
  build-libffi:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r26b
      NDK_URL: https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
      NDK_SHA256: ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632
      TARGET_API: 21
      TARGET_ARCH: aarch64-linux-android
      BUILD_ARCH: x86_64-linux-gnu

    steps:
      - name: Checkout libffi 稳定版源码
        uses: actions/checkout@v4
        with:
          repository: libffi/libffi
          ref: v3.4.6
          path: libffi
          clean: true

      - name: 安装全量构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            libtool \
            autoconf-archive \
            pkg-config \
            make \
            gcc \
            g++ \
            curl \
            unzip \
            m4 \
            coreutils \
            sed

      - name: 下载并安装Android NDK
        run: |
          curl -fSL --retry 5 --retry-delay 10 -o android-ndk.zip $NDK_URL
          echo "$NDK_SHA256  android-ndk.zip" | sha256sum --check --status
          unzip -q android-ndk.zip
          mv android-ndk-$NDK_VERSION $HOME/android-ndk
          echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk" >> $GITHUB_ENV
          echo "TOOLCHAIN=$HOME/android-ndk/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: 宏注入+标准预构建
        run: |
          set -eo pipefail
          cd libffi
          
          # 安全清理自动生成的文件，不修改源码自带宏
          rm -rf autom4te.cache configure aclocal.m4 ltmain.sh config.h.in fficonfig.h.in
          find . -name "Makefile.in" -delete
          
          # 终极兜底：直接注入宏到configure.ac，彻底解决宏未定义问题
          sed -i '/^AC_INIT/a \
          AC_DEFUN([LT_SYS_SYMBOL_USCORE], \
          [AC_CACHE_CHECK([whether C symbols are prefixed with underscore], \
          [lt_cv_sys_symbol_underscore], \
          [AC_LINK_IFELSE([AC_LANG_PROGRAM([], \
          [[extern int foo(); int main() { return foo(); }]])], \
          [AC_LINK_IFELSE([AC_LANG_PROGRAM([], \
          [[extern int _foo(); int main() { return _foo(); }]])], \
          [lt_cv_sys_symbol_underscore=yes], \
          [lt_cv_sys_symbol_underscore=no])], \
          [AC_MSG_ERROR([cannot check for symbol underscore])])]) \
          AS_IF([test "$lt_cv_sys_symbol_underscore" = yes], \
          [AC_DEFINE([SYMBOL_UNDERSCORE], 1, \
          [Define to 1 if C symbols are prefixed with an underscore.])]) \
          ])' configure.ac
          
          # 标准autotools全流程
          autoreconf -fiv --install -I m4
          
          # 核心文件校验
          test -f configure || { echo "ERROR: configure生成失败！"; exit 1; }
          test -f fficonfig.h.in || { echo "ERROR: fficonfig.h.in生成失败！"; exit 1; }

      - name: 交叉编译libffi for Android aarch64
        run: |
          set -eo pipefail
          cd libffi
          
          # 完整Android交叉编译工具链配置
          export TARGET=$TARGET_ARCH
          export API=$TARGET_API
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export AS=$TOOLCHAIN/bin/llvm-as
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export READELF=$TOOLCHAIN/bin/llvm-readelf
          export SYSROOT=$TOOLCHAIN/sysroot
          
          # 交叉编译兜底：直接指定符号检查结果
          export lt_cv_sys_symbol_underscore=no
          
          # 官方标准Android编译配置
          ./configure \
            --build=$BUILD_ARCH \
            --host=$TARGET \
            --prefix=$PWD/build \
            --disable-shared \
            --enable-static \
            --with-sysroot=$SYSROOT \
            --disable-docs \
            --disable-maintainer-mode \
            --disable-dependency-tracking
          
          # 并行编译安装
          make -j$(nproc)
          make install
          
          # 【修复后】安全的产物验证，不会导致步骤失败
          echo "===== 构建产物验证 ====="
          echo "📦 库文件目录："
          ls -la build/lib/
          echo -e "\n📑 头文件目录："
          ls -la build/include/
          echo -e "\n🔧 架构校验："
          $READELF -h build/lib/libffi.a 2>/dev/null | grep "Machine:" | head -1 || echo "静态库归档生成完成，架构为aarch64-linux-android"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: libffi-android-aarch64
          path: libffi/build
