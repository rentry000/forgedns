name: Build Android arm64 Static Binary
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    permissions:
      contents: write

permissions:
  contents: write

jobs:
  build-android-arm64:
    name: Build Android arm64 Static Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          check-latest: true
          cache: true

      - name: Build Preparation
        run: |
          mkdir -p build_output
          rm -rf build_output/*
          echo "BUILD_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +%Y-%m-%d_%H-%M-%S)" >> $GITHUB_ENV

      # 新增：核心修复步骤，自动初始化Go模块，兼容有无go.mod的情况
      - name: Fix Go Module Missing
        run: |
          if [ ! -f go.mod ]; then
            echo "未找到go.mod，自动初始化Go模块"
            # 模块名可自定义，不影响编译结果
            go mod init forgedns
            go mod tidy
          else
            echo "已存在go.mod，自动补齐依赖"
            go mod tidy
          fi

      # 核心交叉编译步骤，保持之前的静态编译配置不变
      - name: Cross Compile Static Binary
        run: |
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build \
          -ldflags "-w -s -extldflags '-static' -X main.version=${{ env.BUILD_VERSION }} -X main.buildTime=${{ env.BUILD_TIME }}" \
          -o build_output/forgedns-android-arm64

      - name: Validate Static Binary
        run: |
          echo "===== 二进制文件信息校验 ====="
          file build_output/forgedns-android-arm64
          
          echo "===== 静态链接校验 ====="
          if file build_output/forgedns-android-arm64 | grep -q "statically linked"; then
            echo "✅ 校验通过：已编译为完全静态二进制，无外部依赖"
          else
            echo "❌ 校验失败：二进制非静态链接，存在运行依赖"
            exit 1
          fi
          
          echo "===== 架构校验 ====="
          if file build_output/forgedns-android-arm64 | grep -q "ARM aarch64"; then
            echo "✅ 校验通过：目标架构为arm64(aarch64)，适配安卓设备"
          else
            echo "❌ 校验失败：架构不匹配，非arm64架构"
            exit 1
          fi

      - name: Package & Generate Checksum
        run: |
          cp LICENSE README.md build_output/ 2>/dev/null || true
          cd build_output
          zip -9 forgedns-android-arm64.zip forgedns-android-arm64 LICENSE README.md
          sha256sum forgedns-android-arm64.zip > forgedns-android-arm64.zip.sha256
          sha256sum forgedns-android-arm64 > forgedns-android-arm64.sha256
          echo "===== 构建产物列表 ====="
          ls -lh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgedns-android-arm64
          path: build_output/*
          retention-days: 90

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.BUILD_VERSION }}
          files: |
            build_output/forgedns-android-arm64.zip
            build_output/forgedns-android-arm64.zip.sha256
            build_output/forgedns-android-arm64
            build_output/forgedns-android-arm64.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
