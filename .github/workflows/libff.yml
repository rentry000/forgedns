name: Build libffi for Android aarch64

on:
  push:
  workflow_dispatch:

jobs:
  build-libffi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout libffi
        uses: actions/checkout@v4
        with:
          repository: libffi/libffi
          path: libffi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            make \
            gcc \
            g++ \
            curl \
            unzip

      - name: Install Android NDK
        run: |
          curl -sLO https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          mv android-ndk-r26b $HOME/android-ndk
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Build libffi for aarch64-linux-android
        run: |
          cd libffi
          
          # 生成 configure（解决你现在的错误）
          autoreconf -fiv
          
          # 交叉编译工具链
          export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21
          export CC=$TOOLCHAIN/bin/$TARGET$API-clang
          export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export AS=$TOOLCHAIN/bin/llvm-as
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          # 配置
          ./configure \
            --host=$TARGET \
            --prefix=$PWD/build \
            --disable-shared \
            --enable-static
          
          # 编译安装
          make -j$(nproc)
          make install
          
          # 输出结果
          ls -la build/lib/
          ls -la build/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libffi-android-aarch64
          path: libffi/build
