name: Build SublinkPro Android arm64 Binary
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 支持手动触发
permissions:
  contents: write
jobs:
  build-sublinkpro-android:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y upx git
          corepack enable

      - name: 安装Node.js与Go环境
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: 【核心】克隆官方完整sublinkPro仓库（含完整webs目录）
        run: |
          git clone --depth=1 https://github.com/ZeroDeng01/sublinkPro.git
          cd sublinkPro
          echo "=== 完整项目目录结构 ==="
          ls -la
          echo "=== 确认webs目录存在 ==="
          ls -la webs/

      - name: 构建前端项目
        working-directory: ./sublinkPro/webs
        run: |
          yarn install --immutable
          yarn run build
          echo "=== 前端构建完成，dist目录 ==="
          ls -la dist/

      - name: 注入版本号并构建Android arm64纯静态二进制
        working-directory: ./sublinkPro
        run: |
          # 写入版本号
          echo "$(git rev-parse --short HEAD)" > VERSION
          # 核心构建Android arm64二进制，禁用CGO纯静态编译，无系统依赖
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -tags=prod -ldflags="-s -w" -o sublinkPro-android-arm64 .
          # UPX压缩减小体积
          upx --best --lzma sublinkPro-android-arm64 || true
          echo "=== Android二进制构建完成 ==="
          ls -lh sublinkPro-android-arm64

      - name: 上传Android二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: sublinkPro-android-arm64
          path: ./sublinkPro/sublinkPro-android-arm64
          retention-days: 30

      - name: 自动发布到Release（可选）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: SublinkPro Android arm64 最新构建
          files: ./sublinkPro/sublinkPro-android-arm64
          body: |
            自动构建的 SublinkPro Android arm64 二进制文件
            适配：Android 7.0+ arm64(aarch64) 设备
            支持：Termux、Magisk模块、adb shell、root环境运行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
