name: Build FastDNS-phuslu arm64 Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23" # 匹配fastdns最低Go版本要求

      - name: Generate main.go (官方API零报错最终版)
        run: |
          cat > main.go << 'EOF'
          package main

          import (
          	"context"
          	"log/slog"
          	"math/rand"
          	"strings"
          	"time"

          	"github.com/phuslu/fastdns"
          )

          const ListenAddr = ":6005"

          var (
          	// 国内DNS上游
          	chinaDNS = []string{
          		"223.5.5.5:53",
          		"223.6.6.6:53",
          		"114.114.114.114:53",
          		"119.29.29.29:53",
          	}
          	// 海外DNS上游
          	foreignDNS = []string{
          		"8.8.8.8:53",
          		"8.8.4.4:53",
          		"1.1.1.1:53",
          	}
          	// 国内域名后缀匹配
          	chinaSuffix = []string{
          		".cn", ".com.cn", ".net.cn", ".org.cn", ".gov.cn", ".edu.cn",
          	}
          	// 全局DNS客户端池
          	clientPool = make(map[string]*fastdns.Client)
          	// 线程安全随机数源
          	randSource = rand.New(rand.NewSource(time.Now().UnixNano()))
          )

          // 随机选择上游DNS
          func randUpstream(servers []string) string {
          	return servers[randSource.Intn(len(servers))]
          }

          // 判断是否为国内域名
          func isChinaDomain(domain string) bool {
          	domainLower := strings.ToLower(domain)
          	for _, suf := range chinaSuffix {
          		if strings.HasSuffix(domainLower, suf) {
          			return true
          		}
          	}
          	return false
          }

          // 获取/初始化DNS客户端
          func getClient(addr string) *fastdns.Client {
          	if client, ok := clientPool[addr]; ok {
          		return client
          	}
          	// 严格官方客户端初始化 无自定义Dialer 原生UDP支持
          	client := &fastdns.Client{
          		Addr: addr,
          	}
          	clientPool[addr] = client
          	return client
          }

          // DNS处理器 严格对齐官方ServeDNS接口规范
          type DNSHandler struct {
          	Debug bool
          }

          func (h *DNSHandler) ServeDNS(rw fastdns.ResponseWriter, req *fastdns.Message) {
          	if h.Debug {
          		slog.Info("dns request",
          			"domain", string(req.Domain),
          			"type", req.Question.Type.String(),
          			"class", req.Question.Class.String(),
          		)
          	}

          	// 1. 分流逻辑：国内域名走国内DNS 其余走海外DNS
          	upstreamAddr := randUpstream(foreignDNS)
          	// 修复：req.Domain是[]byte 强制转string
          	if isChinaDomain(string(req.Domain)) {
          		upstreamAddr = randUpstream(chinaDNS)
          	}

          	// 2. 向上游转发DNS请求 官方原生Exchange方法
          	ctx, cancel := context.WithTimeout(context.Background(), 3*time.Second)
          	defer cancel()

          	client := getClient(upstreamAddr)
          	// 修复：使用官方Client.Exchange方法 替代不存在的Do/Exchange全局函数
          	resp, err := client.Exchange(ctx, nil, req)
          	if err != nil {
          		// 上游请求失败 返回标准DNS服务器错误
          		req.SetResponseHeader(fastdns.RcodeServFail, 0)
          		_, _ = rw.Write(req.Raw)
          		return
          	}

          	// 3. 把上游响应返回给客户端 官方标准写法
          	_, _ = rw.Write(resp.Raw)
          }

          func main() {
          	slog.Info("phuslu/fastdns server started", "listen", "0.0.0.0"+ListenAddr, "proto", "UDP")

          	// 严格对齐官方ForkServer用法
          	server := &fastdns.ForkServer{
          		Handler: &DNSHandler{
          			Debug: false, // 改为true可开启请求日志
          		},
          		Stats: &fastdns.CoreStats{
          			Prefix: "coredns_",
          			Family: "1",
          			Proto:  "udp",
          			Server: "dns://" + ListenAddr,
          			Zone:   ".",
          		},
          		// 修复：ErrorLog必须是*slog.Logger类型 用slog.Default()
          		ErrorLog: slog.Default(),
          	}

          	// 启动服务 监听地址作为入参 非结构体字段
          	err := server.ListenAndServe(ListenAddr)
          	if err != nil {
          		slog.Error("dns server serve failed", "error", err)
          	}
          }
          EOF

      - name: Init Go module & pull latest dependencies
        run: |
          go mod init fastdns-phuslu
          go get github.com/phuslu/fastdns@latest
          go mod tidy

      - name: Build Android arm64 纯静态无依赖二进制
        run: |
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm64 \
          go build -ldflags="-s -w" -o fastdns-phuslu-arm64

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastdns-phuslu-arm64
          path: fastdns-phuslu-arm64
