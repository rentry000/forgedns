  # ==================== x86_64 构建（普通 Linux） ====================
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            libffi-dev \
            libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (x86_64)
        run: |
          pyinstaller --onefile \
            --name proxy_pool_x86_64 \
            --hidden-import=flask \
            --hidden-import=flask.json \
            --hidden-import=werkzeug \
            --hidden-import=werkzeug.routing \
            --hidden-import=apscheduler \
            --hidden-import=apscheduler.schedulers \
            --hidden-import=apscheduler.schedulers.background \
            --hidden-import=apscheduler.triggers \
            --hidden-import=apscheduler.triggers.interval \
            --hidden-import=lxml \
            --hidden-import=lxml._elementpath \
            --hidden-import=redis \
            --hidden-import=requests \
            --hidden-import=click \
            --collect-data flask \
            --collect-data werkzeug \
            --collect-data apscheduler \
            proxyPool.py

      - name: Verify binary
        run: |
          file dist/proxy_pool_x86_64
          chmod +x dist/proxy_pool_x86_64
          dist/proxy_pool_x86_64 --help || true

      - name: Package distribution
        run: |
          mkdir -p release_x86_64
          cp dist/proxy_pool_x86_64 release_x86_64/
          cp setting.py release_x86_64/
          cp start.sh release_x86_64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy_pool_x86_64
          path: release_x86_64/

  # ==================== 发布 Release ====================
  release:
    needs: [build-arm64, build-x86_64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: proxy_pool_arm64
          path: release_arm64/

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: proxy_pool_x86_64
          path: release_x86_64/

      - name: Create distribution archives
        run: |
          cd release_arm64 && tar czf ../proxy_pool_arm64.tar.gz . && cd ..
          cd release_x86_64 && tar czf ../proxy_pool_x86_64.tar.gz . && cd ..

      - name: Generate SHA256 checksums
        run: |
          sha256sum proxy_pool_arm64.tar.gz > checksums.txt
          sha256sum proxy_pool_x86_64.tar.gz >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "proxy_pool ${{ github.ref_name }}"
          body: |
            ## proxy_pool ${{ github.ref_name }}

            ### 📦 下载

            | 文件 | 架构 | 适用平台 |
            |------|------|----------|
            | `proxy_pool_arm64.tar.gz` | ARM64 | Android (Termux/proot)、ARM 服务器 |
            | `proxy_pool_x86_64.tar.gz` | x86_64 | Linux PC/服务器 |

            ### 🤖 Android 使用

            1. 安装 [Termux](https://termux.dev)
            2. 安装 proot-distro: `pkg install proot-distro && proot-distro install ubuntu`
            3. 进入 Ubuntu: `proot-distro login ubuntu`
            4. 解压并运行:
            ```bash
            tar xzf proxy_pool_arm64.tar.gz
            export DB_CONN=redis://:password@your-redis:6379/0
            ./run_on_android.sh
            ```

            ### 🖥️ Linux 使用

            ```bash
            tar xzf proxy_pool_x86_64.tar.gz
            export DB_CONN=redis://127.0.0.1:6379/0
            ./proxy_pool_x86_64 schedule &
            ./proxy_pool_x86_64 server
            ```

            > ⚠️ 需要先启动 Redis 服务

          files: |
            proxy_pool_arm64.tar.gz
            proxy_pool_x86_64.tar.gz
            checksums.txt
          draft: false
          prerelease: false
