name: Build Hickory-DNS static aarch64-musl
on:
  workflow_dispatch:

jobs:
  build-static-musl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hickory-DNS
        uses: actions/checkout@v4
        with:
          repository: hickory-dns/hickory-dns
          ref: main

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross & llvm
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          sudo apt update && sudo apt install -y llvm

      - name: Build static musl (all features)
        run: |
          export RUSTFLAGS="-C opt-level=z -C panic=abort -C link-arg=-static -C strip=all"
          cross build \
            --release \
            --target aarch64-unknown-linux-musl \
            --all-features \
            -p hickory-dns

      - name: Package binary
        run: |
          mkdir -p release-bin
          BIN=target/aarch64-unknown-linux-musl/release/hickory-dns
          cp $BIN release-bin/

      - name: Verify static executable
        run: |
          BIN=release-bin/hickory-dns
          file $BIN
          readelf -d $BIN 2>/dev/null || echo "✅ 100% 纯静态，无任何动态库依赖"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hickory-dns-aarch64-musl-static
          path: release-bin/*
