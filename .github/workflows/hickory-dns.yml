name: Build Static Hickory-DNS for Android

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 30
      ARCH: aarch64-linux-android
      ARCH_SHORT: arm64-v8a

    steps:
      - name: Checkout Hickory-DNS
        uses: actions/checkout@v4
        with:
          repository: hickory-dns/hickory-dns
          ref: main

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.ARCH }}

      - name: Install cargo-ndk & binutils
        run: |
          cargo install cargo-ndk
          sudo apt update && sudo apt install -y binutils

      - name: Setup Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "ANDROID_NDK_HOME=/tmp/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build Hickory-DNS
        run: |
          export RUSTFLAGS="\
            -C opt-level=z \
            -C strip=symbols \
            -C link-arg=-Wl,--gc-sections \
            -C panic=abort \
            -C prefer-dynamic=no \
            --remap-path-prefix=$HOME=. \
          "
          cargo ndk -t ${{ env.ARCH_SHORT }} --platform ${{ env.API_LEVEL }} build --release -p hickory-dns --all-features

      - name: Strip binary
        run: |
          mkdir -p ./release-bin
          BIN="./target/${{ env.ARCH }}/release/hickory-dns"
          ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-all $BIN
          cp $BIN ./release-bin/

      - name: Check dynamic dependencies & pack .so
        run: |
          BIN="./release-bin/hickory-dns"
          NDK_LIB_PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${{ env.ARCH }}/${{ env.API_LEVEL }}"

          echo "========== Dynamic library dependencies =========="
          readelf -d $BIN | grep NEEDED | awk '{print $5}' | tr -d '[]' | sort -u

          # 提取依赖库名
          DEP_LIBS=$(readelf -d $BIN | grep NEEDED | awk '{print $5}' | tr -d '[]' | sort -u)

          # 系统自带库，不需要打包
          SYSTEM_LIBS="libc.so libdl.so libm.so liblog.so libandroid_support.so libstdc++.so vndk_stl.so"

          for lib in $DEP_LIBS; do
            if ! echo "$SYSTEM_LIBS" | grep -qw "$lib"; then
              echo "Packing required library: $lib"
              if [ -f "$NDK_LIB_PATH/$lib" ]; then
                cp "$NDK_LIB_PATH/$lib" ./release-bin/
              else
                echo "Warning: $lib not found in NDK, may be system library"
              fi
            fi
          done

          echo "========== Final files in release-bin =========="
          ls -lh ./release-bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hickory-dns-android-${{ env.ARCH_SHORT }}
          path: ./release-bin/*
