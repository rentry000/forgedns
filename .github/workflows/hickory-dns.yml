name: Build Static Hickory-DNS for Android

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 30

    steps:
      - name: Checkout Hickory-DNS Repository
        uses: actions/checkout@v4
        with:
          repository: hickory-dns/hickory-dns
          ref: main

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download and Setup Android NDK r29
        run: |
          cd /tmp
          echo "Downloading Android NDK ${NDK_VERSION}..."
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          
          # 关键修复：强制覆盖所有相关环境变量，消除与 GitHub 预装 NDK 的冲突
          echo "ANDROID_NDK_HOME=/tmp/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK=/tmp/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build Hickory-DNS (Static)
        run: |
          # +crt-static 尝试静态链接 Bionic libc
          export RUSTFLAGS="-C opt-level=z -C link-arg=-Wl,--gc-sections -C target-feature=+crt-static"
          cargo ndk -t arm64-v8a -p ${{ env.API_LEVEL }} build --release -p hickory-dns --all-features

      - name: Strip and Prepare Artifact
        run: |
          mkdir -p ./release-bin
          # 裁剪符号表，减小体积
          /tmp/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip ./target/aarch64-linux-android/release/hickory-dns
          cp ./target/aarch64-linux-android/release/hickory-dns ./release-bin/hickory-dns

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hickory-dns-android-arm64-static
          path: ./release-bin/hickory-dns
