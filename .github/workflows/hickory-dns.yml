name: Build Hickory-DNS aarch64-musl static
on:
  workflow_dispatch:

jobs:
  build-musl-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hickory-dns/hickory-dns
          ref: main

      - name: Install Rust + aarch64-musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      # 安装支持 arm64 的 llvm-strip 工具
      - name: Install llvm
        run: sudo apt update && sudo apt install -y llvm

      # 关键：纯 musl 静态编译，不依赖 cross，不依赖系统交叉编译器
      - name: Build release (all features)
        run: |
          export RUSTFLAGS="-C opt-level=z -C panic=abort -C strip=symbols"
          cargo build \
            --release \
            --target aarch64-unknown-linux-musl \
            --all-features \
            -p hickory-dns

      - name: Package binary
        run: |
          mkdir -p release-bin
          BIN=target/aarch64-unknown-linux-musl/release/hickory-dns
          llvm-strip -strip-all "$BIN"
          cp "$BIN" release-bin/

      - name: Check static
        run: |
          BIN=release-bin/hickory-dns
          file "$BIN"
          readelf -d "$BIN" 2>/dev/null || echo "✅ 100% static, no .so dependency"

      - uses: actions/upload-artifact@v4
        with:
          name: hickory-dns-aarch64-musl-static
          path: release-bin/*
