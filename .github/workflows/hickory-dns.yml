name: Build Hickory-DNS static aarch64 musl
on:
  workflow_dispatch:

jobs:
  build-static-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hickory-dns/hickory-dns
          ref: main

      # 安装 aarch64-linux-musl 交叉编译器
      - name: Install musl cross compiler
        run: |
          sudo apt update
          sudo apt install -y binutils-aarch64-linux-musl gcc-aarch64-linux-musl

      # 安装 Rust + musl 目标
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      # 全静态编译，全开所有功能
      - name: Build static musl
        run: |
          export RUSTFLAGS="-C target-cpu=generic -C opt-level=z -C panic=abort -C link-arg=-static"
          cargo build \
            --release \
            --target aarch64-unknown-linux-musl \
            --all-features \
            -p hickory-dns

      # 裁剪体积
      - name: Strip binary
        run: |
          mkdir -p release-bin
          BIN=target/aarch64-unknown-linux-musl/release/hickory-dns
          aarch64-linux-musl-strip $BIN
          cp $BIN release-bin/
          ls -lh release-bin/

      # 验证：必须显示“无动态链接”
      - name: Check static link
        run: |
          BIN=release-bin/hickory-dns
          file $BIN
          readelf -d $BIN || echo "=> 100% static executable, no .so dependency"

      - uses: actions/upload-artifact@v4
        with:
          name: hickory-dns-aarch64-musl-static
          path: release-bin/*
