name: Build Foghorn Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android:
    # 使用原生 ARM 运行器，避免模拟器的性能瓶颈
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main

      - name: Build Static Binary in Alpine Container
        uses: addnab/docker-run-action@v3
        with:
          # 使用 Alpine 以确保基于 musl libc，这是跨平台静态化的最佳起点
          image: arm64v8/python:3.11-alpine
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -e

            # 1. 安装编译 mariadb 和 staticx 所需的系统依赖
            apk update
            apk add --no-cache \
              gcc g++ musl-dev linux-headers libffi-dev openssl-dev \
              build-base patchelf mariadb-dev mariadb-connector-c-dev pkgconf

            # 2. 准备构建环境（修复 pkg_resources 报错）
            pip install --no-cache-dir --upgrade pip
            pip install --no-cache-dir setuptools wheel pyinstaller staticx

            # 3. 安装项目及其依赖
            # 使用 -e 或直接安装，确保 PyInstaller 能找到项目模块
            pip install .

            # 4. 执行 PyInstaller 打包
            # --paths src: 告诉 PyInstaller 去哪里找源代码
            # --hidden-import: 强制包含一些动态加载的库
            pyinstaller --onefile --clean \
              --name foghorn_dynamic \
              --paths src \
              --collect-all foghorn \
              --hidden-import mariadb \
              src/foghorn/main.py

            # 5. 使用 staticx 进行终极静态化
            # 这一步会将所有的 .so 库（包括数据库驱动）全部封装进二进制
            staticx dist/foghorn_dynamic dist/foghorn-android-arm64

            # 赋予执行权限
            chmod +x dist/foghorn-android-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64
          path: dist/foghorn-android-arm64
