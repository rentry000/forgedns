name: Build Foghorn Android ARM64 终极全静态版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout 项目源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main
          fetch-depth: 1

      - name: 移除数据库可选依赖
        run: |
          sed -i '/mariadb/d' pyproject.toml
          sed -i '/psycopg2/d' pyproject.toml
          sed -i '/influxdb/d' pyproject.toml

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -euxo pipefail

            # 1. 配置镜像源 (使用 Edge 分支以获取最新的静态库支持)
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            https://mirrors.ustc.edu.cn/alpine/edge/main
            https://mirrors.ustc.edu.cn/alpine/edge/community
            EOF
            apk update --no-cache

            # 2. 安装系统构建依赖
            apk add --no-cache \
              python3 python3-dev py3-pip py3-setuptools \
              gcc g++ musl-dev \
              linux-headers libffi-dev \
              openssl-dev openssl-libs-static \
              build-base patchelf pkgconf wget \
              libcap-dev sqlite-dev libgcc \
              sqlite-static \
              libsodium-static \
              zlib-static \
              libc6-compat \
              scons

            apk add --no-cache musl-static || true

            # 3. 环境配置
            PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            export PYTHONPATH=/usr/lib/python$PYTHON_VERSION
            export LDFLAGS="-L/usr/lib -lpython$PYTHON_VERSION -Wl,--export-dynamic -static"
            export CFLAGS="-I/usr/include/python$PYTHON_VERSION -fPIC"
            export CPPFLAGS="-I/usr/include/python$PYTHON_VERSION"
            export CRYPTOGRAPHY_RUST=0
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1

            # 创建虚拟环境
            python3 -m venv /opt/venv
            source /opt/venv/bin/activate
            
            # 4. 安装打包工具
            pip install --upgrade pip
            pip install --no-cache-dir "setuptools<70.0.0" wheel 
            pip install --no-cache-dir pyinstaller
            pip install --no-cache-dir --no-build-isolation staticx

            # 5. 安装 Python 业务依赖
            pip install --no-cache-dir cryptography==38.0.4
            pip install --no-cache-dir \
              annotated-doc==0.0.4 annotated-types==0.7.0 anyio==4.13.0 attrs==26.1.0 \
              bcrypt==5.0.0 cachetools==7.0.5 certifi==2026.2.25 cffi==2.0.0 \
              charset-normalizer==3.4.6 click==8.3.1 dnslib==0.9.26 \
              dnspython==2.8.0 docker==7.1.0 fastapi==0.135.2 h11==0.16.0 \
              idna==3.11 ifaddr==0.2.0 invoke==2.2.1 jsonschema==4.26.0 \
              jsonschema-specifications==2025.9.1 mysql-connector-python==9.6.0 paho-mqtt==2.1.0 \
              paramiko==4.0.0 psutil==7.2.2 pycparser==3.0 pydantic==2.12.5 pydantic-core==2.41.5 \
              pynacl==1.6.2 pyyaml==6.0.3 referencing==0.37.0 requests==2.33.0 rpds-py==0.30.0 \
              starlette==1.0.0 typing-extensions==4.15.0 typing-inspection==0.4.2 urllib3==2.6.3 \
              uvicorn==0.42.0 watchdog==6.0.0 zeroconf==0.148.0
            pip install --no-cache-dir .

            # ==============================================
            # 6. 【核心修复】：物理扁平化依赖 + 移除所有 RPATH
            # ==============================================
            echo "===== 准备扁平化依赖库 ====="
            mkdir -p /workspace/extra_libs
            
            # 找到所有隐藏在 .libs 目录下的动态库（带哈希后缀的 libgcc 等），全部复制出来
            find /opt/venv/lib/python$PYTHON_VERSION/site-packages -path "*/.libs/*.so*" -exec cp -v {} /workspace/extra_libs/ \;

            echo "===== 强制移除所有库的 RPATH (满足 staticx 要求) ====="
            # 先移除原本库的路径，此时如果直接运行会报错，所以后面打包需要 LD_LIBRARY_PATH 护航
            find /opt/venv -name "*.so*" -exec patchelf --remove-rpath {} \; 2>/dev/null || true
            find /usr/lib /lib -name "*.so*" -exec patchelf --remove-rpath {} \; 2>/dev/null || true
            find /workspace/extra_libs -name "*.so*" -exec patchelf --remove-rpath {} \; 2>/dev/null || true

            # ==============================================
            # 7. 构建打包辅助环境变量
            # ==============================================
            # 将扁平化后的路径加入搜索，确保 PyInstaller 导入分析时能找到库
            LIBS_DIRS=$(find /opt/venv/lib/python$PYTHON_VERSION/site-packages -type d -name ".libs" | tr '\n' ':')
            export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$LIBS_DIRS:/workspace/extra_libs:/usr/lib:/lib

            # 8. 生成启动脚本
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # 9. 打包
            echo "===== 开始打包 ====="
            # 手动构建 --add-binary 列表，防止通配符解析失败
            ADD_BINARIES=""
            for f in /workspace/extra_libs/*.so*; do
                if [ -e "$f" ]; then
                    ADD_BINARIES="$ADD_BINARIES --add-binary $f:."
                fi
            done

            LIBGCC_SYS=$(find /usr/lib -name "libgcc_s.so.1" | head -n 1)

            # 在打包命令前强制注入 LD_LIBRARY_PATH
            LD_LIBRARY_PATH=$LD_LIBRARY_PATH pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all cryptography \
              --collect-all pydantic_core \
              --collect-all bcrypt \
              --collect-all rpds \
              --collect-all zeroconf \
              --add-binary "$LIBGCC_SYS:." \
              $ADD_BINARIES \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              run.py

            # 10. 执行 staticx 封包
            echo "===== 执行 staticx 封包 ====="
            staticx dist/foghorn-android-arm64 dist/foghorn-android-arm64-static
            
            # 修复权限，防止上传失败
            chown -R 1001:1001 dist/
            chmod -R 755 dist/
            echo "✅ 构建完成"

      - name: 上传最终全静态二进制
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a-终极全静态版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
