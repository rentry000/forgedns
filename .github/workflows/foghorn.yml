name: Build foghorn Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies from pyproject.toml
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install .
          pip install nuitka ordered-set

      - name: Build Android arm64-v8a binary
        run: |
          source venv/bin/activate
          mkdir -p dist/android

          python -m nuitka \
            --standalone \
            --onefile \
            --linux-android \
            --android-arch=arm64-v8a \
            --output-filename=foghorn-arm64 \
            --output-dir=dist/android \
            --include-data-file=config.example.yaml=config.example.yaml \
            --include-data-dir=foghorn/plugins=foghorn/plugins \
            --hidden-import=dnslib \
            --hidden-import=yaml \
            --hidden-import=dotenv \
            foghorn/cli.py

      - name: Make executable
        run: chmod +x dist/android/foghorn-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a
          path: dist/android/foghorn-arm64
