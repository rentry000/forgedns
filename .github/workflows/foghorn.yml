name: Build Foghorn Android ARM64 最终无依赖版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout 项目源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main
          fetch-depth: 1

      - name: 移除数据库可选依赖（根治编译报错）
        run: |
          sed -i '/mariadb/d' pyproject.toml
          sed -i '/psycopg2/d' pyproject.toml
          sed -i '/influxdb/d' pyproject.toml
          echo "已移除所有会触发编译失败的数据库可选依赖"

      - name: 构建Android纯静态无依赖二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.20
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -euxo pipefail

            # 1. 安装系统级构建依赖，补全全量静态库
            apk update
            apk add --no-cache \
              python3 python3-dev py3-pip \
              gcc g++ musl-dev musl-static \
              linux-headers libffi-dev libffi-static \
              openssl-dev openssl-libs-static \
              build-base patchelf pkgconf scons \
              libcap-dev sqlite-dev sqlite-static libgcc libgcc-static \
              libsodium-dev libsodium-static zlib-dev zlib-static rust cargo

            # 2. 配置Python虚拟环境，升级构建工具
            python3 -m venv /opt/venv
            source /opt/venv/bin/activate
            pip install --no-cache-dir --upgrade pip
            pip install --no-cache-dir \
              setuptools==75.2.0 \
              wheel \
              pyinstaller \
              --no-build-isolation

            # 3. 强制完全静态编译所有带Rust/C扩展的依赖，消除动态依赖
            echo "===== 静态编译核心依赖 ====="
            # 核心环境变量，强制静态链接，消除对libgcc_s的动态依赖
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_STATIC=1
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-static -C link-arg=-static-libgcc -C link-arg=-Wl,-Bstatic,-lgcc,-Bdynamic"
            export CFLAGS="-static -static-libgcc"
            export LDFLAGS="-static -static-libgcc -Wl,-Bstatic,-lgcc,-Bdynamic"

            # 安装全量锁定版本依赖，强制静态编译
            pip install --no-cache-dir \
              annotated-doc==0.0.4 annotated-types==0.7.0 anyio==4.13.0 attrs==26.1.0 \
              bcrypt==5.0.0 cachetools==7.0.5 certifi==2026.2.25 cffi==2.0.0 \
              charset-normalizer==3.4.6 click==8.3.1 cryptography==46.0.6 dnslib==0.9.26 \
              dnspython==2.8.0 docker==7.1.0 fastapi==0.135.2 h11==0.16.0 \
              idna==3.11 ifaddr==0.2.0 invoke==2.2.1 jsonschema==4.26.0 \
              jsonschema-specifications==2025.9.1 mysql-connector-python==9.6.0 paho-mqtt==2.1.0 \
              paramiko==4.0.0 psutil==7.2.2 pycparser==3.0 pydantic==2.12.5 pydantic-core==2.41.5 \
              pynacl==1.6.2 pyyaml==6.0.3 referencing==0.37.0 requests==2.33.0 rpds-py==0.30.0 \
              starlette==1.0.0 typing-extensions==4.15.0 typing-inspection==0.4.2 urllib3==2.6.3 \
              uvicorn==0.42.0 watchdog==6.0.0 zeroconf==0.148.0

            # ==============================================
            # 核心修复1：修改cryptography库的依赖，解决带哈希的libgcc_s找不到的问题
            # ==============================================
            echo "===== 修复cryptography库依赖 ====="
            # 找到cryptography的Rust扩展so文件
            RUST_SO_PATH=$(find /opt/venv/lib/python3.12/site-packages/cryptography/hazmat/bindings -name "_rust.abi3.so" | head -n 1)
            echo "找到Rust扩展路径：$RUST_SO_PATH"

            # 查看原始依赖，确认带哈希的libgcc_s
            ldd "$RUST_SO_PATH"

            # 1. 修改so文件的依赖，把带哈希的libgcc_s-*.so.1改为通用的libgcc_s.so.1
            patchelf --replace-needed $(ldd "$RUST_SO_PATH" | grep libgcc_s | awk '{print $1}') libgcc_s.so.1 "$RUST_SO_PATH"
            # 2. 强制设置RPATH，优先找打包进去的库
            patchelf --set-rpath '$ORIGIN:$ORIGIN/..:$ORIGIN/../..' "$RUST_SO_PATH"

            echo "✅ 修复后的依赖："
            ldd "$RUST_SO_PATH"

            # 4. 安装Foghorn项目本体
            echo "===== 安装Foghorn核心项目 ====="
            pip install --no-cache-dir .

            # ==============================================
            # 核心修复2：生成适配Android的启动脚本
            # ==============================================
            echo "===== 生成启动脚本 ====="
            cat > run.py << 'EOF'
            #!/usr/bin/env python3
            """
            Foghorn DNS 启动入口
            Android专属适配，修复库加载、临时目录、权限问题
            """
            import os
            import sys
            
            # Android专属适配：修复临时目录权限问题，避免SELinux限制
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            
            # 配置文件优先级：同目录config.yaml > 内置示例配置
            if not os.environ.get("FOGHORN_CONFIG"):
                exe_dir = os.path.dirname(os.path.abspath(sys.executable))
                default_config = os.path.join(exe_dir, "config.yaml")
                if os.path.exists(default_config):
                    os.environ["FOGHORN_CONFIG"] = default_config
                else:
                    # 找内置的示例配置
                    try:
                        import foghorn
                        pkg_dir = os.path.dirname(foghorn.__file__)
                        example_config = os.path.join(pkg_dir, "..", "example_configs", "config.full.yaml")
                        if os.path.exists(example_config):
                            os.environ["FOGHORN_CONFIG"] = example_config
                    except:
                        pass
            
            # 导入主函数
            from foghorn.main import main
            
            if __name__ == "__main__":
                main()
            EOF
            
            # 语法校验，提前拦截错误
            python3 -m py_compile run.py
            echo "✅ 启动脚本语法校验通过"

            # ==============================================
            # 核心修复3：PyInstaller全量打包，把所有依赖库内置到二进制
            # ==============================================
            echo "===== PyInstaller全量打包 ====="
            # 获取libgcc_s.so.1的路径
            LIBGCC_PATH=$(find /usr/lib -name "libgcc_s.so.1" | head -n 1)
            echo "找到libgcc_s路径：$LIBGCC_PATH"

            # 全量打包，所有依赖内置，无外部依赖
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --paths src \
              --paths /opt/venv/lib/python3.12/site-packages \
              --collect-all foghorn \
              --collect-all cryptography \
              --collect-all dnspython \
              --collect-all pydantic \
              --collect-all fastapi \
              --collect-all starlette \
              --add-data "example_configs:example_configs" \
              --add-data "assets:assets" \
              --add-binary "$LIBGCC_PATH:." \
              --hidden-import dnslib \
              --hidden-import yaml \
              --hidden-import dotenv \
              --hidden-import cachetools \
              --hidden-import cryptography.hazmat.bindings._rust \
              --hidden-import cryptography.hazmat.bindings._openssl \
              --hidden-import cryptography.hazmat.bindings._rust.exceptions \
              --hidden-import dnspython \
              --hidden-import docker \
              --hidden-import fastapi \
              --hidden-import jsonschema \
              --hidden-import pydantic_core \
              --hidden-import bcrypt \
              --hidden-import rpds \
              --hidden-import paramiko \
              --hidden-import pynacl \
              --hidden-import cffi \
              --hidden-import anyio \
              --hidden-import starlette \
              --hidden-import uvicorn \
              --hidden-import requests \
              --exclude-module mariadb \
              --exclude-module psycopg2 \
              --exclude-module influxdb \
              --exclude-module tests \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              run.py

            # 5. 最终校验：确认打包后的二进制无动态依赖缺失
            echo "===== 最终产物校验 ====="
            ls -lh dist/
            file dist/foghorn-android-arm64
            ldd dist/foghorn-android-arm64 || true
            echo "✅ 构建完成！最终产物：dist/foghorn-android-arm64"

      - name: 上传最终Android无依赖版二进制
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a-无依赖最终版
          path: dist/foghorn-android-arm64
          retention-days: 30
