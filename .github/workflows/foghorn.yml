name: Build foghorn Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          fetch-depth: 1

      # 👇 直接装系统 Python，不用 setup-python Action
      - name: Install system Python & build tools
        run: |
          sudo apt update -y
          sudo apt install -y python3 python3-pip python3-venv build-essential

      - name: Install ALL real dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          
          # 👇 这是 foghorn 全部真实依赖，一个不漏
          pip install dnslib pyyaml python-dotenv
          
          # 编译工具
          pip install nuitka ordered-set

      - name: Build Android arm64-v8a binary
        run: |
          source venv/bin/activate
          mkdir -p dist/android

          python -m nuitka \
            --standalone \
            --onefile \
            --linux-android \
            --android-arch=arm64-v8a \
            --output-filename=foghorn-arm64 \
            --output-dir=dist/android \
            --include-data-file=config.example.yaml=config.example.yaml \
            --include-data-dir=foghorn/plugins=foghorn/plugins \
            --hidden-import=dnslib \
            --hidden-import=yaml \
            --hidden-import=dotenv \
            --hidden-import=asyncio \
            foghorn/cli.py

      - name: Chmod executable
        run: chmod +x dist/android/foghorn-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a
          path: dist/android/foghorn-arm64
          retention-days: 30
