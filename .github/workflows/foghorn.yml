name: Build Foghorn Android ARM64 最终版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main

      - name: 移除无用依赖
        run: |
          sed -i '/mariadb/d' pyproject.toml
          sed -i '/psycopg2/d' pyproject.toml
          sed -i '/influxdb/d' pyproject.toml

      - name: 构建
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.20
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -euxo pipefail

            # 镜像源
            cat > /etc/apk/repositories <<'EOF'
            https://dl-cdn.alpinelinux.org/alpine/v3.20/main
            https://dl-cdn.alpinelinux.org/alpine/v3.20/community
            EOF

            apk update -q

            # 【关键】不装 musl-static！只装真实存在的包
            apk add --no-cache \
              python3 python3-dev py3-pip \
              gcc g++ musl-dev \
              linux-headers libffi-dev \
              openssl-dev openssl-libs-static \
              build-base patchelf pkgconf \
              libcap-dev sqlite-dev sqlite-static \
              libgcc libsodium-dev zlib-dev rust cargo

            # 虚拟环境
            python3 -m venv /opt/venv
            source /opt/venv/bin/activate
            pip install -U pip setuptools wheel pyinstaller

            # 安装依赖
            pip install .
            pip install cryptography dnslib dnspython bcrypt pynacl paramiko

            # 修复 cryptography 依赖名（解决你 Android 上的 libgcc_s 错误）
            RUST_SO=$(find /opt/venv/lib/python3.12/site-packages/cryptography/hazmat/bindings -name "_rust.abi3.so" | head -n1)
            if [ -n "$RUST_SO" ]; then
              libgcc=$(ldd "$RUST_SO" | grep libgcc | awk '{print $1}')
              patchelf --replace-needed "$libgcc" libgcc_s.so.1 "$RUST_SO" || true
            fi

            # 极简启动脚本
            cat > run.py <<'EOF'
            import os
            import sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            from foghorn.main import main
            main()
            EOF

            # PyInstaller 打包（不使用 staticx，不依赖 musl-static）
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all cryptography \
              --add-data "example_configs:example_configs" \
              --hidden-import dnslib \
              --exclude-module mariadb \
              --exclude-module psycopg2 \
              --exclude-module influxdb \
              --runtime-tmpdir /data/local/tmp \
              run.py

            chmod +x dist/foghorn-android-arm64

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64
          path: dist/foghorn-android-arm64
