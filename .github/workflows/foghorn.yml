name: 构建 foghorn ARM64 单文件二进制
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 检出项目源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: v0.7.0 # 可指定版本/分支
          fetch-depth: 1

      - name: 配置 ARM64 跨架构模拟环境
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 核心构建：ARM64 单文件二进制
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/build \
            -w /build \
            python:3.11-slim-bookworm \
            bash -c '
              # 1. 安装系统依赖
              apt update && apt install -y --no-install-recommends \
                gcc g++ patchelf binutils git ca-certificates
              
              # 2. 安装项目本体+全量依赖+PyInstaller，屏蔽root警告
              pip install --upgrade pip setuptools wheel
              pip install --root-user-action=ignore .
              pip install --root-user-action=ignore pyinstaller
              
              # 3. 生成临时入口脚本（解决无__main__.py的问题）
              cat > entry.py << EOF
              from foghorn.cli import main
              if __name__ == "__main__":
                  main()
              EOF
              
              # 4. 全量打包命令：单文件ARM64二进制，补全所有依赖
              pyinstaller --onefile \
                --name foghorn-linux-arm64 \
                --target-arch aarch64 \
                --strip \
                --clean \
                --noconfirm \
                --root-user-action=ignore \
                --hidden-import=fastapi \
                --hidden-import=uvicorn \
                --hidden-import=uvicorn.logging \
                --hidden-import=uvicorn.lifespan.on \
                --hidden-import=dnslib \
                --hidden-import=dns \
                --hidden-import=cryptography \
                --hidden-import=yaml \
                --hidden-import=aiosqlite \
                --hidden-import=asyncio \
                --hidden-import=requests \
                --add-data "assets:assets" \
                --add-data "example_configs:example_configs" \
                entry.py
            '

      - name: 验证二进制架构与可用性
        run: |
          # 验证架构是否为ARM64
          file ${{ github.workspace }}/dist/foghorn-linux-arm64
          # 赋予执行权限
          chmod +x ${{ github.workspace }}/dist/foghorn-linux-arm64
          # 容器内验证二进制可正常执行
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}/dist:/test \
            python:3.11-slim-bookworm \
            /test/foghorn-linux-arm64 --help

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-linux-arm64
          path: ${{ github.workspace }}/dist/foghorn-linux-arm64
          retention-days: 90
