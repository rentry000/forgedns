name: Build Foghorn Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main

      - name: Build Static Binary in Alpine Container
        uses: addnab/docker-run-action@v3
        with:
          image: arm64v8/python:3.11-alpine
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -euxo pipefail

            # 1. 安装系统级构建依赖
            apk update
            apk add --no-cache \
              gcc g++ musl-dev linux-headers libffi-dev openssl-dev \
              build-base patchelf pkgconf scons libcap-dev sqlite-dev

            # ==============================================
            # 核心修复1：彻底解决 pkg_resources 问题
            # 1. 移除错误的 pkg_resources 安装（它不是独立包）
            # 2. 锁定稳定版 setuptools（内置完整的 pkg_resources）
            # 3. 关闭 root 用户 pip 警告
            # ==============================================
            pip install --no-cache-dir --upgrade pip --root-user-action ignore
            pip install --no-cache-dir \
              setuptools==69.5.1 \
              wheel \
              pyinstaller \
              --root-user-action ignore

            # 2. 安装 staticx（关闭构建隔离，直接使用当前环境的 setuptools）
            # 彻底避免构建隔离环境里 pkg_resources 找不到的问题
            pip install --no-cache-dir \
              --no-build-isolation \
              staticx==0.14.0 \
              --root-user-action ignore

            # ==============================================
            # 核心修复2：提前清除所有系统库的 RPATH/RUNPATH
            # 从根源解决 staticx 归档内库无法修改的问题
            # ==============================================
            find /usr/lib -name "*.so*" -type f | xargs -r patchelf --remove-rpath 2>/dev/null || true
            find /usr/local/lib -name "*.so*" -type f | xargs -r patchelf --remove-rpath 2>/dev/null || true
            echo "已清除所有系统库的 RPATH/RUNPATH"

            # 3. 安装项目核心依赖（仅必需包，不装可选的mariadb，避免额外问题）
            pip install --no-cache-dir dnslib pyyaml python-dotenv --root-user-action ignore
            pip install --no-cache-dir . --root-user-action ignore

            # 4. PyInstaller 打包动态二进制
            pyinstaller --onefile --clean \
              --name foghorn_dynamic \
              --paths src \
              --collect-all foghorn \
              --hidden-import dnslib \
              --hidden-import yaml \
              --hidden-import dotenv \
              --exclude-module mariadb \
              --exclude-module tests \
              src/foghorn/main.py

            # 5. 二次清理 PyInstaller 临时目录的所有库，双重保险
            find build/foghorn_dynamic -name "*.so*" -type f | xargs -r patchelf --remove-rpath 2>/dev/null || true
            echo "已清除 PyInstaller 临时库的 RPATH/RUNPATH"

            # 6. staticx 构建最终静态二进制（稳定版参数，无报错）
            staticx \
              --strip \
              --no-compress \
              dist/foghorn_dynamic \
              dist/foghorn-android-arm64

            # 7. 校验产物
            chmod +x dist/foghorn-android-arm64
            ls -lh dist/
            file dist/foghorn-android-arm64
            echo "构建完成！最终产物：dist/foghorn-android-arm64"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64
          path: dist/foghorn-android-arm64
          retention-days: 30
