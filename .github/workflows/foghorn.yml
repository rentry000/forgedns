name: 构建 foghorn ARM64 全量功能二进制
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-arm64-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 初始化工作目录
        run: |
          sudo rm -rf ${{ github.workspace }}/*
          mkdir -p ${{ github.workspace }}/foghorn-src
          mkdir -p ${{ github.workspace }}/dist

      - name: 检出 foghorn 源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: v0.7.0
          fetch-depth: 1
          path: foghorn-src

      - name: 配置 ARM64 跨架构环境
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 全量功能构建
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}/foghorn-src:/build \
            -v ${{ github.workspace }}/dist:/build/dist \
            -w /build \
            python:3.11-bookworm \
            bash -c "
              set -euo pipefail
              echo '=== 1. 安装全量系统依赖 ==='
              apt update && apt install -y --no-install-recommends \
                gcc g++ patchelf binutils git ca-certificates \
                libmariadb-dev libpq-dev libssl-dev build-essential \
                mosquitto-dev libsqlite3-dev

              echo '=== 2. 安装全量项目依赖 ==='
              pip install --upgrade pip setuptools wheel
              pip install --root-user-action=ignore .[all]
              pip install --root-user-action=ignore pyinstaller==6.19.0

              echo '=== 3. 验证安装 ==='
              which foghorn
              foghorn --version

              echo '=== 4. 打包 ==='
              pyinstaller --onefile \
                --name foghorn-linux-arm64-full \
                --target-arch aarch64 \
                --strip \
                --clean \
                --noconfirm \
                --root-user-action=ignore \
                --console \
                --hidden-import=* \
                --collect-all=foghorn \
                --add-data 'assets:assets' \
                --add-data 'example_configs:example_configs' \
                $(which foghorn)

              echo '=== 5. 验证产物 ==='
              ls -la /build/dist/
              chmod +x /build/dist/foghorn-linux-arm64-full
              /build/dist/foghorn-linux-arm64-full --version
            "

      - name: 产物校验与上传
        run: |
          BIN_PATH="${{ github.workspace }}/dist/foghorn-linux-arm64-full"
          if [ ! -f "$BIN_PATH" ]; then
            echo "❌ 构建失败"
            exit 1
          fi
          chmod +x $BIN_PATH
          file $BIN_PATH
          uses: actions/upload-artifact@v4
          with:
          name: foghorn-linux-arm64-full
          path: ${{ github.workspace }}/dist/foghorn-linux-arm64-full
          retention-days: 90
