name: Build foghorn for Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y python3-pip gcc-aarch64-linux-gnu
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install dnslib pyyaml python-dotenv
          pip install pyinstaller

      - name: Build Linux arm64 binary (runs on Android arm64-v8a)
        run: |
          source venv/bin/activate
          mkdir -p dist

          pyinstaller \
            --onefile \
            --target-arch aarch64 \
            --name foghorn-arm64 \
            --add-data "config.example.yaml:." \
            --add-data "foghorn/plugins:foghorn/plugins" \
            foghorn/cli.py

      - name: Prepare artifact
        run: mv dist/foghorn-arm64 dist/foghorn-android-arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a
          path: dist/foghorn-android-arm64
