name: Build Foghorn Android ARM64 最终可运行版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout 项目源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main
          fetch-depth: 1

      - name: 移除数据库依赖
        run: |
          sed -i '/mariadb/d' pyproject.toml
          sed -i '/psycopg2/d' pyproject.toml
          sed -i '/influxdb/d' pyproject.toml

      - name: 构建 Android 单文件（纯 PyInstaller，不使用 staticx）
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.20
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -euxo pipefail

            # 只用官方源，不搞花里胡哨
            rm -rf /etc/apk/repositories
            echo "https://dl-cdn.alpinelinux.org/alpine/v3.20/main" > /etc/apk/repositories
            echo "https://dl-cdn.alpinelinux.org/alpine/v3.20/community" >> /etc/apk/repositories

            apk update
            apk add --no-cache \
              python3 python3-dev py3-pip \
              gcc g++ musl-dev \
              linux-headers libffi-dev \
              openssl-dev openssl-libs-static \
              build-base patchelf pkgconf \
              libcap-dev sqlite-dev libgcc \
              libsodium-dev zlib-dev rust cargo

            # 虚拟环境
            python3 -m venv /opt/venv
            source /opt/venv/bin/activate
            pip install --upgrade pip setuptools wheel pyinstaller

            # 安装你验证过的依赖
            pip install --no-cache-dir \
              annotated-doc==0.0.4 annotated-types==0.7.0 anyio==4.13.0 attrs==26.1.0 \
              bcrypt==5.0.0 cachetools==7.0.5 certifi==2026.2.25 cffi==2.0.0 \
              charset-normalizer==3.4.6 click==8.3.1 cryptography==46.0.6 dnslib==0.9.26 \
              dnspython==2.8.0 docker==7.1.0 fastapi==0.135.2 h11==0.16.0 \
              idna==3.11 ifaddr==0.2.0 invoke==2.2.1 jsonschema==4.26.0 \
              jsonschema-specifications==2025.9.1 mysql-connector-python==9.6.0 paho-mqtt==2.1.0 \
              paramiko==4.0.0 psutil==7.2.2 pycparser==3.0 pydantic==2.12.5 pydantic-core==2.41.5 \
              pynacl==1.6.2 pyyaml==6.0.3 referencing==0.37.0 requests==2.33.0 rpds-py==0.30.0 \
              starlette==1.0.0 typing-extensions==4.15.0 typing-inspection==0.4.2 urllib3==2.6.3 \
              uvicorn==0.42.0 watchdog==6.0.0 zeroconf==0.148.0

            pip install .

            # 修复 cryptography 依赖名称（关键！）
            RUST_SO=$(find /opt/venv/lib/python3.12/site-packages/cryptography/hazmat/bindings -name "_rust.abi3.so" | head -n1)
            if [ -n "$RUST_SO" ]; then
              libgcc_so=$(ldd "$RUST_SO" | grep libgcc | awk '{print $1}')
              patchelf --replace-needed "$libgcc_so" libgcc_s.so.1 "$RUST_SO" || true
              patchelf --set-rpath '$ORIGIN' "$RUST_SO" || true
            fi

            # 启动脚本（无缩进错误）
            cat > run.py <<'EOF'
import os
import sys
os.environ["TMPDIR"] = "/data/local/tmp"
from foghorn.main import main
if __name__ == "__main__":
    main()
EOF

            python3 -m py_compile run.py

            # PyInstaller 打包（不使用 staticx！）
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --paths src \
              --collect-all foghorn \
              --collect-all cryptography \
              --add-data "example_configs:example_configs" \
              --add-data "assets:assets" \
              --hidden-import dnslib \
              --hidden-import yaml \
              --hidden-import dotenv \
              --hidden-import cachetools \
              --hidden-import cryptography.hazmat.bindings._rust \
              --exclude-module mariadb \
              --exclude-module psycopg2 \
              --exclude-module influxdb \
              --exclude-module tests \
              --runtime-tmpdir /data/local/tmp \
              run.py

            chmod +x dist/foghorn-android-arm64
            ls -lh dist/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64
          path: dist/foghorn-android-arm64
          retention-days: 30
