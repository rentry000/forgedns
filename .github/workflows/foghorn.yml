name: Build Foghorn for Android arm64-v8a

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-android-arm64:
    # 使用 GitHub 提供的原生 ARM64 运行器，极大提升含 C 扩展的 Python 库编译速度
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main

      - name: Build Static Binary via Alpine Docker
        uses: addnab/docker-run-action@v3
        with:
          # Alpine 提供 musl libc 环境，适合构建静态二进制
          image: arm64v8/python:3.11-alpine
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -e # 开启此选项：遇到任何一步报错立即停止，方便排查定位
            
            # 1. 安装底层构建依赖（新增了 mariadb-dev, mariadb-connector-c-dev 和 pkgconf）
            apk update
            apk add --no-cache \
              gcc g++ musl-dev linux-headers libffi-dev openssl-dev build-base patchelf \
              mariadb-dev mariadb-connector-c-dev pkgconf
            
            # 2. 安装 Python 打包与静态化工具
            pip install --upgrade pip
            pip install pyinstaller staticx
            
            # 3. 依赖安装
            # 现在 mariadb 已经有了底层的 C 库支持，可以顺利编译成 wheel 格式了
            pip install .
            
            # 4. 确认入口文件并使用 PyInstaller 编译
            pyinstaller --onefile --clean \
              --name foghorn-dynamic \
              --hidden-import dns \
              --hidden-import pkg_resources \
              foghorn/__main__.py 
              
            # 5. 使用 staticx 进行彻底静态化
            staticx dist/foghorn-dynamic dist/foghorn-arm64-v8a
            
            # 赋予执行权限
            chmod +x dist/foghorn-arm64-v8a


      - name: Upload Android Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a
          path: dist/foghorn-arm64-v8a
