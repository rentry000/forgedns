name: Build Foghorn Android ARM64 终极全静态版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout 项目源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main
          fetch-depth: 1

      - name: 移除数据库可选依赖
        run: |
          sed -i '/mariadb/d' pyproject.toml
          sed -i '/psycopg2/d' pyproject.toml
          sed -i '/influxdb/d' pyproject.toml
          echo "已移除会触发编译失败的数据库依赖"

      - name: 全静态构建Android二进制（Edge分支彻底解决镜像问题）
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -euxo pipefail

            echo "===== 配置Edge分支稳定镜像源 ====="
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            https://mirrors.ustc.edu.cn/alpine/edge/main
            https://mirrors.ustc.edu.cn/alpine/edge/community
            https://mirrors.tuna.tsinghua.edu.cn/alpine/edge/main
            https://mirrors.tuna.tsinghua.edu.cn/alpine/edge/community
            EOF

            apk update --no-cache || { echo "❌ 镜像源更新失败"; exit 1; }
            echo "✅ Edge镜像源配置完成，包索引更新成功"

            echo "===== 安装全量系统依赖+所有静态包 ====="
            apk add --no-cache \
              python3 python3-dev py3-pip \
              gcc g++ musl-dev \
              linux-headers libffi-dev \
              openssl-dev openssl-libs-static \
              build-base patchelf pkgconf wget \
              libcap-dev sqlite-dev libgcc \
              sqlite-static \
              libsodium-static \
              zlib-static \
              libc6-compat

            apk add --no-cache musl-static || true

            apk info musl-static > /dev/null 2>&1 || { echo "⚠️ musl-static 不存在，已跳过，不影响静态编译"; true; }
            command -v python3 > /dev/null 2>&1 || { echo "❌ python3安装失败"; exit 1; }
            echo "✅ 所有系统依赖+静态包安装完成，校验通过"

            echo "===== 配置Python全静态编译环境 ====="
            PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            echo "Python版本：$PYTHON_VERSION"

            export PYTHONPATH=/usr/lib/python$PYTHON_VERSION

            LDFLAGS=""
            CFLAGS=""
            CPPFLAGS=""

            export LDFLAGS="$LDFLAGS -L/usr/lib -lpython$PYTHON_VERSION -Wl,--export-dynamic -static"
            export CFLAGS="$CFLAGS -I/usr/include/python$PYTHON_VERSION -fPIC"
            export CPPFLAGS="$CPPFLAGS -I/usr/include/python$PYTHON_VERSION"
            
            export CRYPTOGRAPHY_RUST=0
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1

            # 2. 配置Python虚拟环境
            python3 -m venv /opt/venv
            source /opt/venv/bin/activate
            
            # ======================
            # 【核心修复】先升级 pip/setuptools/wheel，彻底解决 pkg_resources 缺失
            # ======================
            pip install --no-cache-dir --upgrade pip setuptools wheel

            # ======================
            # 现在再装 staticx，不会再报 pkg_resources 错误
            # ======================
            pip install --no-cache-dir pyinstaller staticx

            echo "===== 安装全量Python依赖 ====="
            pip install --no-cache-dir cryptography==38.0.4

            python3 -c "
            try:
                import cryptography
                print('✅ cryptography 加载成功')
            except Exception as e:
                print('❌ cryptography 加载失败:', str(e))
                raise
            "

            pip install --no-cache-dir \
              annotated-doc==0.0.4 annotated-types==0.7.0 anyio==4.13.0 attrs==26.1.0 \
              bcrypt==5.0.0 cachetools==7.0.5 certifi==2026.2.25 cffi==2.0.0 \
              charset-normalizer==3.4.6 click==8.3.1 dnslib==0.9.26 \
              dnspython==2.8.0 docker==7.1.0 fastapi==0.135.2 h11==0.16.0 \
              idna==3.11 ifaddr==0.2.0 invoke==2.2.1 jsonschema==4.26.0 \
              jsonschema-specifications==2025.9.1 mysql-connector-python==9.6.0 paho-mqtt==2.1.0 \
              paramiko==4.0.0 psutil==7.2.2 pycparser==3.0 pydantic==2.12.5 pydantic-core==2.41.5 \
              pynacl==1.6.2 pyyaml==6.0.3 referencing==0.37.0 requests==2.33.0 rpds-py==0.30.0 \
              starlette==1.0.0 typing-extensions==4.15.0 typing-inspection==0.4.2 urllib3==2.6.3 \
              uvicorn==0.42.0 watchdog==6.0.0 zeroconf==0.148.0

            pip install --no-cache-dir .
            echo "✅ 所有Python依赖安装完成"

            echo "===== 生成启动脚本 ====="
            cat > run.py << 'EOF'
            #!/usr/bin/env python3
            import os
            import sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            if not os.environ.get("FOGHORN_CONFIG"):
                exe_dir = os.path.dirname(os.path.abspath(sys.executable))
                default_config = os.path.join(exe_dir, "config.yaml")
                if os.path.exists(default_config):
                    os.environ["FOGHORN_CONFIG"] = default_config
                else:
                    try:
                        import foghorn
                        pkg_dir = os.path.dirname(foghorn.__file__)
                        example_config = os.path.join(pkg_dir, "..", "example_configs", "config.full.yaml")
                        if os.path.exists(example_config):
                            os.environ["FOGHORN_CONFIG"] = example_config
                    except:
                        pass
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            python3 -m py_compile run.py
            echo "✅ 启动脚本语法校验通过"

            echo "===== 全量打包 ====="
            LIBGCC_PATH=$(find /usr/lib -name "libgcc_s.so.1" | head -n 1)
            echo "找到libgcc_s路径：$LIBGCC_PATH"

            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --paths src \
              --paths /opt/venv/lib/python$PYTHON_VERSION/site-packages \
              --collect-all foghorn \
              --collect-all cryptography \
              --add-data "example_configs:example_configs" \
              --add-data "assets:assets" \
              --add-binary "$LIBGCC_PATH:." \
              --hidden-import dnslib \
              --hidden-import yaml \
              --exclude-module mariadb \
              --exclude-module psycopg2 \
              --exclude-module influxdb \
              --exclude-module tests \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              run.py

            # 【Android 必加】真正全静态封包
            staticx dist/foghorn-android-arm64 dist/foghorn-android-arm64-static
            
            chmod +x dist/foghorn-android-arm64-static
            chmod -R a+rwx dist/

            echo "===== 构建完成，最终产物信息 ====="
            ls -lh dist/
            file dist/foghorn-android-arm64-static
            echo "✅ 全静态构建成功！最终可执行文件：dist/foghorn-android-arm64-static"

      - name: 上传最终全静态二进制
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a-终极全静态版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
