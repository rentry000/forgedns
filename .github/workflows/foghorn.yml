name: Build Foghorn Android ARM64 终极全静态版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout 项目源码
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn
          ref: main
          fetch-depth: 1

      - name: 移除数据库可选依赖
        run: |
          sed -i '/mariadb/d' pyproject.toml
          sed -i '/psycopg2/d' pyproject.toml
          sed -i '/influxdb/d' pyproject.toml

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run:
            set -euxo pipefail

            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories <<'EOF'
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            EOF

            apk update --no-cache

            # ==============================
            # 【唯一大修】无注释、不换行、整行到底
            # 100% 装上 python3 + 所有静态包
            # ==============================
            apk add --no-cache python3 python3-dev py3-pip gcc g++ musl-dev musl-static linux-headers libffi-dev openssl-dev openssl-libs-static build-base patchelf pkgconf wget libcap-dev sqlite-dev sqlite-static libgcc libsodium-static zlib-static rust cargo

            apk info musl-static
            command -v python3
            command -v rustc

            PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")

            export PYTHONPATH=/usr/lib/python$PYTHON_VERSION
            export LDFLAGS="$LDFLAGS -L/usr/lib -lpython$PYTHON_VERSION -Wl,--export-dynamic"
            export CFLAGS="$CFLAGS -I/usr/include/python$PYTHON_VERSION -fPIC"
            export CPPFLAGS="$CPPFLAGS -I/usr/include/python$PYTHON_VERSION"
            export PYO3_PYTHON=python3
            export PYO3_NO_PYTHON=0
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export CARGO_BUILD_TARGET=aarch64-unknown-linux-musl
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-static -C link-arg=-static-libgcc -C link-arg=-Wl,-Bstatic,-lgcc,-lc,-Bdynamic -C link-arg=-Wl,--export-dynamic"

            python3 -m venv /opt/venv
            source /opt/venv/bin/activate
            pip install --no-cache-dir --upgrade pip setuptools wheel pyinstaller staticx

            pip install --no-cache-dir --no-build-isolation cryptography==46.0.6
            python3 -c "from cryptography.hazmat.bindings._rust import abi3"

            pip install --no-cache-dir annotated-doc==0.0.4 annotated-types==0.7.0 anyio==4.13.0 attrs==26.1.0 bcrypt==5.0.0 cachetools==7.0.5 certifi==2026.2.25 cffi==2.0.0 charset-normalizer==3.4.6 click==8.3.1 dnslib==0.9.26 dnspython==2.8.0 docker==7.1.0 fastapi==0.135.2 h11==0.16.0 idna==3.11 ifaddr==0.2.0 invoke==2.2.1 jsonschema==4.26.0 jsonschema-specifications==2025.9.1 mysql-connector-python==9.6.0 paho-mqtt==2.1.0 paramiko==4.0.0 psutil==7.2.2 pycparser==3.0 pydantic==2.12.5 pydantic-core==2.41.5 pynacl==1.6.2 pyyaml==6.0.3 referencing==0.37.0 requests==2.33.0 rpds-py==0.30.0 starlette==1.0.0 typing-extensions==4.15.0 typing-inspection==0.4.2 urllib3==2.6.3 uvicorn==0.42.0 watchdog==6.0.0 zeroconf==0.148.0

            pip install --no-cache-dir .

            RUST_SO_PATH=$(find /opt/venv/lib/python$PYTHON_VERSION/site-packages/cryptography/hazmat/bindings -name "_rust.abi3.so" | head -n 1)
            if [ -n "$RUST_SO_PATH" ]; then
              libgcc_so=$(ldd "$RUST_SO_PATH" | grep libgcc_s | awk '{print $1}')
              patchelf --replace-needed "$libgcc_so" libgcc_s.so.1 "$RUST_SO_PATH"
              patchelf --set-rpath '$ORIGIN:$ORIGIN/..:$ORIGIN/../..' "$RUST_SO_PATH"
            fi

            cat > run.py <<'EOF'
            #!/usr/bin/env python3
            import os
            import sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            if not os.environ.get("FOGHORN_CONFIG"):
                exe_dir = os.dirname(os.path.abspath(sys.executable))
                default_config = os.path.join(exe_dir, "config.yaml")
                if os.path.exists(default_config):
                    os.environ["FOGHORN_CONFIG"] = default_config
                else:
                    try:
                        import foghorn
                        pkg_dir = os.path.dirname(foghorn.__file__)
                        example_config = os.path.join(pkg_dir, "..", "example_configs", "config.full.yaml")
                        if os.path.exists(example_config):
                            os.environ["FOGHORN_CONFIG"] = example_config
                    except:
                        pass
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            python3 -m py_compile run.py

            LIBGCC_PATH=$(find /usr/lib -name "libgcc_s.so.1" | head -n 1)

            pyinstaller --onefile --clean \
              --name foghorn_dynamic \
              --paths src \
              --paths /opt/venv/lib/python$PYTHON_VERSION/site-packages \
              --collect-all foghorn \
              --collect-all cryptography \
              --add-data "example_configs:example_configs" \
              --add-data "assets:assets" \
              --add-binary "$LIBGCC_PATH:." \
              --hidden-import dnslib \
              --hidden-import yaml \
              --hidden-import cryptography.hazmat.bindings._rust \
              --exclude-module mariadb \
              --exclude-module psycopg2 \
              --exclude-module influxdb \
              --exclude-module tests \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              run.py

            staticx --strip --no-compress --ld "/lib/ld-musl-aarch64.so.1" dist/foghorn_dynamic dist/foghorn-android-arm64

            chmod +x dist/foghorn-android-arm64
            chmod -R a+rwx dist/

            ls -lh dist/
            file dist/foghorn-android-arm64

      - name: 上传最终全静态二进制
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a-终极全静态版
          path: dist/foghorn-android-arm64
          retention-days: 30
