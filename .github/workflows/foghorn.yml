name: Build foghorn Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: zallison/foghorn

      - name: Install Python & dependencies
        run: |
          sudo apt update -y
          sudo apt install -y python3-pip python3-venv
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install dnslib pyyaml python-dotenv
          pip install pyinstaller

      - name: Build binary
        run: |
          source venv/bin/activate
          pyinstaller \
            --onefile \
            --name foghorn-android-arm64 \
            --add-data "config.example.yaml:." \
            --add-data "foghorn/plugins:foghorn/plugins" \
            src/foghorn/main.py  # ✅ 完全正确的路径

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a
          path: dist/foghorn-android-arm64
