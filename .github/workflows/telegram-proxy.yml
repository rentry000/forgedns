name: Build Telegram Proxy Magisk Module
on:
  # 手动触发（推荐，在Actions页面一键运行）
  workflow_dispatch:
  # 可选：推送代码时自动触发，取消注释即可
  # push:
  #   branches: [ main, master ]

jobs:
  build-module:
    runs-on: ubuntu-latest
    steps:
      - name: 安装系统基础依赖
        run: |
          sudo apt update -y
          sudo apt install -y zip unzip curl wget git python3

      - name: 安装 Go 1.22+ 环境（mtg编译必需）
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: 克隆目标仓库
        run: |
          git clone --depth 1 https://github.com/elementalmasterpotap/telegram-proxy.git

      - name: 预清理+修复原脚本核心bug
        working-directory: ./telegram-proxy/tools
        run: |
          # 1. 强制清理残留的mtg_src目录，避免空目录跳过克隆
          rm -rf mtg_src
          # 2. 给构建脚本添加执行权限
          chmod +x build_magisk_module.sh
          # 3. 固定mtg v2分支，避免上游main分支结构变更
          sed -i 's/git clone --depth 1 https:\/\/github.com\/9seconds\/mtg.git mtg_src/git clone --depth 1 --branch v2 https:\/\/github.com\/9seconds\/mtg.git mtg_src/g' build_magisk_module.sh
          # 4. 增加克隆失败强制退出逻辑，避免无效继续
          sed -i 's/git clone --depth 1/git clone --depth 1 || { echo "❌ mtg仓库克隆失败，网络异常"; exit 1; }/g' build_magisk_module.sh

      - name: 执行构建脚本生成Magisk模块
        working-directory: ./telegram-proxy/tools
        run: |
          set -euo pipefail
          bash build_magisk_module.sh

      - name: 定位构建产物
        id: find-module
        run: |
          # 精准匹配原脚本生成的zip文件名
          MODULE_FILE=$(find ./telegram-proxy/tools -name "mtg_proxy_magisk_v*.zip" -type f | head -n 1)
          if [ -z "$MODULE_FILE" ]; then
            echo "❌ 构建失败：未找到生成的Magisk模块zip文件"
            exit 1
          fi
          echo "✅ 找到模块文件：$MODULE_FILE"
          echo "module_path=$MODULE_FILE" >> $GITHUB_OUTPUT

      - name: 上传Magisk模块制品
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-magisk-module
          path: ${{ steps.find-module.outputs.module_path }}
          retention-days: 30
