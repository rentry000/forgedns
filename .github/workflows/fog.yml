name: Build Foghorn Android ARM64 单二进制终极根治版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仅用于构建目录
        uses: actions/checkout@v4

      - name: 设置QEMU多架构模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # ========== 修复1：替换为稳定可用的alpine edge源，彻底解决链接报错 ==========
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            # 阿里云alpine edge源，国内稳定可用，无链接报错
            https://mirrors.aliyun.com/alpine/edge/main
            https://mirrors.aliyun.com/alpine/edge/community
            # 官方源兜底
            http://dl-cdn.alpinelinux.org/alpine/edge/main
            http://dl-cdn.alpinelinux.org/alpine/edge/community
            EOF

            # 兜底DNS配置
            echo "nameserver 8.8.8.8" > /etc/resolv.conf
            echo "nameserver 223.5.5.5" >> /etc/resolv.conf

            # 带重试的apk更新，彻底解决网络波动问题
            for i in 1 2 3; do apk update --no-cache && break || sleep 5; done

            # 全量依赖安装，含Python编译所需的所有静态库
            apk add --no-cache \
              gcc g++ musl-dev linux-headers build-base patchelf pkgconf binutils git \
              zlib-static zlib-dev libffi-dev openssl-dev openssl-libs-static \
              ncurses-dev ncurses-static readline-dev readline-static bzip2-dev xz-dev expat-dev expat-static \
              libcap-dev libgcc libsodium-static libc6-compat scons rust cargo \
              mariadb-dev mariadb-static wget tar make gdbm-dev sqlite-dev sqlite-static \
              util-linux-dev util-linux-static zstd-dev zstd-static

            # 静态库校验，确保核心依赖完整
            echo "===== 依赖静态库校验 ====="
            ALL_EXIST=true
            for lib in \
              "/usr/lib/libffi.a" \
              "/usr/lib/libgdbm.a" \
              "/usr/lib/libsqlite3.a" \
              "/usr/lib/libuuid.a" \
              "/usr/lib/libzstd.a"
            do
              if [ -f "$lib" ]; then
                echo "✅ 存在: $lib"
                ls -la "$lib"
              else
                echo "❌ 缺失: $lib"
                ALL_EXIST=false
              fi
            done
            if [ "$ALL_EXIST" = "false" ]; then
              echo "❌ 核心静态库缺失，终止构建"
              exit 1
            fi
            echo "===== 静态库校验完成 ====="

            # 官方正式发布的Python 3.14.0，源码结构完整可追溯
            PYTHON_VERSION="3.14.0"
            # 全局编译环境变量，确保configure正确识别
            export LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -Wl,--disable-new-dtags"
            export CFLAGS="-fPIC -O2"
            export CPPFLAGS="-I/usr/include"
            export PKG_CONFIG_PATH="/usr/lib/pkgconfig"
            export CRYPTOGRAPHY_RUST=0
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_CROSS_LIB_DIR=/usr/lib
            export RUSTFLAGS="-C target-feature=+crt-static"

            # ========== 修复2：源码完整性全流程校验，彻底解决文件缺失问题 ==========
            echo "===== 开始编译全静态Python（内置SQLite3） ====="
            PYTHON_TAR_URL="https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_TAR_FILE="python.tar.xz"
            
            # 3次重试下载，避免网络波动导致下载失败
            for i in 1 2 3; do
              wget --no-check-certificate --tries=3 --timeout=30 "$PYTHON_TAR_URL" -O "$PYTHON_TAR_FILE" && break || sleep 5
            done
            
            # 校验压缩包有效性，避免下载到404页面导致解压残缺
            if ! xz -t "$PYTHON_TAR_FILE"; then
              echo "❌ 下载的Python源码包损坏，URL: $PYTHON_TAR_URL"
              exit 1
            fi
            
            # 解压并进入源码目录
            tar xf "$PYTHON_TAR_FILE"
            cd Python-$PYTHON_VERSION

            # ========== 关键调试：列出_sqlite目录实际文件，彻底确认源码结构 ==========
            echo "===== 官方Python $PYTHON_VERSION _sqlite模块实际文件列表 ====="
            ls -la Modules/_sqlite/
            echo "================================================================="

            # ========== 修复3：使用官方正式版真实存在的文件列表，彻底移除不存在的cache.c ==========
            echo "===== 校验Python核心源文件 ====="
            # 官方Python 3.14.0正式版_sqlite3模块的完整源文件，无任何不存在的文件
            SQLITE_SOURCE_FILES="
              _sqlite/connection.c
              _sqlite/cursor.c
              _sqlite/microprotocols.c
              _sqlite/module.c
              _sqlite/prepare_protocol.c
              _sqlite/row.c
              _sqlite/statement.c
              _sqlite/util.c
            "
            for file in $SQLITE_SOURCE_FILES; do
              FULL_PATH="Modules/$file"
              if [ -f "$FULL_PATH" ]; then
                echo "✅ 存在: $FULL_PATH"
              else
                echo "❌ 缺失: $FULL_PATH，源码不完整，终止构建"
                exit 1
              fi
            done
            echo "===== 源文件校验完成，所有_sqlite3模块文件均存在 ====="

            # configure优化，确保生成正确的Makefile规则
            ./configure \
              --prefix=/usr/local \
              --disable-shared \
              --disable-test-modules \
              --without-ensurepip \
              --disable-optimizations \
              --with-system-expat \
              --with-system-libmpdec

            # ========== 修复4：Setup.local适配官方正式版文件列表，移除cache.c ==========
            > Modules/Setup.local
            cat >> Modules/Setup.local << 'EOF'
            *static*
            # 官方标准静态内置_sqlite3模块，完整包含所有功能，无不存在的源文件
            _sqlite3 _sqlite/connection.c _sqlite/cursor.c _sqlite/microprotocols.c _sqlite/module.c _sqlite/prepare_protocol.c _sqlite/row.c _sqlite/statement.c _sqlite/util.c \
              -I/usr/include \
              -L/usr/lib \
              -lsqlite3 -lz -lpthread -lm -ldl
            
            _uuid _uuidmodule.c -luuid
            _zstd _zstdmodule.c -lzstd
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma
            EOF

            # 预校验Makefile已生成正确的构建规则
            echo "===== 校验Makefile构建规则 ====="
            if grep -q "_sqlite/connection.o" Makefile; then
              echo "✅ Makefile已生成_sqlite3模块完整构建规则"
            else
              echo "❌ Makefile未生成_sqlite3模块构建规则，配置异常"
              exit 1
            fi

            # 编译安装，全核心加速
            make -j$(nproc)
            make install
            cd ..
            rm -rf "$PYTHON_TAR_FILE" Python-$PYTHON_VERSION

            # 替换系统默认Python
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3 2>/dev/null || true
            ln -sf /usr/local/bin/pip3 /usr/bin/pip 2>/dev/null || true

            # Python编译结果校验
            echo "===== Python编译结果校验 ====="
            python3 --version
            python3 -c "import sqlite3, uuid, zstd; print('✅ 所有核心模块导入成功：sqlite3、uuid、zstd')"
            python3 -c "import sysconfig; print('Python静态编译状态：', sysconfig.get_config_var('Py_ENABLE_SHARED') == 0)"

            # 校验_sqlite3无动态依赖
            SQLITE3_SO=$(find /usr/local/lib/python3* -name "_sqlite3.cpython-*.so")
            echo "SQLite3扩展路径: $SQLITE3_SO"
            if [ -n "$SQLITE3_SO" ]; then
              readelf -d "$SQLITE3_SO" | grep NEEDED | grep -E 'libsqlite3|RUNPATH|RPATH' || echo "✅ _sqlite3无libsqlite3动态依赖，无RUNPATH/RPATH"
            fi
            echo "===== Python校验完成 ====="

            # 安装pip与打包工具
            python3 -m ensurepip --upgrade
            pip install --upgrade pip setuptools wheel
            pip install --no-cache-dir pyinstaller
            pip install --no-cache-dir --no-build-isolation staticx

            # 安装foghorn及依赖
            pip install --no-cache-dir foghorn
            pip install --no-cache-dir --no-binary pydantic_core pydantic_core==2.41.5

            # 全量RUNPATH/RPATH清理，杜绝staticx报错
            echo "===== 全量RUNPATH/RPATH清理 ====="
            find /usr/local/lib/python3* -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            find /usr/local/lib/python3*/site-packages -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            find /usr/lib -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
            done
            echo "===== 全量清理完成 ====="

            # 生成启动入口脚本
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # PyInstaller打包，适配3.14版本路径
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-binaries "libsqlite3.so.0" \
              --add-binary "/usr/lib/libz.so.1:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libffi.so.8:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libssl.so.3:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libcrypto.so.3:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libgcc_s.so.1:python3.14/lib-dynload/" \
              run.py

            # 最终打包校验
            echo "===== 打包结果最终校验 ====="
            python3 -c "
            import zipfile
            exe_path = 'dist/foghorn-android-arm64'
            has_sqlite = False
            with zipfile.ZipFile(exe_path, 'r') as zf:
                for name in zf.namelist():
                    if 'libsqlite3.so.0' in name:
                        has_sqlite = True
                        print('❌ 发现残留libsqlite3.so.0:', name)
                        break
            if not has_sqlite:
                print('✅ 打包归档内无libsqlite3.so.0，彻底根治RUNPATH报错')
            "
            echo "===== 最终校验完成 ====="

            # Staticx全静态封包
            staticx \
              dist/foghorn-android-arm64 \
              dist/foghorn-android-arm64-static

            # 权限修复
            chown -R 1001:1001 dist/
            chmod -R 755 dist/

      - name: 上传最终单二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-终极根治版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
