name: Build Foghorn Android ARM64 终极全静态版
on:
  workflow_dispatch:

jobs:
  build-android:
    # 若您有可用的ARM64自建Runner，可取消下面一行注释，注释掉ubuntu-latest
    # runs-on: ubuntu-24.04-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仅用于构建目录
        uses: actions/checkout@v4

      # 多架构支持，解决x86 Runner构建ARM64二进制的问题，完整保留
      - name: 设置QEMU多架构模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          # 指定ARM64架构，确保构建产物适配Android，完整保留
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # 1. 镜像源修复：解决invalid link问题，新增清华源备用，双镜像兜底可用性
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://mirrors.ustc.edu.cn/alpine/edge/main
            https://mirrors.ustc.edu.cn/alpine/edge/community
            https://mirrors.tuna.tsinghua.edu.cn/alpine/edge/main
            https://mirrors.tuna.tsinghua.edu.cn/alpine/edge/community
            EOF

            # 兜底DNS修复，彻底杜绝域名解析失败问题，完整保留
            echo "nameserver 8.8.8.8" > /etc/resolv.conf
            echo "nameserver 114.114.114.114" >> /etc/resolv.conf

            # 执行无警告更新
            apk update --no-cache

            # 2. 安装构建依赖：【方案二合并修改】补充sqlite-libs/sqlite-dev，保留全量核心依赖
            # 补充sqlite相关包，用于获取打包所需的动态库，同时保留静态编译能力
            apk add --no-cache \
              python3 python3-dev py3-pip py3-setuptools \
              gcc g++ musl-dev linux-headers libffi-dev \
              openssl-dev openssl-libs-static build-base patchelf pkgconf \
              libcap-dev libgcc libsodium-static \
              zlib-static zlib-dev libc6-compat scons binutils git rust cargo \
              mariadb-dev mariadb-static wget tar \
              sqlite-dev sqlite-libs sqlite-static

            # 3. 强制全静态编译环境（适配ARM64架构，完整保留原有配置）
            PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            export PYTHONPATH=/usr/lib/python$PYTHON_VERSION
            export LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic"
            export CFLAGS="-I/usr/include/python$PYTHON_VERSION -fPIC"
            export CPPFLAGS="-I/usr/include/python$PYTHON_VERSION"
            export CRYPTOGRAPHY_RUST=0
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_CROSS_LIB_DIR=/usr/lib
            export RUSTFLAGS="-C target-feature=+crt-static"

            # ====================== 原有自主编译全静态SQLite 完整保留，双保险兜底 ======================
            # 仅生成静态库，不生成动态库，从根源消除libsqlite3.so.0的DT_RUNPATH问题
            wget --no-check-certificate https://www.sqlite.org/2024/sqlite-autoconf-3460000.tar.gz -O sqlite.tar.gz
            tar zxf sqlite.tar.gz
            cd sqlite-autoconf-3460000
            # 全静态编译配置：禁用动态库、禁用额外依赖、确保线程安全，适配Python调用
            ./configure \
              --prefix=/usr \
              --disable-shared \
              --enable-static \
              --disable-readline \
              --disable-editline \
              --enable-threadsafe \
              --with-pic
            make -j$(nproc)
            make install
            cd ..
            rm -rf sqlite.tar.gz sqlite-autoconf-3460000
            # 验证静态库安装成功
            ls -la /usr/lib/libsqlite3.a
            # ==========================================================================================================

            # 4. 虚拟环境（完整保留）
            python3 -m venv /opt/venv
            source /opt/venv/bin/activate

            # 5. 安装工具（完整保留）
            pip install --upgrade pip
            pip install --no-cache-dir "setuptools==69.0.0" wheel
            pip install --no-cache-dir pyinstaller
            pip install --no-cache-dir --no-build-isolation staticx

            # ====================== 核心修复 完整保留 ======================
            # 6. 安装foghorn，强制源码编译pydantic_core，消灭动态依赖
            pip install --no-cache-dir foghorn
            pip install --no-cache-dir --no-binary pydantic_core pydantic_core==2.41.5
            # ==============================================================

            # 7. 全量清理所有动态库的RPATH/RUNPATH，彻底杜绝staticx拦截
            # 清理虚拟环境内所有so文件
            find /opt/venv -name "*.so*" -type f | while read so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            # 清理系统内可能被打包的so文件
            find /usr/lib -name "*.so*" -type f | while read so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
            done

            # 8. 启动入口（完整保留）
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # 9. PyInstaller 打包【方案二核心合并】新增全量--add-binary依赖内置
            # 自动适配Python版本，把所有核心共享库打包进二进制，运行时自动加载，无需系统依赖
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              # 方案二核心：内置所有核心依赖库，彻底根治共享库找不到报错
              --add-binary "/usr/lib/libsqlite3.so.0:python$PYTHON_VERSION/lib-dynload/" \
              --add-binary "/usr/lib/libz.so.1:python$PYTHON_VERSION/lib-dynload/" \
              --add-binary "/usr/lib/libffi.so.8:python$PYTHON_VERSION/lib-dynload/" \
              --add-binary "/usr/lib/libssl.so.3:python$PYTHON_VERSION/lib-dynload/" \
              --add-binary "/usr/lib/libcrypto.so.3:python$PYTHON_VERSION/lib-dynload/" \
              --add-binary "/usr/lib/libgcc_s.so.1:python$PYTHON_VERSION/lib-dynload/" \
              --add-binary "/usr/lib/libm.so.6:python$PYTHON_VERSION/lib-dynload/" \
              run.py

            # 【方案二兼容修改】调整清理顺序：打包完成后再清理系统残留动态库，不影响打包读取
            # 彻底清理系统残留的sqlite动态库，杜绝被意外打包
            find / -name "libsqlite3.so*" -type f -delete 2>/dev/null || true
            # 打包后二次校验：确保无外部动态库残留，仅保留内置打包的内容
            find dist/ -name "libsqlite3.so*" -type f -delete 2>/dev/null || true

            # 10. Staticx 封包（完整保留，无RUNPATH拦截风险）
            staticx \
              dist/foghorn-android-arm64 \
              dist/foghorn-android-arm64-static

            # 11. 权限修复（完整保留）
            chown -R 1001:1001 dist/
            chmod -R 755 dist/

      - name: 上传最终全静态二进制
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-v8a-终极全静态版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
