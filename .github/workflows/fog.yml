name: Build Foghorn Android ARM64 单二进制最终版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置QEMU ARM64模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建二进制【修复Python3.13+废弃参数+Setup缺失+shell语法错误终极版】
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # 1. 源配置：完全对齐官方Edge源，aarch64架构全量可用
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            EOF

            # 2. 固定DNS，避免构建过程网络波动
            echo "nameserver 223.5.5.5" > /etc/resolv.conf
            echo "nameserver 8.8.8.8" >> /etc/resolv.conf

            # 3. 更新源索引
            echo "===== 更新Alpine源索引 ====="
            apk update --force --no-cache
            echo "✅ 源索引更新完成"

            # 4. 修复包系统与循环软链接
            echo "===== 修复包系统与循环软链接 ====="
            apk fix --force-overwrite --force-broken-world
            find /usr/lib -xdev -type l ! -exec test -e {} \; -delete
            echo '✅ 损坏软链接清理完成'

            # 5. 全量编译依赖安装
            echo "===== 安装全量编译依赖与静态库 ====="
            apk add --no-cache --force-overwrite \
              build-base gcc g++ musl-dev linux-headers curl binutils git \
              patchelf pkgconf make scons rust cargo \
              zlib-dev zlib-static openssl-dev openssl-libs-static \
              bz2-dev bz2-static xz-dev xz-static expat-dev expat-static \
              zstd-dev zstd-static sqlite-dev sqlite-static util-linux-dev util-linux-static \
              gdbm-dev libffi-dev mpdecimal-dev libcap-dev libcap-static libsodium-static \
              libxcrypt-dev libxcrypt-static mariadb-dev libc6-compat
            echo "✅ 全量依赖安装完成"

            # 6. 核心依赖校验
            echo "===== 核心依赖校验 ====="
            REQUIRED_LIBS="libz.a libffi.a libssl.a libcrypto.a libsqlite3.a libuuid.a libgdbm.a libmpdec.a liblzma.a libbz2.a libzstd.a libexpat.a libcrypt.a"
            for lib in $REQUIRED_LIBS; do
              LIB_PATH=$(find /usr/lib /usr/local/lib -name "$lib" -type f | head -n 1)
              if [ -n "$LIB_PATH" ] && [ -s "$LIB_PATH" ]; then
                echo "✅ 有效: $LIB_PATH"
                ln -sf "$LIB_PATH" "/usr/lib/$lib" 2>/dev/null || true
              else
                echo "❌ 缺失: $lib"
                exit 1
              fi
            done
            echo "✅ 所有核心静态依赖就绪"

            # 7. 全局编译环境变量
            export BUILD_HOST="aarch64-alpine-linux-musl"
            export CC="gcc"
            export CXX="g++"
            export CC_FOR_BUILD="gcc"
            export LDFLAGS="-static -L/usr/lib -Wl,--no-as-needed -Wl,--gc-sections"
            export CPPFLAGS="-I/usr/include -I/usr/include/uuid -I/usr/include/sqlite3"
            export CFLAGS="-fPIC -O2 -ffunction-sections -fdata-sections"
            export CXXFLAGS="-fPIC -O2"
            export PKG_CONFIG="pkg-config --static"
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PIP_ONLY_BINARY=:none:
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_BUILD_TARGET="aarch64-unknown-linux-musl"

            # 8. Python 版本
            PYTHON_VERSION="3.13.3"
            PYTHON_TAR="python.tar.xz"
            PYTHON_URL="https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_SHA256="40f868bcbdeb8149a3149580bb9bfd407b3321cd48f0be631af955ac9c0e041"

            # 9. 下载校验源码
            echo "===== 下载Python源码 ====="
            curl -fSL "$PYTHON_URL" -o "$PYTHON_TAR"
            echo "$PYTHON_SHA256  $PYTHON_TAR" | sha256sum -c - || { echo "❌ 源码校验失败"; exit 1; }
            tar -xf "$PYTHON_TAR"
            cd "Python-$PYTHON_VERSION"

            # 源码完整性校验
            if [ ! -d Modules ]; then
              echo "❌ Modules目录缺失"; exit 1
            fi
            if [ ! -f Modules/Setup.bootstrap.in ] && [ ! -f Modules/Setup.in ]; then
              echo "❌ 核心模板缺失"; ls -la Modules/; exit 1
            fi
            echo "✅ Python源码完整性校验通过"

            # 彻底清缓存
            make clean distclean || true
            rm -rf build/ Modules/Setup.local Modules/Setup Modules/Setup.dist
            echo "✅ 旧缓存清理完成"

            # 10.【关键修复】3.13+ 剔除所有废弃 configure 参数
            echo "===== 合规配置Python 3.13+ ====="
            ./configure \
              --host=$BUILD_HOST \
              --build=$BUILD_HOST \
              --prefix=/usr/local \
              --disable-shared \
              --enable-optimizations \
              --without-pymalloc \
              --disable-framework \
              --disable-test-modules \
              --without-doc-strings \
              --without-ensurepip \
              --disable-ipv6 \
              ac_cv_file__dev_ptmx=no \
              ac_cv_file__dev_ptc=no \
              2>&1 | tee configure.log
            CONFIGURE_EXIT_CODE=${PIPESTATUS[0]}
            if [ $CONFIGURE_EXIT_CODE -ne 0 ]; then
              echo "❌ configure失败"; cat configure.log; exit 1
            fi
            echo "✅ configure配置完成（已移除无效旧参数）"

            # 11.【终极修复】解决 cat: can't open ./Modules/Setup
            echo "===== 补全Setup核心文件 ====="
            ls -la Modules/
            if [ ! -f Modules/Setup ]; then
              cp -f Modules/Setup.stdlib Modules/Setup || \
              cp -f Modules/Setup.bootstrap.in Modules/Setup || \
              cp -f Modules/Setup.in Modules/Setup
            fi
            touch Modules/Setup.local
            if [ ! -s Modules/Setup ]; then
              echo "❌ Setup文件仍为空"; exit 1
            fi
            echo "✅ Setup文件补全完成，彻底解决报错"

            # 12. 写入静态模块 Setup.local
            echo "===== 配置静态模块 ====="
            cat > Modules/Setup.local << 'EOF'
            *static*
            
            math mathmodule.c
            cmath cmathmodule.c
            _struct _struct.c
            array arraymodule.c
            binascii binascii.c
            _random _randommodule.c
            _bisect _bisectmodule.c
            _heapq _heapqmodule.c
            _json _json.c
            _datetime _datetimemodule.c
            _elementtree _elementtree.c -lexpat
            _pickle _pickle.c
            _queue _queuemodule.c
            _statistics _statisticsmodule.c
            _posixsubprocess _posixsubprocess.c
            _csv _csv.c
            _fcntl fcntlmodule.c
            _mmap mmapmodule.c
            _resource resource.c
            _select selectmodule.c
            _socket socketmodule.c
            _asyncio _asynciomodule.c
            _contextvars _contextvarsmodule.c
            unicodedata unicodedata.c
            
            _hashlib _hashopenssl.c -lssl -lcrypto
            _ssl _ssl.c -lssl -lcrypto
            _crypt _cryptmodule.c -lcrypt
            
            zlib zlibmodule.c -lz
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma
            _zstd _zstdmodule.c -lzstd
            
            _sqlite3 \
              _sqlite/module.c _sqlite/connection.c _sqlite/cursor.c \
              _sqlite/statement.c _sqlite/row.c _sqlite/blob.c \
              _sqlite/prepare_protocol.c _sqlite/microprotocols.c _sqlite/util.c \
              -lsqlite3
            
            _gdbm _gdbmmodule.c -lgdbm
            _uuid _uuidmodule.c -luuid
            _decimal _decimal/_decimal.c -lmpdec
            _ctypes _ctypes/_ctypes.c _ctypes/callbacks.c _ctypes/callproc.c _ctypes/stgdict.c _ctypes/cfield.c -lffi
            EOF
            echo "✅ Setup.local写入完成"

            # 13. 编译安装
            echo "===== 编译安装Python ====="
            make -j$(nproc)
            make install
            cd ..
            rm -rf "$PYTHON_TAR" Python-$PYTHON_VERSION
            echo "✅ Python编译安装完成"

            # 14. 全局软链接
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3 2>/dev/null || true
            ln -sf /usr/local/bin/pip3 /usr/bin/pip 2>/dev/null || true

            # 15. 模块校验
            echo "===== Python编译结果校验 ====="
            python3 --version
            python3 -c "
            import sqlite3, uuid, ssl, hashlib, gdbm, lzma, bz2, json, socket, asyncio, ctypes, decimal, zstd, crypt
            conn = sqlite3.connect(':memory:')
            conn.execute('CREATE TABLE test (id INT)')
            conn.close()
            hashlib.sha3_256(b'test')
            uuid.uuid4()
            print('✅ 所有核心模块正常')
            echo "✅ Python校验完成"

            # 16. 安装打包依赖
            echo "===== 安装Python依赖 ====="
            python3 -m ensurepip --upgrade
            pip install --upgrade pip setuptools wheel
            pip install --no-cache-dir pyinstaller staticx zstandard
            pip install --no-cache-dir --config-setting="--global-option=--static" cryptography
            pip install --no-cache-dir --no-binary pydantic_core pydantic_core==2.41.5
            pip install --no-cache-dir foghorn
            echo "✅ 依赖安装完成"

            # 17. 清理动态库残留
            echo "===== 清理动态库残留 ====="
            find /usr/local/lib/python3* -name "*.so*" -type f | while read so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
              patchelf --remove-needed libssl.so.3 "$so" 2>/dev/null || true
              patchelf --remove-needed libcrypto.so.3 "$so" 2>/dev/null || true
              patchelf --remove-needed libz.so.1 "$so" 2>/dev/null || true
              patchelf --remove-needed libffi.so.8 "$so" 2>/dev/null || true
            done
            echo "✅ 动态库清理完成"

            # 18. 入口脚本
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # 19. PyInstaller打包
            echo "===== 打包单文件二进制 ====="
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --collect-all zstandard \
              --collect-all cryptography \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-module _bootlocale \
              --exclude-module curses \
              --exclude-module readline \
              --exclude-module ensurepip \
              --exclude-module venv \
              run.py

            # 20. staticx终极静态封包
            echo "===== 最终静态封包 ====="
            staticx --strip dist/foghorn-android-arm64 dist/foghorn-android-arm64-static
            chmod +x dist/foghorn-android-arm64-static

            # 21. 产物校验
            echo "===== 最终产物校验 ====="
            file dist/foghorn-android-arm64-static
            ldd dist/foghorn-android-arm64-static 2>&1 || echo "✅ 纯静态二进制，无动态依赖"
            echo "===== 构建成功！ ====="

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-最终修复版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
