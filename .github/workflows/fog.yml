name: Build Foghorn Android ARM64 单二进制终极根治版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仅用于构建目录
        uses: actions/checkout@v4

      - name: 设置QEMU多架构模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # ========== 源配置：稳定有效，无invalid link报错 ==========
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://mirrors.aliyun.com/alpine/edge/main
            http://dl-cdn.alpinelinux.org/alpine/edge/main
            http://dl-cdn.alpinelinux.org/alpine/edge/community
            EOF

            # 兜底DNS配置
            echo "nameserver 8.8.8.8" > /etc/resolv.conf
            echo "nameserver 223.5.5.5" >> /etc/resolv.conf

            # 带重试的apk更新
            for i in 1 2 3; do apk update --no-cache && break || sleep 5; done

            # ========== 依赖安装：已修复mpdecimal-static报错，完整兼容Python 3.12 ==========
            apk add --no-cache \
              gcc g++ musl-dev linux-headers build-base tar patchelf pkgconf binutils git \
              zlib-static zlib-dev libffi-dev openssl-dev openssl-libs-static \
              ncurses-dev ncurses-static readline-dev readline-static bzip2-dev xz-dev expat-dev expat-static \
              libcap-dev libgcc libsodium-static libc6-compat scons rust cargo \
              mariadb-dev mariadb-static wget make gdbm-dev sqlite-dev sqlite-static \
              util-linux-dev util-linux-static zstd-dev zstd-static mpdecimal-dev

            # 静态库校验（含libmpdec.a，mpdecimal-dev已自带，无需额外包）
            echo "===== 依赖静态库校验 ====="
            ALL_EXIST=true
            for lib in \
              "/usr/lib/libffi.a" \
              "/usr/lib/libgdbm.a" \
              "/usr/lib/libsqlite3.a" \
              "/usr/lib/libuuid.a" \
              "/usr/lib/libzstd.a" \
              "/usr/lib/libssl.a" \
              "/usr/lib/libcrypto.a" \
              "/usr/lib/libmpdec.a"
            do
              if [ -f "$lib" ]; then
                echo "✅ 存在: $lib"
                ls -la "$lib"
              else
                echo "❌ 缺失: $lib"
                ALL_EXIST=false
              fi
            done
            if [ "$ALL_EXIST" = "false" ]; then
              echo "❌ 核心静态库缺失，终止构建"
              exit 1
            fi
            echo "===== 静态库校验完成 ====="

            # ========== 切换为Python 3.12.10 LTS稳定版，彻底解决源码结构变化报错 ==========
            PYTHON_VERSION="3.12.10"
            # 全静态编译环境变量
            export BUILD_HOST="aarch64-alpine-linux-musl"
            export CC="gcc"
            export CXX="g++"
            export LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -Wl,--disable-new-dtags -Wl,--as-needed"
            export CFLAGS="-fPIC -O2 -ffunction-sections -fdata-sections"
            export CPPFLAGS="-I/usr/include"
            export PKG_CONFIG_PATH="/usr/lib/pkgconfig"
            export PKG_CONFIG="pkg-config --static"
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_CROSS_LIB_DIR=/usr/lib
            export PYO3_NO_PYTHON=0
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_BUILD_TARGET="aarch64-unknown-linux-musl"

            # ========== Python源码下载与加固解压校验 ==========
            echo "===== 开始编译全静态Python ====="
            PYTHON_TAR_URL="https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_TAR_FILE="python.tar.xz"
            
            # 3次重试下载
            for i in 1 2 3; do
              wget --tries=3 --timeout=30 "$PYTHON_TAR_URL" -O "$PYTHON_TAR_FILE" && break || sleep 5
            done
            
            # 压缩包完整性校验
            if ! xz -t "$PYTHON_TAR_FILE"; then
              echo "❌ 下载的Python源码包损坏"
              exit 1
            fi
            
            # 强制使用GNU tar解压，避免兼容性问题
            echo "===== Tar版本确认 ====="
            tar --version
            tar xf "$PYTHON_TAR_FILE"
            if [ $? -ne 0 ]; then
              echo "❌ Python源码解压失败"
              exit 1
            fi
            cd Python-$PYTHON_VERSION

            # ========== 新增：核心源码文件预校验，彻底避免文件找不到报错 ==========
            echo "===== 核心源码文件校验 ====="
            # 校验itertools模块源文件（3.12稳定版必含）
            if [ -f "Modules/_itertoolsmodule.c" ]; then
              echo "✅ 存在: Modules/_itertoolsmodule.c"
              ls -la Modules/_itertoolsmodule.c
            else
              echo "❌ 缺失: Modules/_itertoolsmodule.c，源码不完整"
              exit 1
            fi
            # 校验sqlite3模块文件
            SQLITE_SOURCE_FILES="
              _sqlite/connection.c
              _sqlite/cursor.c
              _sqlite/microprotocols.c
              _sqlite/module.c
              _sqlite/prepare_protocol.c
              _sqlite/row.c
              _sqlite/statement.c
              _sqlite/util.c
            "
            for file in $SQLITE_SOURCE_FILES; do
              FULL_PATH="Modules/$file"
              if [ -f "$FULL_PATH" ]; then
                echo "✅ 存在: $FULL_PATH"
              else
                echo "❌ 缺失: $FULL_PATH"
                exit 1
              fi
            done
            echo "===== 源码校验完成 ====="

            # Python configure配置
            ./configure \
              --host=$BUILD_HOST \
              --build=$BUILD_HOST \
              --prefix=/usr/local \
              --disable-shared \
              --enable-static \
              --disable-test-modules \
              --disable-optimizations \
              --with-system-expat \
              --with-system-libmpdec \
              --with-system-ffi \
              --with-openssl=/usr

            # ========== 新增：Makefile规则预校验，提前排查无效目标 ==========
            echo "===== 预校验Makefile构建规则 ====="
            if grep -q "_itertoolsmodule.o" Makefile; then
              echo "✅ Makefile已生成itertools模块构建规则"
            else
              echo "❌ Makefile未生成itertools模块构建规则，配置异常"
              exit 1
            fi
            if grep -q "_sqlite/connection.o" Makefile; then
              echo "✅ Makefile已生成_sqlite3模块构建规则"
            else
              echo "❌ Makefile未生成_sqlite3模块构建规则"
              exit 1
            fi
            echo "===== Makefile预校验完成 ====="

            # ========== 精简Setup.local，仅保留外部依赖模块，核心模块由构建系统自动处理 ==========
            > Modules/Setup.local
            cat >> Modules/Setup.local << 'EOF'
            *static*

            # 加密与安全模块，全静态内置
            _hashlib _hashopenssl.c \
              -I/usr/include \
              -L/usr/lib \
              -lcrypto -lz -lpthread -lm -ldl
            _ssl _ssl.c \
              -I/usr/include \
              -L/usr/lib \
              -lssl -lcrypto -lz -lpthread -lm -ldl
            _crypt _cryptmodule.c -lcrypt

            # sqlite3模块，全静态内置
            _sqlite3 _sqlite/connection.c _sqlite/cursor.c _sqlite/microprotocols.c _sqlite/module.c _sqlite/prepare_protocol.c _sqlite/row.c _sqlite/statement.c _sqlite/util.c \
              -I/usr/include \
              -L/usr/lib \
              -lsqlite3 -lz -lpthread -lm -ldl

            # 其他依赖系统库的扩展模块，全静态内置
            _uuid _uuidmodule.c -luuid
            _zstd _zstdmodule.c -lzstd
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma
            _curses _cursesmodule.c -lncursesw -ltinfo
            _curses_panel _curses_panel.c -lpanel -lncursesw
            readline readline.c -lreadline -lncursesw
            _gdbm _gdbmmodule.c -lgdbm
            _expat _expatmodule.c -lexpat
            _decimal _decimal.c -lmpdec -lm
            EOF

            # 编译安装，全核心加速
            make -j$(nproc)
            make install
            cd ..
            rm -rf "$PYTHON_TAR_FILE" Python-$PYTHON_VERSION

            # 替换系统默认Python
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3
            ln -sf /usr/local/bin/pip3 /usr/bin/pip

            # Python编译结果全量校验
            echo "===== Python编译结果校验 ====="
            python3 --version
            # 校验所有核心模块导入成功，含itertools、decimal
            python3 -c "import sys, itertools, sqlite3, uuid, zstd, ssl, hashlib, decimal, curses, readline, gdbm, lzma, bz2; print('✅ 所有核心模块导入成功，包括itertools、decimal')"
            # 校验静态编译状态
            python3 -c "import sysconfig; print('Python静态编译状态：', sysconfig.get_config_var('Py_ENABLE_SHARED') == 0)"
            echo "===== Python校验完成 ====="

            # 安装打包工具
            python3 -m ensurepip --upgrade
            pip install --upgrade pip setuptools wheel
            pip install --no-cache-dir pyinstaller staticx

            # 依赖安装，全静态适配
            pip install --no-cache-dir \
              --config-setting="--global-option=--static" \
              cryptography
            pip install --no-cache-dir \
              --no-binary pydantic_core \
              pydantic_core==2.41.5
            pip install --no-cache-dir foghorn

            # 全量RUNPATH/RPATH清理，杜绝staticx报错
            echo "===== 全量RUNPATH/RPATH清理 ====="
            find /usr/local/lib/python3* -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
              patchelf --remove-needed libssl.so.3 "$so" 2>/dev/null || true
              patchelf --remove-needed libcrypto.so.3 "$so" 2>/dev/null || true
            done
            find /usr/local/lib/python3*/site-packages -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            find /usr/lib -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
            done
            echo "===== 全量清理完成 ====="

            # 生成启动入口脚本，适配Android环境
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # PyInstaller打包，彻底排除动态库
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-module _bootlocale \
              --exclude-binaries "libsqlite3.so.0" \
              --exclude-binaries "libssl.so.3" \
              --exclude-binaries "libcrypto.so.3" \
              --exclude-binaries "libz.so.1" \
              --exclude-binaries "libffi.so.8" \
              --exclude-binaries "libgcc_s.so.1" \
              --exclude-binaries "libc.musl-aarch64.so.1" \
              run.py

            # 打包结果校验
            echo "===== 打包结果最终校验 ====="
            python3 -c "
            import zipfile
            exe_path = 'dist/foghorn-android-arm64'
            forbidden_libs = ['libsqlite3.so.0', 'libssl.so.3', 'libcrypto.so.3', 'libz.so.1', 'libffi.so.8', 'libgcc_s.so.1', 'libc.musl']
            has_forbidden = False
            with zipfile.ZipFile(exe_path, 'r') as zf:
                for name in zf.namelist():
                    for lib in forbidden_libs:
                        if lib in name:
                            has_forbidden = True
                            print('❌ 发现残留禁止动态库:', name)
                            break
                    if has_forbidden:
                        break
            if not has_forbidden:
                print('✅ 打包归档内无禁止动态库')
            "
            echo "===== 打包校验完成 ====="

            # staticx全静态封包
            staticx \
              --strip \
              --loglevel info \
              dist/foghorn-android-arm64 \
              dist/foghorn-android-arm64-static

            # 最终产物全静态校验
            echo "===== 最终产物全静态校验 ====="
            file dist/foghorn-android-arm64-static
            ldd dist/foghorn-android-arm64-static 2>&1 || echo "✅ ldd校验：无动态依赖，符合全静态要求"
            chmod +x dist/foghorn-android-arm64-static
            chown -R 1001:1001 dist/
            chmod -R 755 dist/
            echo "===== 全静态校验完成，构建成功 ====="

      - name: 上传最终单二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-终极根治版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
