Name: Build Foghorn Android ARM64 单二进制最终稳定版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仅用于构建目录
        uses: actions/checkout@v4

      - name: 设置QEMU多架构模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # ========== 源配置：优先官方稳定源，兜底阿里云镜像 ==========
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            https://mirrors.aliyun.com/alpine/edge/main
            https://mirrors.aliyun.com/alpine/edge/community
            EOF

            # 优先国内DNS，提升网络稳定性
            echo "nameserver 223.5.5.5" > /etc/resolv.conf
            echo "nameserver 8.8.8.8" >> /etc/resolv.conf

            # 强制更新源，3次重试避免网络波动
            echo "===== 强制更新APK源 ====="
            for i in 1 2 3; do apk update --no-cache --allow-untrusted && break || sleep 5; done
            if [ $? -ne 0 ]; then
              echo "❌ APK源更新失败"
              exit 1
            fi
            echo "✅ APK源更新成功"

            # ========== 依赖安装：无语法错误，完整覆盖构建所需 ==========
            echo "===== 安装全量构建依赖 ====="
            for i in 1 2 3; do
              apk add --no-cache --allow-untrusted \
                curl gcc g++ musl-dev linux-headers build-base patchelf pkgconf binutils git \
                zlib-static zlib-dev libffi-dev openssl-dev openssl-libs-static \
                ncurses-dev ncurses-static readline-dev readline-static \
                bzip2-dev bzip2-static xz-dev xz-static expat-dev expat-static \
                gdbm-dev mpdecimal-dev util-linux-dev util-linux-static \
                zstd-dev zstd-static sqlite-dev sqlite-static libcap-dev libgcc \
                libsodium-static libc6-compat scons rust cargo mariadb-dev mariadb-static make \
              && break || sleep 5
            done
            if [ $? -ne 0 ]; then
              echo "❌ 依赖安装失败"
              exit 1
            fi
            echo "✅ 所有依赖安装完成"

            # ========== 依赖校验：容错优化，不会因无效路径终止脚本 ==========
            echo "===== 依赖静态库+头文件全量校验 ====="
            ALL_EXIST=true

            # 预处理库搜索路径：只保留真实存在的目录，避免find报错
            RAW_LIB_PATHS="/usr/lib /usr/local/lib /lib /usr/lib/*-linux-musl /usr/local/lib/*-linux-musl"
            VALID_LIB_PATHS=""
            for path in $RAW_LIB_PATHS; do
              if [ -d "$path" ]; then
                VALID_LIB_PATHS="$VALID_LIB_PATHS $path"
              fi
            done
            VALID_LIB_PATHS=$(echo "$VALID_LIB_PATHS" | xargs)
            echo "✅ 有效库搜索路径: $VALID_LIB_PATHS"

            # 静态库校验：容错处理，不会因单文件缺失提前终止
            REQUIRED_LIBS="libffi.a libgdbm.a libsqlite3.a libuuid.a libzstd.a libssl.a libcrypto.a libmpdec.a libexpat.a liblzma.a libbz2.a libncursesw.a libpanelw.a libz.a"
            for lib_name in $REQUIRED_LIBS; do
              set +e
              lib_path=$(find $VALID_LIB_PATHS -name "$lib_name" -type f 2>/dev/null | head -n 1)
              set -e
              
              if [ -n "$lib_path" ] && [ -f "$lib_path" ] && [ $(stat -c%s "$lib_path") -gt 0 2>/dev/null ]; then
                echo "✅ 存在且有效: $lib_path"
                ln -sf "$lib_path" "/usr/lib/$lib_name" 2>/dev/null || true
              else
                echo "❌ 缺失或无效: $lib_name"
                ALL_EXIST=false
              fi
            done

            # 预处理头文件搜索路径：只保留真实存在的目录
            RAW_HEADER_PATHS="/usr/include /usr/local/include"
            VALID_HEADER_PATHS=""
            for path in $RAW_HEADER_PATHS; do
              if [ -d "$path" ]; then
                VALID_HEADER_PATHS="$VALID_HEADER_PATHS $path"
              fi
            done
            VALID_HEADER_PATHS=$(echo "$VALID_HEADER_PATHS" | xargs)
            echo "✅ 有效头文件搜索路径: $VALID_HEADER_PATHS"

            # 头文件校验：容错处理
            REQUIRED_HEADERS="uuid/uuid.h ffi.h sqlite3.h openssl/ssl.h zstd.h mpdecimal.h"
            for header_rel in $REQUIRED_HEADERS; do
              set +e
              header_path=$(find $VALID_HEADER_PATHS -path "*$header_rel" -type f 2>/dev/null | head -n 1)
              set -e
              
              if [ -n "$header_path" ] && [ -f "$header_path" ] && [ $(stat -c%s "$header_path") -gt 0 2>/dev/null ]; then
                echo "✅ 头文件有效: $header_path"
              else
                echo "❌ 头文件缺失: $header_rel"
                ALL_EXIST=false
              fi
            done

            # 最终校验结果判断
            if [ "$ALL_EXIST" = "false" ]; then
              echo "❌ 核心依赖/头文件缺失，终止构建"
              exit 1
            fi
            echo "===== 全量校验通过，所有依赖正常 ====="

            # ========== Python 3.13.3 配置（官方稳定版，无兼容性问题） ==========
            PYTHON_VERSION="3.13.3"
            PYTHON_SHA256="40f868bcbdeb8149a3149580bb9bfd407b3321cd48f0be631af955ac92c0e041"
            PYTHON_URL="https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_TAR_FILE="python.tar.xz"

            # 完善编译环境变量，确保编译器找到所有依赖
            export BUILD_HOST="aarch64-alpine-linux-musl"
            export CC="gcc"
            export CXX="g++"
            export LDFLAGS="-static -L/usr/lib -L/usr/local/lib"
            export CPPFLAGS="-I/usr/include -I/usr/include/uuid -I/usr/local/include"
            export CFLAGS="-fPIC -O2 -ffunction-sections -fdata-sections"
            export PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/share/pkgconfig:/usr/local/lib/pkgconfig"
            export PKG_CONFIG="pkg-config --static"
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_CROSS_LIB_DIR=/usr/lib
            export PYO3_NO_PYTHON=0
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_BUILD_TARGET="aarch64-unknown-linux-musl"

            # ========== 下载 & 校验 Python 源码 ==========
            echo "===== 开始下载Python $PYTHON_VERSION 源码 ====="
            rm -rf "$PYTHON_TAR_FILE" Python-$PYTHON_VERSION

            DOWNLOAD_SUCCESS=false
            for i in 1 2 3; do
              echo "尝试下载（第$i次）：官方地址"
              if curl -fSL --retry 2 --retry-delay 3 --connect-timeout 30 -C - "$PYTHON_URL" -o "$PYTHON_TAR_FILE"; then
                DOWNLOAD_SUCCESS=true
                break
              fi
              sleep 3
            done

            if [ "$DOWNLOAD_SUCCESS" = "false" ] || [ ! -f "$PYTHON_TAR_FILE" ]; then
              echo "❌ 源码包下载失败"
              exit 1
            fi

            if ! xz -t "$PYTHON_TAR_FILE"; then
              echo "❌ 源码包格式损坏"
              exit 1
            fi

            echo "===== Python源码包SHA256校验 ====="
            DOWNLOAD_SHA256=$(sha256sum "$PYTHON_TAR_FILE" | awk '{print $1}')
            if [ "$DOWNLOAD_SHA256" != "$PYTHON_SHA256" ]; then
              echo "⚠️ 哈希校验不匹配，删除重试"
              rm -f "$PYTHON_TAR_FILE"
              for i in 1 2 3; do
                if curl -fSL -T 30 -O "$PYTHON_TAR_FILE" "$PYTHON_URL"; then
                  RETRY_SHA256=$(sha256sum "$PYTHON_TAR_FILE" | awk '{print $1}')
                  [ "$RETRY_SHA256" = "$PYTHON_SHA256" ] && break
                fi
                sleep 3
              done
              if [ "$(sha256sum "$PYTHON_TAR_FILE" | awk '{print $1}')" != "$PYTHON_SHA256" ]; then
                echo "❌ 多次重试后哈希校验仍失败"
                exit 1
              fi
            fi
            echo "✅ 源码包完整性校验通过"

            echo "===== 开始解压Python源码 ====="
            tar --no-same-owner --no-same-permissions -xf "$PYTHON_TAR_FILE"
            if [ $? -ne 0 ] || [ ! -d "Python-$PYTHON_VERSION" ]; then
              echo "❌ 解压失败"
              ls -la
              exit 1
            fi
            cd "Python-$PYTHON_VERSION"

            # ========== 【核心修复】核心模块源码预校验：移除不存在的_zstdmodule.c ==========
            echo "===== 核心模块源码文件预校验 ====="
            CRITICAL_SOURCE_FILES="
              Modules/_uuidmodule.c
              Modules/itertoolsmodule.c
              Modules/_sqlite/connection.c
              Modules/_sqlite/cursor.c
              Modules/_sqlite/microprotocols.c
              Modules/_sqlite/module.c
              Modules/_sqlite/prepare_protocol.c
              Modules/_sqlite/row.c
              Modules/_sqlite/statement.c
              Modules/_sqlite/util.c
              Modules/_sqlite/blob.c
              Modules/_gdbmmodule.c
              Modules/arraymodule.c
              Modules/_struct.c
              Modules/socketmodule.c
              Modules/_asynciomodule.c
              Modules/_contextvarsmodule.c
              Modules/unicodedata.c
              Modules/md5module.c
              Modules/sha1module.c
              Modules/_hashopenssl.c
            "
            for file in $CRITICAL_SOURCE_FILES; do
              if [ -f "$file" ]; then
                echo "✅ 存在: $file"
              else
                echo "❌ 缺失: $file，源码包不完整"
                exit 1
              fi
            done
            echo "===== 核心源码校验完成 ====="

            # ========== configure 配置：静态编译优化 ==========
            ./configure \
              --host=$BUILD_HOST \
              --build=$BUILD_HOST \
              --prefix=/usr/local \
              --disable-shared \
              --enable-static \
              --with-openssl=/usr \
              --with-system-expat \
              --with-system-ffi \
              --with-system-zlib \
              --with-system-lzma \
              --with-system-libmpdec \
              --with-system-sqlite3 \
              --with-static-libpython \
              --disable-test-modules

            # ========== 【核心修复】Makefile规则预校验：移除不存在的_zstdmodule.o ==========
            echo "===== 预校验Makefile构建规则 ====="
            CRITICAL_RULES="
              itertoolsmodule.o
              _sqlite/connection.o
              _uuidmodule.o
              _gdbmmodule.o
            "
            ALL_RULES_OK=true
            for rule in $CRITICAL_RULES; do
              if grep -q "$rule" Makefile; then
                echo "✅ Makefile已生成$rule构建规则"
              else
                echo "❌ Makefile未生成$rule构建规则，配置异常"
                ALL_RULES_OK=false
              fi
            done
            if [ "$ALL_RULES_OK" = "false" ]; then
              echo "❌ 核心模块构建规则缺失，终止构建"
              exit 1
            fi
            echo "===== Makefile预校验完成 ====="

            # ========== 【核心修复】Setup.local配置：移除不存在的_zstd模块 ==========
            cat > Modules/Setup.local << 'EOF'
            *static*

            math mathmodule.c
            cmath cmathmodule.c
            _struct _struct.c
            array arraymodule.c
            binascii binascii.c
            _random _randommodule.c
            _bisect _bisectmodule.c
            _heapq _heapqmodule.c
            _json _json.c
            _datetime _datetimemodule.c
            _elementtree _elementtree.c
            _pickle _pickle.c
            _queue _queuemodule.c
            _statistics _statisticsmodule.c
            _posixsubprocess _posixsubprocess.c
            _csv _csv.c
            _fcntl fcntlmodule.c
            _mmap mmapmodule.c
            _resource resource.c
            _select selectmodule.c
            _socket socketmodule.c
            _asyncio _asynciomodule.c
            _contextvars _contextvarsmodule.c
            unicodedata unicodedata.c

            _md5 md5module.c
            _sha1 sha1module.c
            _blake2 _blake2/blake2module.c _blake2/blake2b_impl.c _blake2/blake2s_impl.c
            _hashlib _hashopenssl.c -lssl -lcrypto

            zlib zlibmodule.c -lz
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma

            _ssl _ssl.c -lssl -lcrypto

            _sqlite3 _sqlite/connection.c _sqlite/cursor.c _sqlite/microprotocols.c _sqlite/module.c _sqlite/prepare_protocol.c _sqlite/row.c _sqlite/statement.c _sqlite/util.c _sqlite/blob.c -lsqlite3

            _uuid _uuidmodule.c -luuid
            _gdbm _gdbmmodule.c -lgdbm
            readline readline.c -lreadline -lncursesw
            EOF
            echo "✅ Setup.local 配置完成"

            # 编译安装
            make -j$(nproc)
            make install
            cd ..
            rm -rf "$PYTHON_TAR_FILE" Python-$PYTHON_VERSION

            # 替换系统默认Python
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3
            ln -sf /usr/local/bin/pip3 /usr/bin/pip

            # ========== 【核心修复】Python模块校验：移除不存在的zstd模块导入 ==========
            echo "===== Python编译结果校验 ====="
            python3 --version
            python3 -c "
            import sys, itertools, sqlite3, uuid, ssl, hashlib, decimal, curses, readline, gdbm, lzma, bz2, struct, array, socket
            hashlib.sha256(b'test')
            hashlib.sha512(b'test')
            hashlib.sha3_256(b'test')
            uuid.uuid4()
            decimal.Decimal('1.000000000000000000')
            print('✅ 所有核心模块导入成功，uuid/sha3功能正常')
            "
            python3 -c "import sysconfig; print('Python静态编译状态：', sysconfig.get_config_var('Py_ENABLE_SHARED') == 0)"
            echo "===== Python校验完成 ====="

            # 安装打包工具与依赖（自动安装zstd第三方库，满足foghorn需求）
            python3 -m ensurepip --upgrade
            pip install --upgrade pip setuptools wheel
            pip install --no-cache-dir pyinstaller staticx zstandard
            pip install --no-cache-dir \
              --config-setting="--global-option=--static" \
              cryptography
            pip install --no-cache-dir \
              --no-binary pydantic_core \
              pydantic_core==2.41.5
            pip install --no-cache-dir foghorn

            # 全量RUNPATH/RPATH清理，避免动态库残留
            echo "===== 全量RUNPATH/RPATH清理 ====="
            find /usr/local/lib/python3* -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
              patchelf --remove-needed libssl.so.3 "$so" 2>/dev/null || true
              patchelf --remove-needed libcrypto.so.3 "$so" 2>/dev/null || true
            done
            find /usr/local/lib/python3*/site-packages -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            find /usr/lib -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
            done
            echo "===== 全量清理完成 ====="

            # 生成启动脚本与打包
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --collect-all zstandard \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-module _bootlocale \
              --exclude-binaries "libsqlite3.so.0" \
              --exclude-binaries "libssl.so.3" \
              --exclude-binaries "libcrypto.so.3" \
              --exclude-binaries "libz.so.1" \
              --exclude-binaries "libffi.so.8" \
              --exclude-binaries "libgcc_s.so.1" \
              --exclude-binaries "libc.musl-aarch64.so.1" \
              run.py

            # 打包校验与静态封包
            echo "===== 打包结果校验 ====="
            python3 -c "
            import zipfile
            exe_path = 'dist/foghorn-android-arm64'
            forbidden_libs = ['libsqlite3.so.0', 'libssl.so.3', 'libcrypto.so.3', 'libz.so.1', 'libffi.so.8', 'libgcc_s.so.1', 'libc.musl']
            has_forbidden = False
            with zipfile.ZipFile(exe_path, 'r') as zf:
                for name in zf.namelist():
                    for lib in forbidden_libs:
                        if lib in name:
                            has_forbidden = True
                            print('❌ 发现残留禁止动态库:', name)
                            break
                    if has_forbidden:
                        break
            if not has_forbidden:
                print('✅ 打包归档内无禁止动态库')
            "
            staticx --strip --loglevel info dist/foghorn-android-arm64 dist/foghorn-android-arm64-static

            # 最终产物校验
            echo "===== 最终产物校验 ====="
            file dist/foghorn-android-arm64-static
            ldd dist/foghorn-android-arm64-static 2>&1 || echo "✅ ldd校验：无动态依赖，纯静态二进制"
            chmod +x dist/foghorn-android-arm64-static
            chown -R 1001:1001 dist/
            chmod -R 755 dist/
            echo "===== 构建成功！最终产物：dist/foghorn-android-arm64-static ====="

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-最终稳定版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
