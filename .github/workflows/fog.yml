name: Build Foghorn Android ARM64 静态增强版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # 1. 镜像源与基础环境
            sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
            apk update
            apk add --no-cache \
              curl gcc g++ musl-dev linux-headers build-base patchelf pkgconf binutils git \
              zlib-static zlib-dev libffi-dev openssl-dev openssl-libs-static \
              ncurses-dev ncurses-static readline-dev readline-static \
              bzip2-dev bzip2-static xz-dev xz-static expat-dev expat-static \
              gdbm-dev libcap-dev libgcc libsodium-static libc6-compat make sqlite-dev sqlite-static \
              util-linux-dev util-linux-static zstd-dev zstd-static mpdecimal-dev

            # 2. 下载 Python 3.13.3
            PYTHON_VERSION="3.13.3"
            curl -fSL "https://mirrors.aliyun.com/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz" -o python.tar.xz
            tar -xf python.tar.xz
            cd Python-$PYTHON_VERSION

            # 3. 环境变量配置 (关键：移除干扰性 CPPFLAGS)
            export CC="gcc"
            export LDFLAGS="-static -Wl,--fatal-warnings"
            export CFLAGS="-fPIC -O2"
            export PKG_CONFIG="pkg-config --static"

            # 4. 配置阶段
            ./configure \
              --host=aarch64-alpine-linux-musl \
              --build=aarch64-alpine-linux-musl \
              --prefix=/usr/local \
              --disable-shared \
              --enable-static \
              --with-system-expat \
              --with-system-ffi \
              --with-openssl=/usr \
              --without-ensurepip

            # 5. 重写 Setup.local (核心修复：严格单行格式)
            # 注意：不要在模块行中使用换行符，且库路径必须紧跟在源文件后
            cat > Modules/Setup.local << 'EOF'
            *static*

            # 基础核心模块
            _struct _struct.c
            array arraymodule.c
            _contextvars _contextvarsmodule.c
            math mathmodule.c -lm
            cmath cmathmodule.c -lm
            _datetime _datetimemodule.c
            _zoneinfo _zoneinfo.c
            _random _randommodule.c
            _bisect _bisectmodule.c
            _heapq _heapqmodule.c
            _json _json.c
            _csv _csv.c
            _pickle _pickle.c
            _statistics _statisticsmodule.c
            _typing _typingmodule.c
            _opcode _opcode.c
            _asyncio _asynciomodule.c
            _queue _queuemodule.c
            _elementtree _elementtree.c -lexpat
            _posixsubprocess _posixsubprocess.c
            _posixshmem _posixshmem.c
            _multiprocessing _multiprocessing/multiprocessing.c _multiprocessing/semaphore.c
            
            # 编解码与压缩
            binascii binascii.c
            zlib zlibmodule.c -lz
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma
            unicodedata unicodedata.c
            _multibytecodec _multibytecodec.c
            _codecs_cn _codecs_cn.c
            _codecs_hk _codecs_hk.c
            _codecs_iso2022 _codecs_iso2022.c
            _codecs_jp _codecs_jp.c
            _codecs_kr _codecs_kr.c
            _codecs_tw _codecs_tw.c

            # 系统接口
            _socket socketmodule.c
            _select selectmodule.c
            fcntl fcntlmodule.c
            mmap mmapmodule.c
            resource resource.c
            termios termios.c
            grp grpmodule.c
            syslog syslogmodule.c

            # 加密 (合并为单行，避免解析错误)
            _md5 md5module.c
            _sha1 sha1module.c
            _sha2 sha256module.c sha512module.c
            _sha3 _sha3/sha3module.c
            _blake2 _blake2/blake2module.c _blake2/blake2b_impl.c _blake2/blake2s_impl.c
            _hashlib _hashopenssl.c -lssl -lcrypto -lz
            _ssl _ssl.c -lssl -lcrypto -lz

            # 数据库与终端
            _sqlite3 _sqlite/connection.c _sqlite/cursor.c _sqlite/microprotocols.c _sqlite/module.c _sqlite/prepare_protocol.c _sqlite/row.c _sqlite/statement.c _sqlite/util.c _sqlite/blob.c -lsqlite3
            _uuid _uuidmodule.c -luuid
            _gdbm _gdbmmodule.c -lgdbm
            readline readline.c -lreadline -lncursesw
            EOF

            # 6. 编译并安装
            make -j$(nproc)
            make install
            
            # 7. 环境清理与工具准备
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            python3 -m ensurepip
            pip3 install --no-cache-dir pyinstaller staticx foghorn cryptography

            # 8. 打包入口文件
            cat > entry.py << 'EOF'
            import sys
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # 9. PyInstaller 静态打包
            pyinstaller --onefile --clean \
              --name foghorn-arm64 \
              --collect-all foghorn \
              --strip \
              entry.py

            # 10. StaticX 二次封装实现真正的零依赖
            # --libc 指定 musl 路径确保在 Android 环境兼容
            staticx --strip dist/foghorn-arm64 dist/foghorn-android-static

            # 11. 校验产物
            echo "--- 产物信息 ---"
            file dist/foghorn-android-static
            ldd dist/foghorn-android-static 2>&1 || echo "✅ 全静态校验成功"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-static-binary
          path: dist/foghorn-android-static
