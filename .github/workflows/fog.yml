name: Build Foghorn Android ARM64 单二进制终极根治版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仅用于构建目录
        uses: actions/checkout@v4

      - name: 设置QEMU多架构模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # 1. 镜像源配置，双镜像兜底可用性
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://mirrors.ustc.edu.cn/alpine/edge/main
            https://mirrors.ustc.edu.cn/alpine/edge/community
            https://mirrors.tuna.tsinghua.edu.cn/alpine/edge/main
            https://mirrors.tuna.tsinghua.edu.cn/alpine/edge/community
            EOF

            # 兜底DNS配置
            echo "nameserver 8.8.8.8" > /etc/resolv.conf
            echo "nameserver 114.114.114.114" >> /etc/resolv.conf

            apk update --no-cache

            # 2. 安装全量构建依赖（新增Python编译所需依赖）
            apk add --no-cache \
              gcc g++ musl-dev linux-headers build-base patchelf pkgconf binutils git \
              zlib-static zlib-dev libffi-dev libffi-static openssl-dev openssl-libs-static \
              ncurses-dev ncurses-static readline-dev readline-static bzip2-dev xz-dev expat-dev expat-static \
              libcap-dev libgcc libsodium-static libc6-compat scons rust cargo \
              mariadb-dev mariadb-static wget tar make gdbm-dev gdbm-static \
              sqlite-dev sqlite-static

            # 3. 全局编译环境变量配置（强制静态链接优先级）
            PYTHON_VERSION="3.14.3"
            export LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -Wl,--disable-new-dtags"
            export CFLAGS="-fPIC -O2"
            export CPPFLAGS="-I/usr/include"
            export PKG_CONFIG_PATH="/usr/lib/pkgconfig"
            export CRYPTOGRAPHY_RUST=0
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_CROSS_LIB_DIR=/usr/lib
            export RUSTFLAGS="-C target-feature=+crt-static"

            # ====================== 终极根治核心：重编译Python，静态内置SQLite3 ======================
            echo "===== 开始编译全静态Python（内置SQLite3） ====="
            # 下载对应版本Python源码（和你之前使用的3.14版本完全一致）
            wget --no-check-certificate https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz -O python.tar.xz
            tar xf python.tar.xz
            cd Python-$PYTHON_VERSION

            # 核心配置：强制静态编译、禁用共享库、静态内置所有依赖模块（含SQLite3）
            ./configure \
              --prefix=/usr/local \
              --enable-static \
              --disable-shared \
              --disable-test-modules \
              --with-system-ffi \
              --with-system-expat \
              --without-ensurepip \
              --enable-optimizations=no \
              LDFLAGS="$LDFLAGS" \
              CFLAGS="$CFLAGS" \
              CPPFLAGS="$CPPFLAGS"

            # 强制setup.py静态链接SQLite3，不查找动态库
            sed -i 's/sqlite3_defs = \[\]/sqlite3_defs = [("SQLITE_OMIT_LOAD_EXTENSION", "1")]/' setup.py
            sed -i 's/sqlite_libs = \["sqlite3"\]/sqlite_libs = ["sqlite3", "z", "pthread", "m", "dl"]/' setup.py
            sed -i 's/include_dirs.append(sqlite_incdir)/include_dirs.append(sqlite_incdir)\n    library_dirs.append("\/usr\/lib")\n    extra_link_args.append("-static")/' setup.py

            # 编译并安装，使用全核心加速
            make -j$(nproc)
            make install
            cd ..
            rm -rf python.tar.xz Python-$PYTHON_VERSION

            # 替换系统默认Python，确保后续全流程使用我们编译的静态版本
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3 2>/dev/null || true
            ln -sf /usr/local/bin/pip3 /usr/bin/pip 2>/dev/null || true

            # 【关键校验1】确认Python版本和SQLite3模块正常
            echo "===== Python编译结果校验 ====="
            python3 --version
            python3 -c "import sqlite3; print('✅ SQLite3模块导入成功，已内置到Python')"
            python3 -c "import sysconfig; print('Python静态编译状态：', sysconfig.get_config_var('Py_ENABLE_SHARED') == 0)"

            # 【关键校验2】确认_sqlite3扩展无libsqlite3.so.0动态依赖
            SQLITE3_SO=$(find /usr/local/lib/python3.14 -name "_sqlite3.cpython-*.so")
            echo "SQLite3扩展路径: $SQLITE3_SO"
            readelf -d "$SQLITE3_SO" | grep NEEDED | grep -E 'libsqlite3|RUNPATH|RPATH' || echo "✅ _sqlite3扩展无libsqlite3动态依赖，无RUNPATH/RPATH"
            echo "===== Python编译校验完成 ====="
            # ==========================================================================================

            # 4. 安装pip（适配我们编译的静态Python）
            python3 -m ensurepip --upgrade
            pip install --upgrade pip setuptools wheel

            # 5. 安装打包工具
            pip install --no-cache-dir pyinstaller
            pip install --no-cache-dir --no-build-isolation staticx

            # 6. 安装foghorn及核心依赖（强制源码编译，消除动态依赖）
            pip install --no-cache-dir foghorn
            pip install --no-cache-dir --no-binary pydantic_core pydantic_core==2.41.5

            # ====================== 全量RUNPATH/RPATH清理，彻底杜绝其他库的报错 ======================
            echo "===== 全量RUNPATH/RPATH清理 ====="
            # 清理Python安装目录所有so扩展
            find /usr/local/lib/python3.14 -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            # 清理pip安装的所有库
            find /usr/local/lib/python3.14/site-packages -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            # 清理系统库兜底
            find /usr/lib -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
            done
            echo "===== 全量清理完成 ====="
            # ==========================================================================================

            # 7. 生成启动入口脚本
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # 8. PyInstaller 打包（彻底排除libsqlite3.so.0，兜底保障）
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-binaries "libsqlite3.so.0" \
              --add-binary "/usr/lib/libz.so.1:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libffi.so.8:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libssl.so.3:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libcrypto.so.3:python3.14/lib-dynload/" \
              --add-binary "/usr/lib/libgcc_s.so.1:python3.14/lib-dynload/" \
              run.py

            # 【终极校验】确认打包产物内无libsqlite3.so.0
            echo "===== 打包结果最终校验 ====="
            python3 -c "
            import zipfile
            exe_path = 'dist/foghorn-android-arm64'
            has_sqlite = False
            with zipfile.ZipFile(exe_path, 'r') as zf:
                for name in zf.namelist():
                    if 'libsqlite3.so.0' in name:
                        has_sqlite = True
                        print('❌ 发现残留libsqlite3.so.0:', name)
                        break
            if not has_sqlite:
                print('✅ 打包归档内无libsqlite3.so.0，彻底根治RUNPATH报错')
            "
            echo "===== 最终校验完成 ====="

            # 9. Staticx 全静态封包（100%无RUNPATH报错风险）
            staticx \
              dist/foghorn-android-arm64 \
              dist/foghorn-android-arm64-static

            # 10. 权限修复
            chown -R 1001:1001 dist/
            chmod -R 755 dist/

      - name: 上传最终单二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-终极根治版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
