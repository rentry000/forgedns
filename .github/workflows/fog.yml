name: Build Foghorn Android ARM64 单二进制最终稳定版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仅用于构建目录
        uses: actions/checkout@v4

      - name: 设置QEMU多架构模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建Android二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # ========== 源配置：参考文档有效地址，HTTPS安全升级，双链路兜底 ==========
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://mirrors.aliyun.com/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            EOF

            # 多DNS兜底，国内+海外双链路，避免解析失败
            echo "nameserver 8.8.8.8" > /etc/resolv.conf
            echo "nameserver 223.5.5.5" >> /etc/resolv.conf
            echo "nameserver 223.6.6.6" >> /etc/resolv.conf

            # 带重试的apk更新+全量升级，避免旧包漏洞
            for i in 1 2 3; do apk update --no-cache && apk upgrade --no-cache && break || sleep 5; done

            # ========== 依赖安装：参考文档架构全支持，全量静态依赖零缺失 ==========
            apk add --no-cache \
              curl gcc g++ musl-dev linux-headers build-base patchelf pkgconf binutils git \
              zlib-static zlib-dev libffi-dev openssl-dev openssl-libs-static \
              ncurses-dev ncurses-static readline-dev readline-static bzip2-dev xz-dev expat-dev expat-static \
              libcap-dev libgcc libsodium-static libc6-compat scons rust cargo \
              mariadb-dev mariadb-static make gdbm-dev sqlite-dev sqlite-static \
              util-linux-dev util-linux-static zstd-dev zstd-static mpdecimal-dev

            # ========== 全量静态库校验：覆盖所有内置模块依赖，提前拦截缺失 ==========
            echo "===== 依赖静态库全量校验 ====="
            ALL_EXIST=true
            for lib in \
              "/usr/lib/libffi.a" \
              "/usr/lib/libgdbm.a" \
              "/usr/lib/libsqlite3.a" \
              "/usr/lib/libuuid.a" \
              "/usr/lib/libzstd.a" \
              "/usr/lib/libssl.a" \
              "/usr/lib/libcrypto.a" \
              "/usr/lib/libmpdec.a" \
              "/usr/lib/libexpat.a" \
              "/usr/lib/liblzma.a" \
              "/usr/lib/libbz2.a" \
              "/usr/lib/libncursesw.a" \
              "/usr/lib/libpanel.a" \
              "/usr/lib/libtinfo.a" \
              "/usr/lib/libcrypt.a"
            do
              if [ -f "$lib" ]; then
                echo "✅ 存在: $lib"
                ls -la "$lib"
              else
                echo "❌ 缺失: $lib"
                ALL_EXIST=false
              fi
            done
            if [ "$ALL_EXIST" = "false" ]; then
              echo "❌ 核心静态库缺失，终止构建"
              exit 1
            fi
            echo "===== 静态库校验完成 ====="

            # ========== Python 配置：参考文档官方+华为镜像双地址，100%可用 ==========
            PYTHON_VERSION="3.13.3"
            # 官方发布真实SHA256校验值，无误判
            PYTHON_SHA256="40f868bcbdeb8149a3149580bb9bfd407b3321cd48f0be631af955ac92c0e041"
            # 双地址兜底：参考文档官方ftp+华为镜像，避免链路失效
            PYTHON_URL_OFFICIAL="https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_URL_MIRROR="https://mirrors.huaweicloud.com/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_TAR_FILE="python.tar.xz"

            # 全静态编译环境变量，全链路强制静态链接
            export BUILD_HOST="aarch64-alpine-linux-musl"
            export CC="gcc"
            export CXX="g++"
            export LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -Wl,--disable-new-dtags -Wl,--as-needed"
            export CFLAGS="-fPIC -O2 -ffunction-sections -fdata-sections"
            export CPPFLAGS="-I/usr/include"
            export PKG_CONFIG_PATH="/usr/lib/pkgconfig"
            export PKG_CONFIG="pkg-config --static"
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export PYO3_CROSS_LIB_DIR=/usr/lib
            export PYO3_NO_PYTHON=0
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_BUILD_TARGET="aarch64-unknown-linux-musl"

            # ========== 四重兜底下载逻辑：参考文档地址全兼容，零失败 ==========
            echo "===== 开始下载Python $PYTHON_VERSION 源码 ====="
            rm -rf "$PYTHON_TAR_FILE" Python-$PYTHON_VERSION

            # 【第一重】curl HTTPS强制下载，优先官方地址
            DOWNLOAD_SUCCESS=false
            for i in 1 2 3; do
              echo "尝试curl下载（第$i次）：官方地址"
              if curl -fSL --retry 2 --retry-delay 3 --connect-timeout 30 --proto-default https -C - "$PYTHON_URL_OFFICIAL" -o "$PYTHON_TAR_FILE"; then
                DOWNLOAD_SUCCESS=true
                break
              fi
              echo "官方地址失败，切换国内华为镜像"
              if curl -fSL --retry 2 --retry-delay 3 --connect-timeout 30 --proto-default https -C - "$PYTHON_URL_MIRROR" -o "$PYTHON_TAR_FILE"; then
                DOWNLOAD_SUCCESS=true
                break
              fi
              sleep 3
            done

            # 【第二重】curl失败，自动降级原生wget重试
            if [ "$DOWNLOAD_SUCCESS" = "false" ]; then
              echo "curl下载失败，切换系统原生wget重试"
              for i in 1 2 3; do
                echo "尝试wget下载（第$i次）：官方地址"
                if wget -c -T 30 --secure-protocol=TLSv1_2 -O "$PYTHON_TAR_FILE" "$PYTHON_URL_OFFICIAL"; then
                  DOWNLOAD_SUCCESS=true
                  break
                fi
                echo "官方地址失败，切换国内华为镜像"
                if wget -c -T 30 --secure-protocol=TLSv1_2 -O "$PYTHON_TAR_FILE" "$PYTHON_URL_MIRROR"; then
                  DOWNLOAD_SUCCESS=true
                  break
                fi
                sleep 3
              done
            fi

            # 【绝对兜底】下载结果最终校验
            if [ "$DOWNLOAD_SUCCESS" = "false" ] || [ ! -f "$PYTHON_TAR_FILE" ]; then
              echo "❌ 源码包下载失败，所有地址均无法访问"
              exit 1
            fi
            echo "✅ 源码包下载完成"

            # 1. 压缩包格式完整性校验
            if ! xz -t "$PYTHON_TAR_FILE"; then
              echo "❌ 下载的Python源码包格式损坏"
              exit 1
            fi

            # 2. 官方哈希规范校验，无误判
            echo "===== Python源码包SHA256校验 ====="
            echo "$PYTHON_SHA256  $PYTHON_TAR_FILE" > python.sha256
            if ! sha256sum -c python.sha256; then
              echo "⚠️  哈希校验不匹配，删除损坏包，切换镜像重试"
              rm -f "$PYTHON_TAR_FILE" python.sha256
              RETRY_SUCCESS=false

              for i in 1 2 3; do
                echo "重试下载第$i次：华为镜像"
                if wget -c -T 30 --secure-protocol=TLSv1_2 -O "$PYTHON_TAR_FILE" "$PYTHON_URL_MIRROR"; then
                  echo "$PYTHON_SHA256  $PYTHON_TAR_FILE" > python.sha256
                  if sha256sum -c python.sha256; then
                    echo "✅ 重试下载后哈希校验通过"
                    RETRY_SUCCESS=true
                    break
                  fi
                fi
                sleep 3
              done

              if [ "$RETRY_SUCCESS" = "false" ]; then
                echo "❌ 多次重试后哈希校验仍失败"
                exit 1
              fi
            fi
            rm -f python.sha256
            echo "✅ 源码包完整性校验通过"

            # 3. 原生tar解压，无兼容性问题
            echo "===== Tar版本确认 ====="
            tar --version
            echo "===== 开始解压Python源码 ====="
            tar --no-same-owner --no-same-permissions -xf "$PYTHON_TAR_FILE"
            if [ $? -ne 0 ]; then
              echo "❌ Python源码解压失败"
              exit 1
            fi

            # 4. 解压目录校验
            if [ ! -d "Python-$PYTHON_VERSION" ]; then
              echo "❌ 解压后未找到Python-$PYTHON_VERSION目录"
              echo "===== 当前目录内容 ====="
              ls -la
              exit 1
            fi
            cd Python-$PYTHON_VERSION

            # ========== 核心源码文件校验，避免构建失败 ==========
            echo "===== 核心源码文件校验 ====="
            if [ ! -d "Modules" ]; then
              echo "❌ 缺失: Modules目录，源码解压异常"
              echo "===== 当前目录内容 ====="
              ls -la
              exit 1
            fi

            # 校验itertools核心源码
            echo "===== Modules目录itertools相关文件 ====="
            ls -la Modules/ | grep -i itertools
            if [ -f "Modules/itertoolsmodule.c" ]; then
              echo "✅ 存在: Modules/itertoolsmodule.c（Python 3.13 官方标准路径）"
              ls -la Modules/itertoolsmodule.c
            else
              echo "❌ 缺失: itertools模块核心源码，文件不存在"
              exit 1
            fi

            # 校验sqlite3模块全量源码
            SQLITE_SOURCE_FILES="
              _sqlite/connection.c
              _sqlite/cursor.c
              _sqlite/microprotocols.c
              _sqlite/module.c
              _sqlite/prepare_protocol.c
              _sqlite/row.c
              _sqlite/statement.c
              _sqlite/util.c
            "
            for file in $SQLITE_SOURCE_FILES; do
              FULL_PATH="Modules/$file"
              if [ -f "$FULL_PATH" ]; then
                echo "✅ 存在: $FULL_PATH"
              else
                echo "❌ 缺失: $FULL_PATH"
                exit 1
              fi
            done
            echo "===== 源码校验完成 ====="

            # Python configure配置，全静态适配，3.13全兼容
            ./configure \
              --host=$BUILD_HOST \
              --build=$BUILD_HOST \
              --prefix=/usr/local \
              --disable-shared \
              --enable-static \
              --disable-test-modules \
              --disable-optimizations \
              --with-system-expat \
              --with-system-libmpdec \
              --with-system-ffi \
              --with-openssl=/usr

            # ========== Makefile构建规则预校验，提前拦截配置异常 ==========
            echo "===== 预校验Makefile构建规则 ====="
            if grep -q "itertoolsmodule.o" Makefile; then
              echo "✅ Makefile已生成itertools模块构建规则"
            else
              echo "❌ Makefile未生成itertools模块构建规则，配置异常"
              exit 1
            fi

            if grep -q "_sqlite/connection.o" Makefile; then
              echo "✅ Makefile已生成_sqlite3模块构建规则"
            else
              echo "❌ Makefile未生成_sqlite3模块构建规则，配置异常"
              exit 1
            fi
            echo "===== Makefile预校验完成 ====="

            # ========== Setup.local 全静态模块配置，覆盖所有依赖 ==========
            > Modules/Setup.local
            cat >> Modules/Setup.local << 'EOF'
            *static*

            # 加密与安全模块，全静态内置
            _hashlib _hashopenssl.c \
              -I/usr/include \
              -L/usr/lib \
              -lcrypto -lz -lpthread -lm -ldl
            _ssl _ssl.c \
              -I/usr/include \
              -L/usr/lib \
              -lssl -lcrypto -lz -lpthread -lm -ldl
            _crypt _cryptmodule.c -lcrypt

            # sqlite3模块，全静态内置
            _sqlite3 _sqlite/connection.c _sqlite/cursor.c _sqlite/microprotocols.c _sqlite/module.c _sqlite/prepare_protocol.c _sqlite/row.c _sqlite/statement.c _sqlite/util.c \
              -I/usr/include \
              -L/usr/lib \
              -lsqlite3 -lz -lpthread -lm -ldl

            # 其他依赖系统库的扩展模块，全静态内置
            _uuid _uuidmodule.c -luuid
            _zstd _zstdmodule.c -lzstd
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma
            _curses _cursesmodule.c -lncursesw -ltinfo
            _curses_panel _curses_panel.c -lpanel -lncursesw
            readline readline.c -lreadline -lncursesw
            _gdbm _gdbmmodule.c -lgdbm
            _expat _expatmodule.c -lexpat
            _decimal _decimal.c -lmpdec -lm
            EOF

            # 并行编译+strip减小体积
            make -j$(nproc)
            make install-strip
            cd ..
            rm -rf "$PYTHON_TAR_FILE" Python-$PYTHON_VERSION

            # 替换系统默认Python，全链路统一版本
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3
            ln -sf /usr/local/bin/pip3 /usr/bin/pip

            # Python编译结果全量校验，覆盖所有内置模块
            echo "===== Python编译结果校验 ====="
            python3 --version
            python3 -c "import sys, itertools, sqlite3, uuid, zstd, ssl, hashlib, decimal, curses, readline, gdbm, lzma, bz2; print('✅ 所有核心内置模块导入成功')"
            python3 -c "import sysconfig; print('Python静态编译状态：', sysconfig.get_config_var('Py_ENABLE_SHARED') == 0)"
            echo "===== Python校验完成 ====="

            # 配置国内PIP镜像，加速下载，避免超时
            pip config set global.index-url https://mirrors.aliyun.com/pypi/simple/
            pip config set global.trusted-host mirrors.aliyun.com

            # 安装打包工具，全量升级
            python3 -m ensurepip --upgrade --default-pip
            pip install --no-cache-dir --upgrade pip setuptools wheel
            pip install --no-cache-dir pyinstaller staticx

            # 依赖安装，全静态适配，强制静态编译
            pip install --no-cache-dir \
              --config-setting="--global-option=--static" \
              cryptography
            pip install --no-cache-dir \
              --no-binary pydantic_core \
              pydantic_core==2.41.5
            pip install --no-cache-dir foghorn

            # 第三方依赖模块校验，确保安装成功
            echo "===== 第三方依赖校验 ====="
            python3 -c "import cryptography, pydantic_core, foghorn; print('✅ 所有第三方依赖导入成功')"
            echo "===== 依赖校验完成 ====="

            # 全量RUNPATH/RPATH清理，杜绝staticx报错，覆盖所有so文件
            echo "===== 全量RUNPATH/RPATH清理 ====="
            find /usr/local/lib/python3* -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
              patchelf --remove-needed libssl.so.3 "$so" 2>/dev/null || true
              patchelf --remove-needed libcrypto.so.3 "$so" 2>/dev/null || true
            done
            find /usr/local/lib/python3*/site-packages -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
            done
            find /usr/lib -name "*.so*" -type f | while read -r so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
            done
            echo "===== 全量清理完成 ====="

            # 生成启动入口脚本，适配Android环境，添加异常捕获
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            try:
                from foghorn.main import main
                if __name__ == "__main__":
                    main()
            except Exception as e:
                print(f"[FATAL] 启动失败: {e}", file=sys.stderr)
                import traceback
                traceback.print_exc()
                sys.exit(1)
            EOF

            # PyInstaller打包，彻底排除所有动态库，全量收集依赖
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --collect-all cryptography \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-module _bootlocale \
              --exclude-binaries "libsqlite3.so.0" \
              --exclude-binaries "libssl.so.3" \
              --exclude-binaries "libcrypto.so.3" \
              --exclude-binaries "libz.so.1" \
              --exclude-binaries "libffi.so.8" \
              --exclude-binaries "libgcc_s.so.1" \
              --exclude-binaries "libc.musl-aarch64.so.1" \
              --exclude-binaries "libexpat.so.1" \
              --exclude-binaries "liblzma.so.5" \
              --exclude-binaries "libbz2.so.1" \
              --exclude-binaries "libncursesw.so.6" \
              --exclude-binaries "libtinfo.so.6" \
              --exclude-binaries "libpanel.so.6" \
              --exclude-binaries "libcrypt.so.2" \
              run.py

            # 打包结果全量校验，杜绝动态库残留
            echo "===== 打包结果最终校验 ====="
            python3 -c "
            import zipfile
            exe_path = 'dist/foghorn-android-arm64'
            forbidden_libs = ['libsqlite3.so.0', 'libssl.so.3', 'libcrypto.so.3', 'libz.so.1', 'libffi.so.8', 'libgcc_s.so.1', 'libc.musl', 'libexpat.so', 'liblzma.so', 'libbz2.so', 'libncursesw.so', 'libtinfo.so', 'libpanel.so', 'libcrypt.so']
            has_forbidden = False
            with zipfile.ZipFile(exe_path, 'r') as zf:
                for name in zf.namelist():
                    for lib in forbidden_libs:
                        if lib in name:
                            has_forbidden = True
                            print('❌ 发现残留禁止动态库:', name)
                            break
                    if has_forbidden:
                        break
            if not has_forbidden:
                print('✅ 打包归档内无禁止动态库')
            "
            echo "===== 打包校验完成 ====="

            # staticx全静态封包，最终单二进制生成
            staticx \
              --strip \
              --loglevel info \
              dist/foghorn-android-arm64 \
              dist/foghorn-android-arm64-static

            # 最终产物全静态严格校验，双重确认
            echo "===== 最终产物全静态校验 ====="
            file dist/foghorn-android-arm64-static
            # 严格校验动态依赖，零容忍
            DYNAMIC_DEPS=$(readelf -d dist/foghorn-android-arm64-static 2>/dev/null | grep NEEDED || true)
            if [ -n "$DYNAMIC_DEPS" ]; then
              echo "❌ 发现残留动态依赖:"
              echo "$DYNAMIC_DEPS"
              exit 1
            else
              echo "✅ readelf校验：无任何动态依赖，符合全静态要求"
            fi
            ldd dist/foghorn-android-arm64-static 2>&1 || echo "✅ ldd校验：无动态依赖，符合全静态要求"
            # 权限配置，适配Android环境
            chmod +x dist/foghorn-android-arm64-static
            chown -R 1001:1001 dist/
            chmod -R 755 dist/
            echo "===== 全静态校验完成，构建成功 ====="

      - name: 上传最终单二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-最终稳定版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
