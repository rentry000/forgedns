name: Build Foghorn Android ARM64 单二进制最终版
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置QEMU ARM64模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 全静态构建二进制
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:edge
          options: -v ${{ github.workspace }}:/workspace -w /workspace --platform linux/arm64
          run: |
            set -euxo pipefail

            # 源配置：完全匹配你提供的官方Edge源，aarch64架构可用
            rm -rf /etc/apk/repositories /var/cache/apk/*
            cat > /etc/apk/repositories << 'EOF'
            https://dl-cdn.alpinelinux.org/alpine/edge/main
            https://dl-cdn.alpinelinux.org/alpine/edge/community
            EOF

            # 固定DNS，避免网络波动
            echo "nameserver 223.5.5.5" > /etc/resolv.conf
            echo "nameserver 8.8.8.8" >> /etc/resolv.conf

            # 更新源，确保包列表同步
            apk update --no-cache

            # 【核心修复】依赖安装：无任何中间注释、续行符绝对合规、所有包完整传入apk add
            # 说明：Alpine Edge中libffi/gdbm/mpdecimal的静态库已合并到dev包，无需单独安装static包
            apk add --no-cache \
              build-base gcc g++ musl-dev linux-headers \
              curl binutils git patchelf pkgconf make scons rust cargo \
              zlib-dev zlib-static \
              openssl-dev openssl-libs-static \
              ncurses-dev ncurses-static \
              readline-dev readline-static \
              bzip2-dev bzip2-static \
              xz-dev xz-static \
              expat-dev expat-static \
              util-linux-dev util-linux-static \
              zstd-dev zstd-static \
              sqlite-dev sqlite-static \
              libffi-dev gdbm-dev mpdecimal-dev \
              libcap-dev libgcc libsodium-static libc6-compat mariadb-dev mariadb-static

            # 核心依赖校验：仅验证静态库存在，无多余逻辑
            echo "===== 核心依赖校验 ====="
            REQUIRED_LIBS="libz.a libffi.a libssl.a libcrypto.a libsqlite3.a libuuid.a libgdbm.a libmpdec.a"
            for lib in $REQUIRED_LIBS; do
              LIB_PATH=$(find /usr/lib -name "$lib" -type f | head -n 1)
              if [ -n "$LIB_PATH" ] && [ -s "$LIB_PATH" ]; then
                echo "✅ 有效: $LIB_PATH"
              else
                echo "❌ 缺失: $lib"
                exit 1
              fi
            done
            echo "✅ 所有核心依赖就绪"

            # Python编译环境配置
            PYTHON_VERSION="3.13.3"
            PYTHON_SHA256="40f868bcbdeb8149a3149580bb9bfd407b3321cd48f0be631af955ac92c0e041"
            PYTHON_URL="https://www.python.org/ftp/python/$PYTHON_VERSION/Python-$PYTHON_VERSION.tar.xz"
            PYTHON_TAR="python.tar.xz"

            export BUILD_HOST="aarch64-alpine-linux-musl"
            export CC="gcc"
            export CXX="g++"
            export LDFLAGS="-static -L/usr/lib"
            export CPPFLAGS="-I/usr/include -I/usr/include/uuid"
            export CFLAGS="-fPIC -O2"
            export PKG_CONFIG="pkg-config --static"
            export CRYPTOGRAPHY_STATIC=1
            export OPENSSL_STATIC=1
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"
            export CARGO_BUILD_TARGET="aarch64-unknown-linux-musl"

            # 下载并校验Python源码
            curl -fSL "$PYTHON_URL" -o "$PYTHON_TAR"
            echo "$PYTHON_SHA256  $PYTHON_TAR" | sha256sum -c - || { echo "❌ 源码校验失败"; exit 1; }
            tar -xf "$PYTHON_TAR"
            cd "Python-$PYTHON_VERSION"

            # Python静态编译配置
            ./configure \
              --host=$BUILD_HOST \
              --build=$BUILD_HOST \
              --prefix=/usr/local \
              --disable-shared \
              --enable-static \
              --with-openssl=/usr \
              --with-system-expat \
              --with-system-ffi \
              --with-system-zlib \
              --with-static-libpython \
              --disable-test-modules

            # 静态模块配置，无错误写法
            cat > Modules/Setup.local << 'EOF'
            *static*
            math mathmodule.c
            cmath cmathmodule.c
            _struct _struct.c
            array arraymodule.c
            binascii binascii.c
            _random _randommodule.c
            _bisect _bisectmodule.c
            _heapq _heapqmodule.c
            _json _json.c
            _datetime _datetimemodule.c
            _elementtree _elementtree.c
            _pickle _pickle.c
            _queue _queuemodule.c
            _posixsubprocess _posixsubprocess.c
            _csv _csv.c
            _fcntl fcntlmodule.c
            _mmap mmapmodule.c
            _select selectmodule.c
            _socket socketmodule.c
            _asyncio _asynciomodule.c
            _contextvars _contextvarsmodule.c
            unicodedata unicodedata.c
            _md5 md5module.c
            _sha1 sha1module.c
            _blake2 _blake2/blake2module.c _blake2/blake2b_impl.c _blake2/blake2s_impl.c
            _hashlib _hashopenssl.c -lssl -lcrypto
            _ssl _ssl.c -lssl -lcrypto
            zlib zlibmodule.c -lz
            _bz2 _bz2module.c -lbz2
            _lzma _lzmamodule.c -llzma
            _sqlite3 _sqlite3module.c -lsqlite3
            _gdbm _gdbmmodule.c -lgdbm
            _uuid _uuidmodule.c -luuid
            readline readline.c -lreadline -lncursesw
            EOF

            # 编译安装Python
            make -j$(nproc)
            make install
            cd ..
            rm -rf "$PYTHON_TAR" Python-$PYTHON_VERSION

            # 替换系统默认Python
            ln -sf /usr/local/bin/python3 /usr/bin/python3
            ln -sf /usr/local/bin/python3 /usr/bin/python
            ln -sf /usr/local/bin/pip3 /usr/bin/pip3
            ln -sf /usr/local/bin/pip3 /usr/bin/pip

            # 验证Python核心模块
            python3 --version
            python3 -c "import sqlite3, uuid, ssl, hashlib, gdbm, lzma, bz2; print('✅ Python所有核心模块正常')"

            # 安装Python依赖与打包工具
            python3 -m ensurepip --upgrade
            pip install --upgrade pip setuptools wheel
            pip install --no-cache-dir pyinstaller staticx zstandard
            pip install --no-cache-dir --config-setting="--global-option=--static" cryptography
            pip install --no-cache-dir --no-binary pydantic_core pydantic_core==2.41.5
            pip install --no-cache-dir foghorn

            # 清理动态库依赖，避免打包残留
            find /usr/local/lib/python3* -name "*.so*" -type f | while read so; do
              patchelf --remove-rpath --remove-runpath "$so" 2>/dev/null || true
              patchelf --remove-needed libgcc_s.so.1 "$so" 2>/dev/null || true
              patchelf --remove-needed libssl.so.3 "$so" 2>/dev/null || true
              patchelf --remove-needed libcrypto.so.3 "$so" 2>/dev/null || true
            done

            # 生成启动脚本
            cat > run.py << 'EOF'
            import os, sys
            os.environ["TMPDIR"] = "/data/local/tmp"
            os.environ["PYTHONUNBUFFERED"] = "1"
            from foghorn.main import main
            if __name__ == "__main__":
                main()
            EOF

            # 打包单文件二进制
            pyinstaller --onefile --clean \
              --name foghorn-android-arm64 \
              --collect-all foghorn \
              --collect-all pydantic_core \
              --collect-all zstandard \
              --runtime-tmpdir /data/local/tmp \
              --strip \
              --noupx \
              --exclude-module _bootlocale \
              run.py

            # 静态封包与最终校验
            staticx --strip dist/foghorn-android-arm64 dist/foghorn-android-arm64-static
            chmod +x dist/foghorn-android-arm64-static

            # 最终验证
            file dist/foghorn-android-arm64-static
            ldd dist/foghorn-android-arm64-static 2>&1 || echo "✅ 纯静态二进制，无动态依赖"
            echo "===== 构建成功！最终产物：dist/foghorn-android-arm64-static ====="

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: foghorn-android-arm64-最终版
          path: dist/foghorn-android-arm64-static
          retention-days: 30
